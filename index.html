<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | CLINICAL MASTER V11</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; margin-bottom: 15px; }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #upImg { display: none; z-index: 5; }
        canvas { z-index: 10; pointer-events: none; }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .routine-item { background: rgba(0,0,0,0.4); padding: 12px; border-right: 4px solid var(--gold); border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #1a1a1a; color: #fff; border: 1px solid #444; margin-bottom: 15px; }
        .btn-whatsapp { background: #25d366; color: white; margin-top: 15px; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-shadow: 0 2px 4px #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">VERONA AI | التشخيص والروتين</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div id="liveStatus">بانتظار المصدر...</div>
    </div>

    <div id="controls">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#222; color:#fff;" onclick="startCam()">الكاميرا 📸</button>
            <label class="btn" style="background:#222; color:#fff; display:flex; align-items:center; justify-content:center;">
                صورة 📁 <input type="file" hidden onchange="handleFile(event)">
            </label>
        </div>
        <button class="btn" onclick="openQuestions()">بدء التحليل 🔬</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="text-align:center; color:var(--gold)">تأكيد التشخيص</h3>
        <label>هل توجد حبوب ملتهبة؟</label>
        <select id="qAcne"><option value="no">لا</option><option value="yes">نعم، حمراء ونشطة</option></select>
        
        <label>هل توجد تصبغات/بقع؟</label>
        <select id="qPig"><option value="no">لا</option><option value="yes">نعم، كلف أو بقع</option></select>
        
        <label>الميزانية المطلوبة للروتين:</label>
        <select id="qBudget">
            <option value="low">اقتصادي (فعالية وسعر)</option>
            <option value="mid">متوسط (جودة طبية)</option>
            <option value="high">فاخر (نتائج ملكية)</option>
        </select>
        <button class="btn" onclick="generateFinalReport()">عرض النتائج والروتين ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="scoreDisplay" style="font-size:3.5rem; text-align:center; color:var(--gold); font-weight:900;">100%</div>
        <div id="skinTypeDisplay" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:15px;"></div>
        <div id="diagText" style="margin-bottom:15px;"></div>
        <div id="routineList"></div>
        <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">طلب الروتين عبر واتساب 💬</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="location.reload()">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    
    let faceMesh, analysis = { skinType: 'مختلطة', score: 100 };
    let finalSelection = [];

    async function init() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults(results => {
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks) {
                const lm = results.multiFaceLandmarks[0];
                const f = getPx(lm[10]);
                if (f.v > 195) analysis.skinType = "دهنية"; else if (f.v < 115) analysis.skinType = "جافة";
                document.getElementById('liveStatus').innerText = `بشرة ${analysis.skinType} | تم الرصد ✅`;
            }
        });
    }

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { v: (d[0]+d[1]+d[2])/3 };
    }

    function openQuestions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
    }

    function generateFinalReport() {
        const hasAcne = document.getElementById('qAcne').value === 'yes';
        const hasPig = document.getElementById('qPig').value === 'yes';
        const budget = document.getElementById('qBudget').value;

        analysis.score = 100;
        if(hasAcne) analysis.score -= 20;
        if(hasPig) analysis.score -= 20;

        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('scoreDisplay').innerText = analysis.score + "%";
        document.getElementById('skinTypeDisplay').innerText = "نوع البشرة: " + analysis.skinType;

        let dTxt = "<b>التشخيص:</b><br>";
        dTxt += hasAcne ? "• رصد حبوب نشطة.<br>" : "• لا توجد حبوب.<br>";
        dTxt += hasPig ? "• رصد تصبغات/بقع.<br>" : "• لا توجد تصبغات.<br>";
        document.getElementById('diagText').innerHTML = dTxt;

        buildRoutine(hasAcne, hasPig, budget);
    }

    function buildRoutine(acne, pig, budget) {
        const list = document.getElementById('routineList');
        list.innerHTML = ""; finalSelection = [];

        // منطق اختيار المنتجات بناءً على قائمتك
        if(budget === 'low') {
            if(acne) addP("غسول", "ستارفيل وايتنينج", "للدهنية والحبوب");
            else addP("غسول", "غارنييه فاست برايت", "فيتامين C وتفتيح");
            if(pig) addP("تفتيح", "ديرويس كريم", "أربوتين + كوجيك");
            addP("واقي شمس", "إيفا SPF50", "حماية اقتصادية");
        } else if(budget === 'mid') {
            addP("غسول", "نانوتريت", "ساليسيليك + نياسيناميد");
            if(pig) addP("تفتيح", "Natavis Serum", "أربوتين + فيروليك");
            if(acne) addP("علاج", "كولاجرا فيتامين C", "نضارة وحماية");
            addP("واقي شمس", "ستارفيل جل تبييض", "حماية + تفتيح");
        } else {
            addP("غسول", "دير منظف (Der)", "فيتامين E ومسامات");
            if(pig) addP("تفتيح شامل", "XQ Pharma Serum", "التركيبة الثلاثية");
            addP("نضارة", "Nano Treat 24K Gold", "ذهب وكولاجين");
            addP("واقي شمس", "كولاجرا جل تفتيح", "حماية فاخرة");
        }
    }

    function addP(c, n, i) {
        finalSelection.push(`${c}: ${n}`);
        document.getElementById('routineList').innerHTML += `<div class="routine-item"><b>${c}:</b> ${n}<br><small>${i}</small></div>`;
    }

    function sendToWhatsApp() {
        const phone = "201063994139";
        let msg = `طلب من Verona AI:\n📊 النتيجة: ${analysis.score}%\n👤 البشرة: ${analysis.skinType}\n📦 الروتين المختار:\n`;
        finalSelection.forEach(p => msg += `• ${p}\n`);
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function startCam() { upImg.style.display='none'; video.style.display='block'; new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); }
    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => { upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none'; upImg.onload = async () => await faceMesh.send({image: upImg}); };
        r.readAsDataURL(e.target.files[0]);
    }
    init();
</script>
</body>
</html>
