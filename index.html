<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI - تحليل البشرة</title>
<style>
  body { font-family: Arial, sans-serif; background: #fafafa; margin:0; padding:0; }
  #cameraContainer { position: relative; width: 100%; max-width: 480px; margin: auto; }
  video, canvas { width: 100%; border-radius: 10px; }
  #scanLine { position: absolute; top:0; left:0; width:100%; height:4px; background: gold; box-shadow:0 0 15px gold; display:none; z-index:10; animation: scanMove 2s linear; }
  @keyframes scanMove { 0% { top:0; } 100% { top:100%; } }
  .analysis-mode { filter: grayscale(1) contrast(1.2) brightness(0.8); transition: all 1s ease; }
  #status { text-align:center; margin:10px; font-weight:bold; }
  #questionCard, #routineArea { display:none; margin:20px; }
  .routine-card { display:inline-block; width:30%; margin:5px; padding:10px; border:1px solid #ccc; border-radius:8px; background:#fff; vertical-align:top; }
  button { padding:8px 12px; margin-top:5px; cursor:pointer; border:none; border-radius:5px; background: #333; color:#fff; }
</style>
</head>
<body><h2 style="text-align:center;">VERONA AI - تحليل البشرة</h2>
<div id="cameraContainer">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas" style="display:none;"></canvas>
  <div id="scanLine"></div>
</div>
<div id="status">المحرك جاهز للفحص ✅</div>
<div style="text-align:center;">
  <button id="startBtn">ابدأ التحليل 🔬</button>
  <button id="resetBtn" style="display:none;">إعادة التقاط 📸</button>
</div>
<div id="questionCard">
  <h3>الأسئلة التسلسلية بعد الفحص</h3>
  <div id="questionsArea"></div>
</div>
<div id="routineArea"></div>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const scanLine = document.getElementById('scanLine');
let lastResults = null;
let analysisData = {};
let detectedIssues = {};// تشغيل الكاميرا navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{video.srcObject=stream;});

// دالة التحليل function analyzeFace(){ const ctx = canvas.getContext('2d'); canvas.width = video.videoWidth; canvas.height = video.videoHeight; ctx.drawImage(video,0,0,canvas.width,canvas.height);

video.style.display='none';
canvas.style.display='block';

document.getElementById('status').innerText='🔬 جاري المسح المجهري لطبقات الجلد...';
scanLine.style.display='block';
canvas.classList.add('analysis-mode');

setTimeout(()=>{
    scanLine.style.display='none';
    // تحليل افتراضي: اكتشاف مشاكل عشوائية
    detectedIssues = {
        pigment: Math.random()>0.4,
        halations: Math.random()>0.5,
        acne: Math.random()>0.3
    };

    // رسم Heatmap
    ctx.fillStyle="rgba(255,215,0,0.4)";
    for(let i=0;i<5;i++){
        let x=Math.random()*canvas.width;
        let y=Math.random()*canvas.height;
        ctx.beginPath();
        ctx.arc(x,y,20,0,Math.PI*2);
        ctx.fill();
    }

    // عرض الأسئلة
    triggerQuestions();
    document.getElementById('resetBtn').style.display='inline-block';
},2000);

}

function triggerQuestions(){ const qCard = document.getElementById('questionCard'); const qArea = document.getElementById('questionsArea'); qArea.innerHTML=''; const questions=[ 'هل تستخدم واقي شمس يومياً؟', 'هل تتعرض للشمس كثيراً؟', 'هل لديك تاريخ لحب الشباب؟' ]; questions.forEach((q,i)=>{ const div=document.createElement('div'); div.innerHTML=${q} <select id='q${i}'><option>نعم</option><option>لا</option></select>; qArea.appendChild(div); }); qCard.style.display='block'; showRoutines(); }

function showRoutines(){ const routineArea=document.getElementById('routineArea'); routineArea.innerHTML=''; const routines=[ {type:'اقتصادي', improvement:'50%', products:['ستارفيل جل','Garnier Fast Bright'] ,note:'متاحة للتسليم الفوري.'}, {type:'سوبر', improvement:'75%', products:['كولاجرا سيروم','Alpha Arbutin'] ,note:'الأكثر طلباً هذا الأسبوع 🔥.'}, {type:'ألترا', improvement:'95%', products:['Nano Treat 24K','Cleo Radiance'] ,note:'تتضمن استشارة مجانية لمتابعة النتائج.'} ]; routines.forEach(r=>{ const card=document.createElement('div'); card.className='routine-card'; card.innerHTML=<h4>${r.type}</h4> <p>نسبة التحسن: ${r.improvement}</p> <p>المنتجات: ${r.products.join(' - ')}</p> <p>${r.note}</p> <button onclick="sendWA('${r.type}')">حجز الباقة عبر واتساب ✅</button>; routineArea.appendChild(card); }); routineArea.style.display='block'; }

function sendWA(type){ const score=Math.floor(Math.random()*40)+60; let issues=[]; if(detectedIssues.pigment) issues.push('تصبغات'); if(detectedIssues.halations) issues.push('هالات سوداء'); if(detectedIssues.acne) issues.push('حب شباب/مسام'); const msg=*تقرير VERONA AI PRO*%0A---------------------------%0A• *نتيجة الفحص:* ${score}%25%0A• *المشاكل المكتشفة:* ${issues.join(' - ') || 'بشرة صافية'}%0A• *الباقة المختارة:* ${type}%0A---------------------------%0Aأرغب في تأكيد الحجز وبدء الروتين المخصص.%0A*ملاحظة:* تم إنشاء هذا التقرير بواسطة تقنية VERONA AI.; window.open(https://wa.me/201063994139?text=${msg},'_blank'); }

function resetAnalysis(){ video.style.display='block'; canvas.style.display='none'; document.getElementById('routineArea').innerHTML=''; document.getElementById('questionCard').style.display='none'; document.getElementById('status').innerText='المحرك جاهز لفحص جديد ✅'; document.getElementById('resetBtn').style.display='none'; }

document.getElementById('startBtn').addEventListener('click',analyzeFace); document.getElementById('resetBtn').addEventListener('click',resetAnalysis); </script>

</body>
</html>
