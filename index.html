<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI PRO - النسخة النهائية</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root {
  --gold:#d4af37;
  --gold-soft:#f1d77a;
  --bg1:#0a0a0a;
  --bg2:#111111;
  --glass:rgba(255,255,255,0.05);
}
body{margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(circle at top,var(--bg2),var(--bg1));color:#fff;text-align:center;}
.container{max-width:700px;margin:auto;padding:20px;}
.preview-box{position:relative;width:100%;border-radius:25px;overflow:hidden;background:#000;border:1px solid var(--gold);box-shadow:0 0 40px rgba(212,175,55,0.25);backdrop-filter:blur(10px);min-height:350px;}
video,canvas,img.preview-img{width:100%;display:block;}
#overlay{position:absolute;top:0;left:0;z-index:10;}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0;}
.action-btn{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#000;padding:15px;border:none;border-radius:14px;font-weight:bold;cursor:pointer;transition:0.3s;box-shadow:0 5px 20px rgba(212,175,55,0.4);}
.action-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(212,175,55,0.6);}
.scan-btn{width:100%;font-size:1.1rem;border:2px solid var(--gold);}
.result-card,.question-card,.routine-card,.recommend-card{background:var(--glass);backdrop-filter:blur(15px);border-radius:25px;padding:25px;margin-top:25px;border:1px solid rgba(212,175,55,0.4);box-shadow:0 10px 40px rgba(0,0,0,0.6);text-align:right;}
.routine-grid{display:grid;grid-template-columns:1fr;gap:20px;}
.routine-card{transition:0.3s;}
.routine-card:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(212,175,55,0.5);}
.routine-card button{margin-top:15px;background:#25d366;color:#fff;width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
.status-msg{color:var(--gold-soft);margin:10px 0;font-size:0.95rem;letter-spacing:1px;}
select{width:100%;padding:10px;border-radius:10px;margin:8px 0;background:#1c1c1c;color:#fff;border:1px solid var(--gold);}
.hidden{display:none;}
.skin-score-circle{stroke-dasharray:440;stroke-dashoffset:440;transition:stroke-dashoffset 2s ease;}
</style>
</head>
<body>
<div class="container">
<h2 style="color:var(--gold);">VERONA AI PRO - النسخة النهائية</h2>
<div id="status" class="status-msg">جارِ تحميل المحرك الذكي...</div>
<div class="preview-box">
<video id="input_video" class="hidden" playsinline></video>
<canvas id="overlay"></canvas>
<img id="previewImg" class="preview-img hidden" />
</div>
<div class="btn-grid">
<button class="action-btn" onclick="initCamera()">📸 الكاميرا</button>
<button class="action-btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
</div>
<input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(event)">
<button id="scanBtn" class="action-btn scan-btn" onclick="triggerQuestions()">تحليل النتائج 🔬</button>
<div id="questionCard" class="question-card hidden">
<h3 style="color:var(--gold); margin:0;">يرجى تأكيد النتائج المكتشفة:</h3>
<div id="questionsArea"></div>
<label>اختيار نضارة/تفتيح:</label>
<select id="brightenChoice"><option value="لا تحتاج">لا تحتاج</option><option value="نضارة">نضارة</option><option value="تفتيح">تفتيح</option><option value="كلاهما">كلاهما</option></select>
<br>
<button class="action-btn scan-btn" onclick="computeRoutine()">استخراج الروتين ✅</button>
</div>
<div id="routineArea" class="routine-grid hidden"></div>
<div id="recommendCard" class="recommend-card hidden">
<h3 style="color:var(--gold);">التوصيات العامة</h3>
<ul>
<li>الترطيب لمدة أسبوع على الأقل قبل الروتين إذا كانت البشرة جافة.</li>
<li>شرب كمية كافية من الماء يوميًا.</li>
<li>النوم باكرًا لتحفيز تجديد البشرة.</li>
<li>استخدام واقي الشمس يوميًا.</li>
</ul>
</div>
<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('overlay');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently:true});
const previewImg = document.getElementById('previewImg');
let faceMesh;
let lastResults = null;
let currentImg = null;
let detectedIssues = {};
let analysisData = {pigmentLevel:null, halationLevel:null, confidence:0, skinType:null};
let storedBrighten = 'لا تحتاج';async function setupFaceMesh(){ faceMesh = new FaceMesh({locateFile: (file)=>https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}}); faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5 }); faceMesh.onResults(onResults); document.getElementById('status').innerText="المحرك جاهز للفحص ✅"; } setupFaceMesh();

function onResults(results){ lastResults = results; canvasElement.width = canvasElement.clientWidth; canvasElement.height = (currentImg)? (currentImg.height*(canvasElement.width/currentImg.width)) : videoElement.videoHeight*(canvasElement.width/videoElement.videoWidth); canvasCtx.save(); canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height); if(results.image) canvasCtx.drawImage(results.image,0,0,canvasElement.width,canvasElement.height); detectedIssues = {pigment:false, freckles:false, halations:false, acne:false, dryness:false}; if(results.multiFaceLandmarks){ for(const landmarks of results.multiFaceLandmarks){ drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color:'#d4af3744', lineWidth:0.5}); } analyzeFace(results.multiFaceLandmarks[0]); } canvasCtx.restore(); }

async function initCamera(){ currentImg=null; previewImg.classList.add('hidden'); videoElement.classList.remove('hidden'); const camera = new Camera(videoElement, {onFrame: async()=>{await faceMesh.send({image:videoElement});}}); camera.start(); }

function processFile(event){ const file = event.target.files[0]; if(!file)return; const img = new Image(); img.onload = async ()=>{ currentImg=img; videoElement.classList.add('hidden'); previewImg.src = img.src; previewImg.classList.remove('hidden'); await faceMesh.send({image:img}); }; img.src = URL.createObjectURL(file); }

function getPixelMean(lm) { const x = Math.floor(lm.x * canvasElement.width); const y = Math.floor(lm.y * canvasElement.height); const size = 5; try { const startX = Math.max(0, x - 2); const startY = Math.max(0, y - 2); const width = Math.min(size, canvasElement.width - startX); const height = Math.min(size, canvasElement.height - startY); const pData = canvasCtx.getImageData(startX, startY, width, height).data; let totalLum = 0; let validPixels = 0; for (let i = 0; i < pData.length; i += 4) { const r = pData[i], g = pData[i+1], b = pData[i+2]; if (r<20 && g<20 && b<20) continue; const lum = 0.299r + 0.587g + 0.114*b; totalLum += lum; validPixels++; } if(validPixels===0) return 150; return totalLum/validPixels; } catch(e){return 150;} }

function analyzeFace(landmarks){ if(!landmarks) return; const forehead = getPixelMean(landmarks[10]); const leftCheek = getPixelMean(landmarks[205]); const rightCheek = getPixelMean(landmarks[425]); const leftEye = getPixelMean(landmarks[159]); const rightEye = getPixelMean(landmarks[386]);

const cheekAvg = (leftCheek+rightCheek)/2;
const eyeAvg = (leftEye+rightEye)/2;

const pigmentRatio = cheekAvg/forehead;
detectedIssues.pigment = pigmentRatio<0.93;

let pigmentLevel='خفيف';
if(pigmentRatio<0.85) pigmentLevel='عميق';
else if(pigmentRatio<0.90) pigmentLevel='متوسط';

const halationRatio = eyeAvg/forehead;
detectedIssues.halations = halationRatio<0.90;

let halationLevel='خفيف';
if(halationRatio<0.80) halationLevel='شديد';
else if(halationRatio<0.87) halationLevel='متوسط';

detectedIssues.dryness = cheekAvg<110;
if(cheekAvg<105) analysisData.skinType='جافة';
else if(cheekAvg>150) analysisData.skinType='دهنية';
else analysisData.skinType='مختلطة';

const colorVariance = Math.abs(leftCheek-rightCheek);
detectedIssues.freckles = colorVariance>18;
detectedIssues.acne = Math.abs(forehead-cheekAvg)>25;

let confidenceScore=100;
if(detectedIssues.pigment) confidenceScore-=5;
if(detectedIssues.halations) confidenceScore-=5;
if(detectedIssues.acne) confidenceScore-=5;
if(detectedIssues.freckles) confidenceScore-=3;
confidenceScore=Math.max(75,confidenceScore);

analysisData.pigmentLevel=pigmentLevel;
analysisData.halationLevel=halationLevel;
analysisData.confidence=confidenceScore;

document.getElementById('status').innerText=`دقة التحليل: ${confidenceScore}% | نوع البشرة: ${analysisData.skinType}`;

// المؤشر الذهبي
canvasCtx.fillStyle='rgba(212,175,55,0.25)';
if(detectedIssues.halations){[159,386].forEach(idx=>{const lm=landmarks[idx];canvasCtx.beginPath();canvasCtx.arc(lm.x*canvasElement.width,lm.y*canvasElement.height,20,0,Math.PI*2);canvasCtx.fill();});}
if(detectedIssues.pigment){const lm=landmarks[205];canvasCtx.beginPath();canvasCtx.arc(lm.x*canvasElement.width,lm.y*canvasElement.height,25,0,Math.PI*2);canvasCtx.fill();}

}

function triggerQuestions(){ if(!lastResults) return alert('يرجى التقاط وجه واضح أولاً'); const qCard=document.getElementById('questionCard'); const qArea=document.getElementById('questionsArea'); qArea.innerHTML='';

const issuesList = Object.keys(detectedIssues);
issuesList.forEach(issue=>{
    let val=detectedIssues[issue]?'نعم':'لا';
    qArea.innerHTML+=`<label>${issue.replace('pigment','تصبغات').replace('freckles','نمش').replace('halations','هالات').replace('acne','حبوب').replace('dryness','جفاف')}؟</label>
    <select id='${issue}'><option value='نعم' ${val==='نعم'?'selected':''}>نعم</option><option value='لا' ${val==='لا'?'selected':''}>لا</option></select><br>`;

    if(issue==='pigment'||issue==='freckles'){
        qArea.innerHTML+=`<label>درجة اللون:</label><select id='${issue}_color'><option value='خفيف'>خفيف</option><option value='متوسط'>متوسط</option><option value='عميق'>عميق</option><option value='لا يوجد'>لا يوجد</option></select><br>`;
    }
    if(issue==='acne'){
        qArea.innerHTML+=`<label>لون الحبوب:</label><select id='${issue}_color'><option value='أحمر'>أحمر</option><option value='أبيض'>أبيض</option><option value='لا يوجد'>لا يوجد</option></select><br>`;
    }
});

document.getElementById('brightenChoice').value=storedBrighten;
qCard.classList.remove('hidden');

}

function computeRoutine(){ storedBrighten=document.getElementById('brightenChoice').value; const routineArea=document.getElementById('routineArea'); routineArea.innerHTML=''; routineArea.classList.remove('hidden');

let routine=`<div class='routine-card'><b>الروتين المخصص:</b><br>`;
routine+=`منتجات: سيروم فيتامين C, كريم عين, غسول مناسب, واقي شمس SPF50<br>`;
routine+=`المواد الفعالة: Vitamin C, Niacinamide, Hyaluronic Acid, Caffeine<br>`;
routine+=`اختيارك للنضارة/التفتيح: ${storedBrighten}</div>`;

routineArea.innerHTML=routine;
document.getElementById('recommendCard').classList.remove('hidden');

} </script>

</body>
</html>
