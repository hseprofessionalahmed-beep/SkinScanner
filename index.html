<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | V35 PRO</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}

.header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
.app-logo { width: 90%; max-height: 70px; object-fit: contain; }

.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}

.scopes-container { position: absolute; left: 8px; top: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 40; }
.scope-wrapper { display: flex; flex-direction: column; align-items: center; }
.scope-box { width: 48px; height: 48px; border: 1.5px solid var(--cyan); border-radius: 8px; overflow: hidden; background: #000; }
.scope-box canvas { width: 100%; height: 100%; position: static; }
.purity-bar { width: 45px; height: 3px; background: #333; border-radius: 2px; margin-top: 2px; overflow: hidden; }
.purity-fill { height: 100%; background: var(--cyan); width: 100%; transition: 0.5s; }

.live-overlay{position:absolute;top:15px;right:10px;z-index:30;}
.badge{background:rgba(0,0,0,0.8); padding:6px 12px; border-radius:20px; font-size:0.7rem; border:1px solid var(--gold); margin-bottom:5px; backdrop-filter:blur(5px);}

.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
.btn:disabled { background: #444; color: #777; cursor: not-allowed; }

.card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
.product-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; border-right: 3px solid var(--gold); }
.buy-btn { display: inline-block; background: var(--gold); color: #000; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; margin-top: 8px; }
select { width:100%; padding:10px; margin-bottom:15px; background:#222; color:#fff; border:1px solid #444; border-radius:8px; }
</style>
</head>
<body>

<div class="container">
    <div class="header-white">
        <img src="logo.png" alt="Verona AI" class="app-logo">
    </div>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        
        <div class="scopes-container">
            <div class="scope-wrapper"><div class="scope-box"><canvas id="scopeForehead"></canvas></div><div class="purity-bar"><div id="bar1" class="purity-fill"></div></div></div>
            <div class="scope-wrapper"><div class="scope-box"><canvas id="scopeEyes"></canvas></div><div class="purity-bar"><div id="bar2" class="purity-fill" style="background:var(--gold)"></div></div></div>
            <div class="scope-wrapper"><div class="scope-box"><canvas id="scopeRCheek"></canvas></div><div class="purity-bar"><div id="bar3" class="purity-fill"></div></div></div>
            <div class="scope-wrapper"><div class="scope-box"><canvas id="scopeLCheek"></canvas></div><div class="purity-bar"><div id="bar4" class="purity-fill"></div></div></div>
            <div class="scope-wrapper"><div class="scope-box"><canvas id="scopeMouth"></canvas></div><div class="purity-bar"><div id="bar5" class="purity-fill"></div></div></div>
        </div>

        <div class="live-overlay">
            <div id="lightLevel" class="badge">قياس الضوء...</div>
            <div id="lockStatus" class="badge" style="color:var(--red); border-color:var(--red);">🔒 الإضاءة غير كافية</div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startCam()">تشغيل الفحص الذكي 📸</button>
        <button id="analyzeBtn" class="btn" style="background: #25d366;" onclick="openQuestions()" disabled>تحليل النتائج المجهرية 🔍</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تخصيص الروتين</h3>
        
        <label>باقة إضافية؟</label>
        <select id="qGlow"><option value="yes">أريد نضارة وتفتيح ✨</option><option value="no">علاج العيوب فقط</option></select>

        <label>هل توجد هالات سوداء؟</label>
        <select id="qCircles">
            <option value="none">لا يوجد</option>
            <option value="brown">هالات بنية (تصبغات)</option>
            <option value="blue">هالات زرقاء (إرهاق)</option>
        </select>

        <label>تأكيد وجود حبوب؟</label>
        <select id="qAcne"><option value="no">لا</option><option value="yes">نعم</option></select>

        <label style="color:var(--red)">هل يوجد حمل أو رضاعة؟</label>
        <select id="qPreg"><option value="no">لا</option><option value="yes">نعم</option></select>

        <button class="btn" onclick="generateFinalReport()">عرض الروتين النهائي ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="skinTypeDisplay" style="text-align:center; color:var(--cyan); font-weight:bold; margin-bottom:15px;"></div>
        <div id="pkgContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">إعادة الفحص 🔄</button>
    </div>
</div>

<script>
const myPhone = "201063994139";
// قاعدة البيانات مع لينكات أمازون الخاصة بك
const productDB = {
    "ستارفيل وايتنينج": {p:145, t:"صباحاً ومساءً", b:"تفتيح وتوحيد اللون", link:"https://amzn.to/3YVfXfI"},
    "أرجنتو كلير": {p:165, t:"صباحاً ومساءً", b:"علاج الحبوب والتهابها", link:"https://amzn.to/3uN2R3Q"},
    "فيشي نورماديرم": {p:850, t:"صباحاً ومساءً", b:"غسول طبي للمسام الواسعة", link:"https://amzn.to/3uS4H6J"},
    "شان جيل": {p:195, t:"صباحاً ومساءً", b:"مرطب خفيف للبشرة", link:"https://amzn.to/3InR0Zk"},
    "ناتافيس فيتامين C": {p:485, t:"صباحاً فقط", b:"نضارة ومحاربة شحوب", link:"https://amzn.to/3SREm9v"},
    "ستارفيل آي كونتور": {p:155, t:"صباحاً ومساءً", b:"ترطيب محيط العين", link:"https://amzn.to/3uREn6Z"},
    "لاروش بيجمنتكلار": {p:1250, t:"مساءً فقط", b:"علاج هالات عميق", link:"https://amzn.to/3UPuK4D"},
    "بوباي جل": {p:180, t:"صباحاً", b:"حماية من الشمس SPF50", link:"https://amzn.to/3uREn6Z"}
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d',{willReadFrequently:true});
const scopes = { Forehead: document.getElementById('scopeForehead').getContext('2d'), Eyes: document.getElementById('scopeEyes').getContext('2d'), RCheek: document.getElementById('scopeRCheek').getContext('2d'), LCheek: document.getElementById('scopeLCheek').getContext('2d'), Mouth: document.getElementById('scopeMouth').getContext('2d') };

let aiAnalysis = {acne:false, skinType:'مختلطة'};
const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm=results.multiFaceLandmarks[0];
        drawConnectors(ctx,lm,FACEMESH_TESSELATION,{color:'#d4af3720',lineWidth:0.3});
        
        processScope(scopes.Forehead, lm[10]); processScope(scopes.Eyes, lm[230]); processScope(scopes.RCheek, lm[205]); processScope(scopes.LCheek, lm[425]); processScope(scopes.Mouth, lm[15]);

        const fore=getPx(lm[10]); const rCk=getPx(lm[205]);
        
        // --- تحسين اكتشاف الحبوب (Smart-Spot) ---
        // نقارن احمرار النقطة rCk بالنسبة لاحمرار الجبهة fore
        // إذا كان هناك "قفزة" كبيرة في اللون الأحمر في منطقة صغيرة، تعتبر حبة
        const redContrast = (rCk.r - rCk.g) - (fore.r - fore.g);
        aiAnalysis.acne = (redContrast > 25); // عتبة تمنع احمرار الأطفال الطبيعي
        
        aiAnalysis.skinType = (fore.v > 205) ? "دهنية" : (fore.v < 115 ? "جافة" : "مختلطة");

        const btn = document.getElementById('analyzeBtn');
        const lock = document.getElementById('lockStatus');
        if(fore.v > 125) {
            document.getElementById('lightLevel').innerText="✅ إضاءة كافية";
            btn.disabled = false; lock.style.display="none";
        } else {
            document.getElementById('lightLevel').innerText="⚠️ إضاءة ضعيفة";
            btn.disabled = true; lock.style.display="block";
        }
        // تحديث شرائط النقاء
        document.getElementById('bar1').style.width = (100 - (redContrast > 0 ? redContrast : 0)) + "%";
    }
});

function processScope(sCtx, pt) {
    const x = pt.x * canvas.width - 25; const y = pt.y * canvas.height - 25;
    sCtx.canvas.width = 100; sCtx.canvas.height = 100;
    sCtx.drawImage(canvas, x, y, 50, 50, 0, 0, 100, 100);
}
function getPx(p){ const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height); const d=ctx.getImageData(x,y,1,1).data; return {r:d[0],g:d[1],v:(d[0]+d[1]+d[2])/3}; }
function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function openQuestions(){ document.getElementById('controls').style.display='none'; document.getElementById('questionsCard').style.display='block'; document.getElementById('qAcne').value=aiAnalysis.acne?"yes":"no"; }

function generateFinalReport(){
    document.getElementById('questionsCard').style.display='none'; document.getElementById('reportCard').style.display='block';
    document.getElementById('skinTypeDisplay').innerText = "نتائج الفحص المجهري: بشرة " + aiAnalysis.skinType;

    const container=document.getElementById('pkgContainer'); container.innerHTML="";
    const selectedPacks = [{n:'الروتين الأساسي', id:'base'}];
    if(document.getElementById('qGlow').value==='yes') selectedPacks.push({n:'باقة النضارة الفائقة ✨', id:'glow'});

    selectedPacks.forEach(pack => {
        let html = `<h4 style="color:var(--gold); border-bottom:1px solid #333; margin-top:20px;">${pack.n}</h4>`;
        let list = (pack.id==='glow') ? ["ناتافيس فيتامين C", "ستارفيل وايتنينج"] : ["أرجنتو كلير", "شان جيل", "بوباي جل"];
        
        if(document.getElementById('qCircles').value !== 'none') list.push("ستارفيل آي كونتور");

        list.forEach(name => {
            const d = productDB[name];
            html += `<div class="product-box">
                <b>${name}</b><br><small style="color:var(--cyan)">${d.t}</small><br>
                <small>${d.b}</small><br>
                <a href="${d.link}" target="_blank" class="buy-btn">شراء عبر أمازون 🛒</a>
            </div>`;
        });
        container.innerHTML += html;
    });
}
</script>
</body>
</html>
