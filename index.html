<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | FINAL FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; border-radius: 20px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; background: #000; }
        video, canvas, #userImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        /* النصوص اللي بتظهر فوق الصورة */
        #onImageStatus {
            position: absolute; top: 20px; left: 20px; right: 20px; z-index: 1000;
            background: rgba(0,0,0,0.8); color: var(--gold); padding: 10px;
            border-radius: 10px; border: 1px solid var(--gold); font-weight: bold; text-align: center;
        }

        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; display: block; }
        .result-btn { background: #25d366; color: white; font-size: 1.1rem; border: 2px solid #fff; }
        
        .card { background: #111; border: 1px solid var(--gold); border-radius: 20px; padding: 15px; display: none; margin-top: 15px; }
        .product-item { border-bottom: 1px solid #333; padding: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">VERONA AI | التشخيص الذكي</h2>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <img id="userImg" style="display:none; z-index: 5;">
        <canvas id="canvas" style="z-index: 10;"></canvas>
        
        <div id="onImageStatus">بانتظار الصورة...</div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startCam()">1. فتح الكاميرا 📸</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="document.getElementById('fileInput').click()">2. رفع صورة 🖼️</button>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        
        <button id="showResBtn" class="btn result-btn" onclick="showAnalysisStep()">3. أظهر النتيجة 🔍</button>
    </div>

    <div id="analysisCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تحليل الذكاء الاصطناعي 🔬</h3>
        <p id="summary" style="text-align: center;"></p>
        <hr>
        <label>تأكيد: هل تعاني من حبوب حالياً؟</label>
        <select id="qAcne" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border-radius:8px;">
            <option value="no">لا</option><option value="yes">نعم</option>
        </select>
        <button class="btn" onclick="finalRoutine()">عرض الروتين النهائي ✨</button>
    </div>

    <div id="routineCard" class="card">
        <div id="routineContent"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">إعادة الفحص 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let aiResults = { acne: false, pig: false, skin: 'مختلطة' };

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
    
    faceMesh.onResults(results => {
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const lm = results.multiFaceLandmarks[0];
            
            // معادلات الرصد الأساسية V23
            const fore = getPx(lm[10]); const cheek = getPx(lm[205]);
            aiResults.acne = (cheek.r - cheek.g > 35);
            aiResults.pig = (cheek.v / fore.v < 0.85);
            aiResults.skin = (fore.v > 200) ? "دهنية" : "مختلطة";

            // إظهار النتيجة فوراً "على الصورة"
            let msg = "تم الرصد: بشرة " + aiResults.skin;
            if(aiResults.acne) msg += " + حبوب ملتهبة 🔴";
            if(aiResults.pig) msg += " + تصبغات 🟤";
            if(!aiResults.acne && !aiResults.pig) msg = "تم الرصد: بشرة نقية وصافية ✨";
            
            document.getElementById('onImageStatus').innerText = msg;
        }
    });

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width); const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], v: (d[0]+d[1]+d[2])/3 };
    }

    function startCam() { new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); canvas.width=640; canvas.height=480; }

    function handleImage(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            const img = document.getElementById('userImg');
            img.src = ev.target.result; img.style.display = 'block';
            img.onload = () => { canvas.width=img.width; canvas.height=img.height; faceMesh.send({image: img}); };
        };
        r.readAsDataURL(e.target.files[0]);
    }

    function showAnalysisStep() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('analysisCard').style.display = 'block';
        document.getElementById('summary').innerText = document.getElementById('onImageStatus').innerText;
        document.getElementById('qAcne').value = aiResults.acne ? "yes" : "no";
    }

    function finalRoutine() {
        document.getElementById('analysisCard').style.display = 'none';
        document.getElementById('routineCard').style.display = 'block';
        let html = `<h3>الروتين المقترح:</h3>`;
        html += `<div class="product-item"><b>غسول أرجنتو كلير</b><br><small>للتنظيف العميق وعلاج العيوب</small></div>`;
        html += `<div class="product-item"><b>مرطب شان جيل</b><br><small>لترطيب البشرة وحمايتها</small></div>`;
        document.getElementById('routineContent').innerHTML = html;
    }
</script>
</body>
</html>
