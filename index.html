<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | FINAL STABLE V5</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; overflow-x: hidden; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; margin-bottom: 15px; }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #upImg { display: none; z-index: 5; }
        canvas { z-index: 10; pointer-events: none; }
        
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--gold); top: 0; display: none; animation: scan 2s infinite linear; z-index: 15; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .row-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-black { background: #222; color: #fff; border: 1px solid #444; }

        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .routine-item { background: rgba(0,0,0,0.4); padding: 15px; border-right: 4px solid var(--gold); border-radius: 8px; margin-bottom: 12px; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-shadow: 0 2px 4px #000; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); margin-bottom:20px;">VERONA AI | التحليل السريري</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div class="scan-line" id="sLine"></div>
        <div id="liveStatus">بانتظار الصورة أو الكاميرا...</div>
    </div>

    <div class="btn-group" id="controls">
        <div class="row-btns">
            <button class="btn btn-black" onclick="startCam()">فتح الكاميرا 📸</button>
            <label class="btn btn-black" style="display:flex; align-items:center; justify-content:center;">
                أضف صورة 📁 <input type="file" hidden onchange="handleFile(event)">
            </label>
        </div>
        <button id="runBtn" class="btn" onclick="processAnalysis()">بدء تحليل الجلد الآن 🔬</button>
    </div>

    <div id="reportCard" class="card">
        <div id="scoreDisplay" style="font-size:3rem; text-align:center; color:var(--gold); font-weight:900;">100%</div>
        <div id="skinTypeBox" style="text-align:center; color:#00f2ff; margin-bottom:15px; font-weight:bold;"></div>
        
        <div id="diagBox"></div>
        <div id="routBox"></div>

        <div class="routine-item" style="border-color:#fff; background:rgba(212,175,55,0.1); margin-top:20px;">
            <b style="color:var(--gold)">📋 تعليمات خبير Verona:</b><br>
            <small>
                • شرب الماء بكثرة هو مفتاح مرونة الأدمة.<br>
                • لا تستخدمي منشفة خشنة على مناطق الحبوب.<br>
                • الالتزام بالروتين لمدة 21 يوماً لرؤية النتائج.
            </small>
        </div>
        <button class="btn btn-black" style="width:100%; margin-top:15px;" onclick="location.reload()">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const liveStatus = document.getElementById('liveStatus');
    
    let faceMesh, lastResults = null;
    let analysis = { acne: false, pig: false, dark: false, dry: false, skinType: "مختلطة" };

    async function init() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(results => {
            lastResults = results;
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            
            if (results.multiFaceLandmarks) {
                runLogic(results.multiFaceLandmarks[0]);
            }
        });
    }

    function runLogic(lm) {
        const forehead = getL(lm[10]);
        const cheek = getL(lm[205]);
        const eye = getL(lm[101]);

        // تحديد النوع
        if (forehead.v > 180) analysis.skinType = "دهنية";
        else if (forehead.v < 110) analysis.skinType = "جافة";
        else analysis.skinType = "مختلطة";

        // التحليل
        analysis.dark = (eye.v / forehead.v) < 0.86;
        analysis.pig = (cheek.v / forehead.v) < 0.88;
        analysis.acne = (cheek.r > cheek.g * 1.18); 
        analysis.dry = (forehead.v < 115);

        liveStatus.innerText = `بشرة ${analysis.skinType} | تم رصد الملامح بنجاح ✅`;
    }

    function getL(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], b: d[2], v: (d[0]+d[1]+d[2])/3 };
    }

    function processAnalysis() {
        document.getElementById('sLine').style.display = 'block';
        setTimeout(() => {
            document.getElementById('sLine').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            showFinalReport();
        }, 2500);
    }

    function showFinalReport() {
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeBox').innerText = "نوع البشرة المكتشف: " + analysis.skinType;
        
        let score = 100;
        let diag = "<b>التشخيص المجهري:</b><br>";
        let rout = "";

        // فحص حالة الطفل أو البشرة الصافية
        if (!analysis.acne && !analysis.pig && !analysis.dark && !analysis.dry) {
            diag += "• حالة الجلد: مثالية ونقية.<br>";
            rout += addItem("الحماية", "Verona Kids Protection", "حماية فيزيائية");
            rout += addItem("الترطيب", "Verona Soft Cream", "Panthenol");
        } else {
            if (analysis.acne) { score -= 15; diag += "• حبوب حمراء ملتهبة نشطة.<br>"; rout += addItem("علاج الحبوب", "Verona Acni-Clear Serum", "Salicylic Acid"); }
            if (analysis.pig) { score -= 12; diag += "• تصبغات بنية متفاوتة.<br>"; rout += addItem("التفتيح", "Verona Melano-Fade Serum", "Alpha Arbutin"); }
            if (analysis.dark) { score -= 8; diag += "• هالات سوداء تحت العين.<br>"; rout += addItem("عناية العين", "Verona Eye-Lift Cream", "Caffeine"); }
            
            if (analysis.skinType === "جافة" || analysis.dry) {
                diag += "• جفاف حاد وفقدان للترطيب.<br>";
                rout += addItem("الترطيب الإلزامي 💧", "Verona Hydro-Boost", "Hyaluronic Acid");
            }
        }

        document.getElementById('scoreDisplay').innerText = score + "%";
        document.getElementById('diagBox').innerHTML = diag;
        document.getElementById('routBox').innerHTML = rout;
    }

    function addItem(t, n, a) { return `<div class="routine-item"><b>${t}:</b><br>${n}<br><small style="color:#00f2ff">المادة: ${a}</small></div>`; }

    function startCam() { upImg.style.display='none'; video.style.display='block'; new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); }
    
    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => {
            upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none';
            upImg.onload = async () => await faceMesh.send({image: upImg});
        };
        r.readAsDataURL(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
