<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI - فحص البشرة</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">VERONA <span>AI</span></h1>
            <p>تحليل البشرة المعتمد على الذكاء الاصطناعي</p>
        </header>

        <div class="main-scanner">
            <div class="video-wrapper">
                <video id="video" autoplay muted playsinline></video>
                <div id="loading-overlay">جاري تهيئة المحرك...</div>
            </div>
            
            <div class="action-buttons">
                <button id="scanBtn" class="btn-primary">فحص فوري للوجه 🔍</button>
                <label for="imageUpload" class="btn-secondary">تحميل صورة من المعرض 🖼️</label>
                <input type="file" id="imageUpload" accept="image/*" hidden>
            </div>
        </div>

        <div id="results" class="results-container" style="display:none;"></div>
    </div>

    <script src="ai_face_scan.js"></script>
    <script src="script.js"></script>
</body>
</html>
