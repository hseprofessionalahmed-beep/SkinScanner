<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | V17.2 CUSTOM</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; margin-bottom: 15px; }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #upImg { display: none; z-index: 5; }
        canvas { z-index: 10; pointer-events: none; }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .card { background: rgba(0,0,0,0.9); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .product-card { display: flex; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 15px; padding: 10px; margin-bottom: 12px; align-items: center; gap: 12px; }
        .product-img { width: 85px; height: 85px; border-radius: 8px; object-fit: cover; background: #fff; border: 1px solid var(--gold); }
        .product-name { color: var(--gold); font-weight: bold; font-size: 0.9rem; margin-bottom: 2px; }
        .active-ing { font-size: 0.75rem; color: #00f2ff; display: block; }
        .product-usage { font-size: 0.8rem; color: #ccc; line-height: 1.3; }
        .buy-link { display: inline-block; background: #232f3e; color: #ff9900; padding: 7px 12px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.75rem; border: 1px solid #ff9900; margin-top: 8px; }
        .wa-link { display: inline-block; background: #25d366; color: white; padding: 7px 12px; border-radius: 6px; text-decoration: none; font-size: 0.75rem; margin-right: 5px; }
        select { width: 100%; padding: 12px; border-radius: 8px; background: #1a1a1a; color: #fff; border: 1px solid #444; margin-bottom: 15px; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-shadow: 0 2px 4px #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">VERONA AI | PRO V17.2</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div id="liveStatus">بانتظار الصورة...</div>
    </div>

    <div id="controls">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#222; color:#fff;" onclick="startCam()">الكاميرا 📸</button>
            <label class="btn" style="background:#222; color:#fff; display:flex; align-items:center; justify-content:center;">
                صورة 📁 <input type="file" hidden onchange="handleFile(event)">
            </label>
        </div>
        <button class="btn" onclick="openQuestions()">تحليل البشرة والروتين 🔬</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="text-align:center; color:var(--gold)">تخصيص الروتين</h3>
        
        <label>1. هل توجد حبوب ملتهبة؟</label>
        <select id="qAcne"><option value="no">لا يوجد</option><option value="yes">نعم</option></select>

        <label>2. ما هو هدفك الأساسي؟</label>
        <select id="qGoal">
            <option value="glow">باقة النضارة والامتلاء ✨</option>
            <option value="whitening">باقة التفتيح وإزالة البقع ⚪</option>
            <option value="none">الروتين الأساسي فقط</option>
        </select>

        <label>3. الميزانية:</label>
        <select id="qBudget">
            <option value="low">اقتصادي</option>
            <option value="mid" selected>متوسط</option>
            <option value="high">فاخر</option>
        </select>

        <button class="btn" onclick="generateFinalReport()">عرض الروتين النهائي ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="scoreDisplay" style="font-size:3rem; text-align:center; color:var(--gold); font-weight:900;">100%</div>
        <div id="skinTypeDisplay" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:10px;"></div>
        <div id="routineList"></div>
        <button class="btn" style="background:#25d366; color:white;" onclick="sendToWhatsApp()">اطلب الروتين 💬</button>
        <button class="btn" style="background:#333; color:#fff;" onclick="location.reload()">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const myPhone = "201063994139";
    const productDB = {
        "أرجنتو كلير": { img: "https://m.media-amazon.com/images/I/41D8WpG4EHL._AC_SY450_.jpg", ing: "شجرة الشاي", use: "علاج الحبوب.", link: "https://amzn.to/4aNwLtH" },
        "ستارفيل وايتنينج": { img: "https://m.media-amazon.com/images/I/51p6KxR2Y1L._AC_SY450_.jpg", ing: "أربوتين", use: "تفتيح يومي.", link: "https://amzn.to/4kIiMtC" },
        "لوريال هيالورونيك": { img: "https://m.media-amazon.com/images/I/61S4iN4A7KL._AC_SY450_.jpg", ing: "هيالورونيك 1.5%", use: "نضارة فائقة.", link: "https://amzn.to/4aKX5om" },
        "ديرماتيك جيل": { img: "https://m.media-amazon.com/images/I/51Kz5r0W-SL._AC_SY450_.jpg", ing: "هيالورونيك، B5", use: "ترطيب النضارة.", link: "https://amzn.to/3OsdarB" },
        "شان جيل": { img: "https://m.media-amazon.com/images/I/51r9vS3A8YL._AC_SY450_.jpg", ing: "بانثينول", use: "مرطب طبي.", link: "https://amzn.to/4arUPn4" },
        "ناتافيس فيتامين C": { img: "https://m.media-amazon.com/images/I/41D8WpG4EHL._AC_SY450_.jpg", ing: "Vitamin C + Ferulic", use: "تفتيح ونضارة.", link: "https://amzn.to/4rvjltF" },
        "فيشي نورماديرم": { img: "https://m.media-amazon.com/images/I/51uIuE8-WvL._AC_SY450_.jpg", ing: "ساليسيليك", use: "غسول طبي فاخر.", link: "https://amzn.to/3ORZvKm" }
    };

    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    let faceMesh, aiAnalysis = { acne: false, skinType: 'مختلطة' };
    let finalSelection = [];

    async function init() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults(results => {
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks) runV16AI(results.multiFaceLandmarks[0]);
        });
    }

    // محرك V16.1 الأصلي الدقيق
    function runV16AI(lm) {
        const forehead = getPx(lm[10]);
        const cheek = getPx(lm[205]);
        if (forehead.v > 205) aiAnalysis.skinType = "دهنية";
        else if (forehead.v < 115) aiAnalysis.skinType = "جافة";
        else aiAnalysis.skinType = "مختلطة";
        aiAnalysis.acne = (cheek.r - cheek.g > 35 && cheek.r > forehead.r * 1.25);
        if (cheek.v > 190) aiAnalysis.acne = false;
        document.getElementById('liveStatus').innerText = `تحليل Verona V17.2 ✅`;
    }

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], b: d[2], v: (d[0]+d[1]+d[2])/3 };
    }

    function openQuestions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
        document.getElementById('qAcne').value = aiAnalysis.acne ? "yes" : "no";
    }

    function generateFinalReport() {
        const acne = document.getElementById('qAcne').value === 'yes';
        const goal = document.getElementById('qGoal').value;
        const budget = document.getElementById('qBudget').value;

        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeDisplay').innerText = "بشرة " + aiAnalysis.skinType;
        
        buildRoutine(acne, goal, budget);
    }

    function buildRoutine(acne, goal, budget) {
        const list = document.getElementById('routineList');
        list.innerHTML = ""; finalSelection = [];

        // 1. الغسول الأساسي
        if(budget === 'high') addP("الغسول", "فيشي نورماديرم");
        else addP("الغسول", "ستارفيل وايتنينج");

        // 2. معالجة الحبوب إذا وجدت
        if(acne) addP("علاج الحبوب", "أرجنتو كلير");

        // 3. إضافة الباقة المختارة (نضارة أو تفتيح)
        if(goal === 'glow') {
            if(budget === 'high') addP("باقة النضارة", "لوريال هيالورونيك");
            else addP("باقة النضارة", "ديرماتيك جيل");
        } else if(goal === 'whitening') {
            addP("باقة التفتيح", "ناتافيس فيتامين C");
        }

        // 4. المرطب الأساسي
        addP("الترطيب", "شان جيل");
    }

    function addP(cat, name) {
        const p = productDB[name] || { img: "", ing: "طبي", use: "علاج", link: "#" };
        finalSelection.push(`${cat}: ${name}`);
        document.getElementById('routineList').innerHTML += `
            <div class="product-card">
                <img src="${p.img}" class="product-img">
                <div class="product-info">
                    <div class="product-name">${name}</div>
                    <span class="active-ing">🔬 ${cat}</span>
                    <div class="product-usage">${p.use}</div>
                    <a href="${p.link}" target="_blank" class="buy-link">شراء 🛒</a>
                    <a href="https://wa.me/${myPhone}?text=بديل لـ ${name}" class="wa-link">بديل 💬</a>
                </div>
            </div>`;
    }

    function sendToWhatsApp() {
        let msg = `Verona AI V17.2:\nالبشرة: ${aiAnalysis.skinType}\nالروتين المختصر:\n`;
        finalSelection.forEach(p => msg += `• ${p}\n`);
        window.open(`https://wa.me/${myPhone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function startCam() { upImg.style.display='none'; video.style.display='block'; new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); }
    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => { upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none'; upImg.onload = async () => await faceMesh.send({image: upImg}); };
        r.readAsDataURL(e.target.files[0]);
    }
    init();
</script>
</body>
</html>
