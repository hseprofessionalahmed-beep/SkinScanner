<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI - CLINICAL ELITE</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        :root {
            --gold: linear-gradient(135deg, #a67c00 0%, #ffbf00 50%, #a67c00 100%);
            --gold-solid: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --neon-blue: #00f2ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--dark-bg);
            color: #fff;
            margin: 0;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* واجهة التحميل */
        #splash {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .loader {
            width: 50px; height: 50px; border: 3px solid #333;
            border-top: 3px solid var(--gold-solid); border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .container { max-width: 600px; margin: auto; padding: 20px; }

        .header { text-align: center; padding: 30px 0; }
        .header h1 { 
            background: var(--gold); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; font-size: 2.2rem; margin: 0;
            letter-spacing: 2px;
        }

        /* منطقة المسح */
        .scanner-container {
            position: relative; border-radius: 30px; overflow: hidden;
            border: 2px solid var(--gold-solid); background: #000;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        video, canvas { width: 100%; display: block; }

        .scan-bar {
            position: absolute; width: 100%; height: 2px;
            background: var(--neon-blue); box-shadow: 0 0 15px var(--neon-blue);
            top: 0; display: none; z-index: 5;
            animation: scanMove 2s infinite linear;
        }

        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        /* البطاقات والنتائج */
        .card {
            background: var(--card-bg); border: 1px solid rgba(212,175,55,0.2);
            border-radius: 20px; padding: 20px; margin-top: 20px;
            backdrop-filter: blur(10px); display: none;
        }

        .score-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid var(--gold-solid); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2.2rem; font-weight: bold; color: var(--gold-solid);
            text-shadow: 0 0 15px rgba(212,175,55,0.5);
        }

        .gold-btn {
            background: var(--gold); color: #000; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: bold;
            width: 100%; cursor: pointer; margin-top: 15px;
            transition: 0.3s; font-size: 1rem;
        }

        .gold-btn:hover { transform: scale(1.02); opacity: 0.9; }

        .routine-item {
            background: rgba(255,255,255,0.03); border-right: 4px solid var(--gold-solid);
            padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: right;
        }

        .active-tag {
            display: inline-block; background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue); font-size: 0.7rem; padding: 2px 8px;
            border-radius: 5px; margin-top: 5px; border: 1px solid var(--neon-blue);
        }

        select, input {
            width: 100%; padding: 12px; border-radius: 10px; background: #1a1a1a;
            color: #fff; border: 1px solid #333; margin: 10px 0;
        }

        .instruction-box {
            background: rgba(212, 175, 55, 0.05); padding: 15px;
            border-radius: 12px; border: 1px dashed var(--gold-solid);
            font-size: 0.85rem; color: #ccc; text-align: right;
        }
    </style>
</head>
<body>

<div id="splash">
    <div class="loader"></div>
    <p style="margin-top:20px; letter-spacing:3px; color:var(--gold-solid)">INITIALIZING AI ENGINE...</p>
</div>

<div class="container">
    <div class="header">
        <h1>VERONA <span style="color:#fff">AI ELITE</span></h1>
        <p style="color:#666; font-size:0.8rem;">نظام التحليل السريري المتقدم V3.0</p>
    </div>

    <div class="scanner-container">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="scan-bar" id="scanBar"></div>
    </div>

    <div id="controls" style="margin-top:20px;">
        <button class="gold-btn" onclick="startAnalysis()">ابدأ الفحص المجهري 🔬</button>
        <p id="statusTxt" style="text-align:center; font-size:0.8rem; color:#888; margin-top:10px;">بانتظار تفعيل الكاميرا...</p>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold-solid); text-align:center;">تأكيد البيانات السريرية</h3>
        <label>التصبغات المكتشفة:</label>
        <select id="pLevel">
            <option value="0">لا يوجد</option>
            <option value="1">خفيفة (آثار شمس)</option>
            <option value="2">متوسطة (تفاوت لون)</option>
            <option value="3">عميقة (كلف/نمش)</option>
        </select>
        
        <label>درجة الحبوب:</label>
        <select id="aLevel">
            <option value="0">لا يوجد</option>
            <option value="1">رؤوس سوداء/بيضاء</option>
            <option value="2">حبوب حمراء ملتهبة</option>
        </select>

        <label>باقات إضافية:</label>
        <div style="display:flex; gap:10px;">
            <label style="font-size:0.8rem;"><input type="checkbox" id="glowIn"> باقة نضارة ✨</label>
            <label style="font-size:0.8rem;"><input type="checkbox" id="brightIn"> باقة تفتيح 🤍</label>
        </div>

        <button class="gold-btn" onclick="showResults()">استخراج التقرير النهائي 📄</button>
    </div>

    <div id="resultsCard" class="card">
        <div class="score-circle" id="finalScore">0%</div>
        <p style="text-align:center; color:#888; margin-top:-10px; margin-bottom:20px;">Skin Health Index</p>
        
        <div id="clinicalInfo" class="instruction-box" style="margin-bottom:20px;"></div>
        
        <div id="routineOutput"></div>

        <div class="instruction-box" style="margin-top:20px;">
            <b>📋 بروتوكول العناية Verona:</b><br>
            • شرب 3 لتر ماء (يمنع جفاف الأدمة).<br>
            • غطاء وسادة حريري (يمنع احتكاك الحبوب).<br>
            • النوم قبل منتصف الليل (تجديد خلايا).
        </div>

        <button class="gold-btn" onclick="location.reload()" style="background:#222; color:#fff; border:1px solid #444;">إعادة الفحص 📸</button>
    </div>

</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d');
const scanBar = document.getElementById('scanBar');

let faceMesh;
let detectedType = "مختلطة";
let analysisComplete = false;

// 1. إعداد المحرك
async function init() {
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start().then(() => {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('statusTxt').innerText = "تم الاتصال بالمحرك.. وجه الكاميرا نحوك";
    });
}

function onResults(results) {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
            // رسم نقاط التشخيص الطبية
            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#d4af3733', lineWidth: 0.5});
            
            // خوارزمية ذكية لتحليل نوع البشرة (بناءً على تباين الإضاءة)
            if(!analysisComplete) {
                let brightness = landmarks[10].y * 100; // مثال مبسط
                detectedType = brightness > 50 ? "دهنية" : (brightness < 30 ? "جافة" : "مختلطة");
            }
        }
    }
    canvasCtx.restore();
}

function startAnalysis() {
    scanBar.style.display = "block";
    document.getElementById('statusTxt').innerText = "جاري مسح طبقات الجلد الحيوية...";
    
    setTimeout(() => {
        analysisComplete = true;
        scanBar.style.display = "none";
        document.getElementById('controls').style.display = "none";
        document.getElementById('questionsCard').style.display = "block";
        videoElement.pause();
    }, 3000);
}

function showResults() {
    document.getElementById('questionsCard').style.display = "none";
    document.getElementById('resultsCard').style.display = "block";

    let p = document.getElementById('pLevel').value;
    let a = document.getElementById('aLevel').value;
    let glow = document.getElementById('glowIn').checked;
    let bright = document.getElementById('brightIn').checked;

    // حساب النتيجة
    let score = 95 - (p*5 + a*7);
    document.getElementById('finalScore').innerText = score + "%";

    // المعلومات السريرية
    let info = `نوع البشرة: <b>${detectedType}</b><br>`;
    if(detectedType === "جافة") info += `⚠️ بشرتك تحتاج ترطيب مكثف لمدة 10 أيام قبل البدء.`;
    document.getElementById('clinicalInfo').innerHTML = info;

    // بناء الروتين
    let routine = `<h3 style="text-align:right; color:var(--gold-solid);">روتينك المخصص:</h3>`;
    
    // الأساسيات
    let cleanser = (detectedType === "دهنية") ? "غسول ستارفيل اكتيف" : "غسول ميلانو جينتل";
    routine += createItem("الأساسي 1: الغسول", cleanser, "Niacinamide, Zinc");
    routine += createItem("الأساسي 2: الحماية", "صن بلوك كولاجرا SPF50", "Zinc Oxide, UV Filters");

    // العلاجات
    if(a > 0) routine += createItem("علاج الحبوب", "سيروم ستارفيل للحبوب", "Salicylic Acid 2%");
    if(p > 0 || bright) routine += createItem("تفتيح التصبغات", "سيروم ميلانو إيليت", "Alpha Arbutin, Vitamin C");
    if(glow) routine += createItem("باقة النضارة", "سيروم الهيالورونيك + ماسك الذهب", "Pure Hyaluronic Acid");

    document.getElementById('routineOutput').innerHTML = routine;
}

function createItem(title, name, actives) {
    return `<div class="routine-item">
                <b>${title}:</b><br>${name}
                <br><span class="active-tag">المواد الفعالة: ${actives}</span>
                <button class="gold-btn" style="padding:5px; font-size:0.7rem;" onclick="window.open('https://wa.me/201063994139')">اطلب الآن ✅</button>
            </div>`;
}

init();
</script>

</body>
</html>
