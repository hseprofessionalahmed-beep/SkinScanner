<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | CLINICAL ELITE V6</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; margin-bottom: 15px; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #upImg { display: none; z-index: 5; }
        canvas { z-index: 10; pointer-events: none; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--gold); top: 0; display: none; animation: scan 2s infinite linear; z-index: 15; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .routine-item { background: rgba(0,0,0,0.4); padding: 15px; border-right: 4px solid var(--gold); border-radius: 8px; margin-bottom: 12px; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-shadow: 0 2px 4px #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">VERONA AI | النظام السريري المطور</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div class="scan-line" id="sLine"></div>
        <div id="liveStatus">جاري تهيئة النظام...</div>
    </div>

    <div id="controls">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#222; color:#fff;" onclick="startCam()">الكاميرا 📸</button>
            <label class="btn" style="background:#222; color:#fff; display:flex; align-items:center; justify-content:center;">
                صورة 📁 <input type="file" hidden onchange="handleFile(event)">
            </label>
        </div>
        <button class="btn" id="runBtn" onclick="processAnalysis()">بدء التحليل العميق 🔬</button>
    </div>

    <div id="reportCard" class="card">
        <div id="score" style="font-size:3rem; text-align:center; color:var(--gold); font-weight:900;">100%</div>
        <div id="skinType" style="text-align:center; color:#00f2ff; margin-bottom:15px; font-weight:bold;"></div>
        <div id="diag"></div>
        <div id="rout"></div>
        <button class="btn" style="background:#333; color:#fff;" onclick="location.reload()">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const liveStatus = document.getElementById('liveStatus');
    
    let faceMesh, analysis = { acne: false, pig: false, dark: false, skinType: "مختلطة" };

    async function init() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults(results => {
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks) runLogic(results.multiFaceLandmarks[0]);
        });
        liveStatus.innerText = "النظام جاهز للتحليل ✅";
    }

    function runLogic(lm) {
        const forehead = getPx(lm[10]);
        const cheek = getPx(lm[205]);
        const eye = getPx(lm[101]);

        // تحديد نوع البشرة
        if (forehead.v > 190) analysis.skinType = "دهنية";
        else if (forehead.v < 115) analysis.skinType = "جافة";
        else analysis.skinType = "مختلطة";

        // منطق التفريق اللوني الاحترافي
        // 1. كشف الحبوب (يجب أن يكون اللون الأحمر صافياً ومهيمناً)
        analysis.acne = (cheek.r > cheek.g * 1.3) && (cheek.r > cheek.b * 1.3);

        // 2. كشف التصبغات والنمش (اللون البني يكون فيه الأحمر والأخضر متقاربين وأغمق من الجبهة)
        const isBrownish = (cheek.r > cheek.g) && (Math.abs(cheek.r - cheek.g) < 40);
        analysis.pig = isBrownish && (cheek.v < forehead.v * 0.85);

        // 3. كشف الهالات
        analysis.dark = (eye.v < forehead.v * 0.82);

        let msg = `بشرة ${analysis.skinType} | `;
        if (analysis.acne) msg += "⚠️ حبوب ملتهبة ";
        else if (analysis.pig) msg += "⚠️ تصبغات/نمش ";
        else msg += "✅ مظهر نقي ";
        
        liveStatus.innerText = msg;
    }

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], b: d[2], v: (d[0]+d[1]+d[2])/3 };
    }

    function processAnalysis() {
        document.getElementById('sLine').style.display = 'block';
        setTimeout(() => {
            document.getElementById('sLine').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            showFinal();
        }, 2000);
    }

    function showFinal() {
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinType').innerText = "نوع البشرة: " + analysis.skinType;
        let s = 100, dTxt = "", rTxt = "";

        if (!analysis.acne && !analysis.pig && !analysis.dark) {
            dTxt = "• حالة الجلد: صافية ومستقرة تماماً.<br>";
            rTxt += addR("الوقاية", "Verona Protective Cream", "حماية واسعة المدى");
        } else {
            if (analysis.acne) { s-=15; dTxt += "• تم رصد التهاب نشط (حبوب حمراء).<br>"; rTxt += addR("علاج الحبوب", "Verona Acni-Clear", "Salicylic Acid"); }
            if (analysis.pig) { s-=12; dTxt += "• تم رصد تصبغات/نمش بني.<br>"; rTxt += addR("تفتيح البقع", "Verona Melano-Fade", "Alpha Arbutin"); }
            if (analysis.dark) { s-=8; dTxt += "• تم رصد هالات وعائية.<br>"; rTxt += addR("عناية العين", "Verona Eye-Lift", "Caffeine"); }
            
            if (analysis.skinType === "جافة") {
                dTxt += "• تنبيه: نقص في المحتوى المائي للأدمة.<br>";
                rTxt += addR("ترطيب إلزامي 💧", "Verona Hydro-Boost", "Hyaluronic Acid");
            }
        }
        document.getElementById('score').innerText = s + "%";
        document.getElementById('diag').innerHTML = dTxt;
        document.getElementById('rout').innerHTML = rTxt;
    }

    function addR(t, n, a) { return `<div class="routine-item"><b>${t}:</b><br>${n}<br><small style="color:#00f2ff">المادة: ${a}</small></div>`; }
    function startCam() { upImg.style.display='none'; video.style.display='block'; new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); }
    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => { upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none'; upImg.onload = async () => await faceMesh.send({image: upImg}); };
        r.readAsDataURL(e.target.files[0]);
    }
    init();
</script>
</body>
</html>
