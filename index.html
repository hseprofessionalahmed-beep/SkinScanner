<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | RESCUE V46</title>
    <style>
        :root { --gold:#d4af37; --bg:#0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 15px 0; text-align: center; border-bottom: 3px solid var(--gold); }
        .app-logo { width: 85%; max-height: 60px; object-fit: contain; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; background: #000; margin-bottom: 15px; }
        #video, #canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: linear-gradient(135deg,#a67c00,#ffbf00); color: #000; border: none; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 25px; padding: 20px; display: none; margin-top: 15px; }
        .loading-box { text-align: center; padding: 20px; display: none; }
        .status-msg { background: #1a1a1a; padding: 15px; border-radius: 12px; border-right: 4px solid var(--gold); margin-bottom: 15px; line-height: 1.8; white-space: pre-wrap; }
        .buy-link { display: inline-block; background: var(--gold); color: #000; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin: 5px 0; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>
    <div class="preview-box">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
    <div id="controls">
        <button class="btn" onclick="captureAndAnalyze()">فحص البشرة بـ Verona AI 🔍</button>
    </div>
    <div id="loading" class="loading-box">
        <div class="spinner"></div>
        <p>جاري محاولة الاتصال بمحرك الذكاء الاصطناعي...</p>
    </div>
    <div id="reportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تقرير التشخيص النهائي</h3>
        <div id="aiResult" class="status-msg"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">محاولة مرة أخرى 🔄</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyA1G6Dgxz-ZmwdgQWZRUmhFEwFRufpxXXI";
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    async function captureAndAnalyze() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
        
        document.getElementById('controls').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        // محاولة استخدام الموديل البديل المباشر لحل مشكلة "Not Found"
        const endpoints = [
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
            `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`
        ];

        let success = false;
        for (let url of endpoints) {
            try {
                const res = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: "أنت خبير جلدية. حلل الصورة بدقة. اذكر نوع البشرة، والمشاكل (تصبغات، بقع)، والروتين: (ستارفيل وايتنينج: https://amzn.to/3YVfXfI)، (أرجنتو كلير: https://amzn.to/3uN2R3Q)، (شان جيل: https://amzn.to/3InR0Zk)." },
                            { inline_data: { mime_type: "image/jpeg", data: base64 } }
                        ]}]
                    })
                });
                const data = await res.json();
                if (data.candidates) {
                    showReport(data.candidates[0].content.parts[0].text);
                    success = true;
                    break;
                }
            } catch (e) { console.log("فشلت محاولة، جاري تجربة رابط آخر..."); }
        }

        if (!success) {
            alert("لا يزال الموديل غير مستجيب. يرجى التأكد من تفعيل Gemini API في Google Cloud Console.");
            document.getElementById('controls').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }

    function showReport(t) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('aiResult').innerHTML = t.replace(/(https?:\/\/[^\s\)]+)/g, '<br><a href="$1" target="_blank" class="buy-link">شراء 🛒</a>');
    }
</script>
</body>
</html>
