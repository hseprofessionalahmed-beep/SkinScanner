<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | معمل فحص البشرة الذكي</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="brand-header">
            <h1 class="logo-text">VERONA <span>AI</span></h1>
            <p class="tagline">تقنية الفحص المجهري الرقمي للبشرة</p>
        </header>

        <div class="scanner-container">
            <div class="scanner-box">
                <video id="video" autoplay muted playsinline></video>
                <div id="loading-overlay">جاري تشغيل محرك الذكاء الاصطناعي...</div>
            </div>
            
            <div class="scan-ui">
                <div class="scanner-line"></div>
            </div>
        </div>

        <div class="controls">
            <button id="scanBtn" class="main-btn">بدء الفحص المباشر 📸</button>
            <div class="upload-area">
                <label for="imageUpload" class="alt-btn">رفع صورة من الاستوديو 📁</label>
                <input type="file" id="imageUpload" accept="image/*" hidden>
            </div>
        </div>

        <div id="results" class="results-section" style="display:none;"></div>
    </div>

    <script src="ai_face_scan.js"></script>
    <script src="script.js"></script>
</body>
</html>
