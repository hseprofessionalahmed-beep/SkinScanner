<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | ULTIMATE PRO V60</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}

/* الهيدر */
.header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
.app-logo { width: 90%; max-height: 70px; object-fit: contain; }

/* إطار المعاينة */
.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}

/* مربعات الفحص المحدثة */
.scan-area { position: absolute; border: 1.5px dashed var(--cyan); z-index: 60; display: none; transition: 0.1s; background: rgba(0, 242, 255, 0.05); }
.scan-label { position: absolute; top: -18px; right: 0; font-size: 9px; color: var(--cyan); font-weight: bold; background: rgba(0,0,0,0.5); padding: 2px 4px; }

/* مؤشر السكانر (الخط المتحرك) */
.scanner-line { position: absolute; width: 100%; height: 2px; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); z-index: 70; top: 0; display: none; animation: scanAnim 3s linear infinite; }
@keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

.badge-float { position: absolute; top: 10px; right: 10px; z-index: 80; background: rgba(0,0,0,0.8); padding: 5px 12px; border-radius: 15px; border: 1px solid var(--gold); font-size: 0.7rem; }

/* الباقات والكروت */
.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
.card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
.info-box { background: #001a1a; border-right: 4px solid var(--cyan); padding: 15px; border-radius: 10px; font-size: 0.85rem; margin-bottom: 15px; line-height: 1.6; }

.package-card { border: 1px solid var(--gold); border-radius: 20px; padding: 15px; margin-bottom: 15px; background: #161616; }
.product-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
.buy-link { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.8rem; border: 1px solid var(--gold); padding: 4px 8px; border-radius: 5px; }

select, input { width:100%; padding:10px; margin:8px 0; background:#222; color:#fff; border:1px solid #444; border-radius:8px; }
</style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>
    
    <div class="preview-box" id="pBox">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="scanner" class="scanner-line"></div>
        
        <div id="areaForehead" class="scan-area"><span class="scan-label">تحليل الجبهة (واسع)</span></div>
        <div id="areaEyes" class="scan-area"><span class="scan-label">تجويف العين (الهالات)</span></div>
        <div id="areaCheeks" class="scan-area"><span class="scan-label">منطقة الخد (التصبغات)</span></div>
        
        <div id="lightBadge" class="badge-float">قياس الضوء...</div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startCam()">كاميرا لايف 📸</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        <button id="analyzeBtn" class="btn" style="background: #25d366;" onclick="showInitialReport()" disabled>بدء التحليل النهائي 🔍</button>
    </div>

    <div id="preReportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">نتائج المسح المجهري</h3>
        <div id="preContent" class="info-box"></div>
        <button class="btn" onclick="openQuestions()">متابعة لتحديد الباقة ⬅️</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">أسئلة تأكيد الحالة</h3>
        
        <label>عمق ولون الهالات؟</label>
        <select id="qCirclesDeep">
            <option value="none">لا يوجد</option>
            <option value="brown">بنية (تصبغات خارجية)</option>
            <option value="dark">داكنة جداً (وراثية/إرهاق)</option>
        </select>

        <label>نوع التصبغات؟</label>
        <select id="qPigType">
            <option value="none">لا يوجد</option>
            <option value="sun">بقع شمس/نمش</option>
            <option value="marks">آثار حبوب قديمة</option>
        </select>

        <label>حالة الحبوب؟</label>
        <select id="qAcneType">
            <option value="no">لا يوجد</option>
            <option value="active">حبوب حمراء نشطة</option>
            <option value="heads">رؤوس سوداء/بيضاء</option>
        </select>

        <label>اختر فئة الروتين:</label>
        <select id="qPackage">
            <option value="economy">الاقتصادية (الأساسيات)</option>
            <option value="super">سوبر (علاج مكثف)</option>
            <option value="ultra">ألترا (الرفاهية والنضارة)</option>
        </select>

        <button class="btn" onclick="generateFinalReport()">اعتماد الروتين النهائي ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="finalPkgDisplay"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
// روابط أمازون المباشرة (استبدل الـ ID بما يناسب منتجك الفعلي)
const productDB = {
    "أرجنتو كلير": "https://www.amazon.eg/dp/B091295D3W",
    "شان جيل": "https://www.amazon.eg/dp/B08W5GDB2P",
    "ستارفيل وايتنينج": "https://www.amazon.eg/dp/B09129N6H5",
    "ناتافيس فيتامين C": "https://www.amazon.eg/dp/B09B13GTR7",
    "ستارفيل آي كونتور": "https://www.amazon.eg/dp/B08YDB1X3W",
    "بوباي جل": "https://www.amazon.eg/dp/B08W5L37Y8"
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let aiResults = { skinType: 'جاري التحليل', acne: false, circles: false, pig: false, lightOk: false };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm = results.multiFaceLandmarks[0];
        document.getElementById('scanner').style.display = 'block';
        updateScanAreas(lm);

        // قياس الضوء
        const p = getPx(lm[10]);
        aiResults.lightOk = p.v > 120;
        document.getElementById('lightBadge').innerText = aiResults.lightOk ? "✅ إضاءة ممتازة" : "⚠️ حسن الإضاءة";
        document.getElementById('lightBadge').style.color = aiResults.lightOk ? "#2ecc71" : "#ff4d4d";
        
        if(aiResults.lightOk) {
            document.getElementById('analyzeBtn').disabled = false;
            // تحليل منطقي للمشاكل
            aiResults.skinType = p.v > 185 ? "دهنية" : (p.v < 110 ? "جافة" : "مختلطة");
            aiResults.circles = getPx(lm[230]).v < getPx(lm[205]).v - 20;
            aiResults.pig = Math.abs(getPx(lm[10]).v - getPx(lm[205]).v) > 25;
        }
    }
});

function updateScanAreas(lm) {
    const drawArea = (id, pts, w, h) => {
        const el = document.getElementById(id);
        el.style.display = 'block';
        el.style.width = w + '%'; el.style.height = h + '%';
        el.style.left = (lm[pts].x * 100 - (w/2)) + '%';
        el.style.top = (lm[pts].y * 100 - (h/2)) + '%';
    };
    drawArea('areaForehead', 10, 40, 15); // جبهة واسعة
    drawArea('areaEyes', 230, 25, 10);    // منطقة الهالات
    drawArea('areaCheeks', 205, 30, 20);  // الخدين بعيداً عن الأنف
}

function getPx(p){ 
    const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height); 
    const d=ctx.getImageData(x,y,1,1).data; return {v:(d[0]+d[1]+d[2])/3}; 
}

function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function handleImage(e) { const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img}); }; img.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }

function showInitialReport() {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('preReportCard').style.display = 'block';
    
    let report = `<b>نوع البشرة:</b> ${aiResults.skinType}<br><br>`;
    report += `<b>المواد الفعالة المطلوبة:</b><br>`;
    if(aiResults.skinType === 'دهنية') report += "• سالسليك أسيد (لتنظيف المسام)<br>";
    if(aiResults.circles) report += "• كافيين + هيالورونيك (لترطيب العين)<br>";
    if(aiResults.pig) report += "• أربوتين + فيتامين C (للتفتيح والنضارة)<br>";
    
    document.getElementById('preContent').innerHTML = report;
}

function openQuestions() {
    document.getElementById('preReportCard').style.display = 'none';
    document.getElementById('questionsCard').style.display = 'block';
}

function generateFinalReport() {
    document.getElementById('questionsCard').style.display = 'none';
    document.getElementById('reportCard').style.display = 'block';
    
    const pkgType = document.getElementById('qPackage').value;
    const container = document.getElementById('finalPkgDisplay');
    
    let items = ["أرجنتو كلير", "شان جيل", "بوباي جل"]; // الأساسية
    if(pkgType === 'super') items.push("ستارفيل وايتنينج");
    if(pkgType === 'ultra') items.push("ستارفيل وايتنينج", "ناتافيس فيتامين C", "ستارفيل آي كونتور");

    let html = `<h3 style="color:var(--gold); text-align:center;">باقة Verona الـ ${pkgType.toUpperCase()}</h3><div class="package-card">`;
    items.forEach(name => {
        html += `
        <div class="product-item">
            <span><b>${name}</b></span>
            <a href="${productDB[name]}" target="_blank" class="buy-link">عرض المنتج 🛒</a>
        </div>`;
    });
    container.innerHTML = html + "</div>";
}
</script>
</body>
</html>
