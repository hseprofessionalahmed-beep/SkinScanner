<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Scanner - النسخة الاحترافية</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>ماسح البشرة الذكي ✨</h1>
            <p>حلل بشرتك عبر الكاميرا لايف أو برفع صورة</p>
        </header>

        <div class="scanner-box">
            <video id="video" autoplay muted playsinline></video>
            <div id="loading-overlay" style="display:none;">جاري فحص خلايا البشرة...</div>
        </div>

        <div class="action-buttons">
            <button id="scanBtn">تحليل الكاميرا لايف 📸</button>
            <div class="divider">أو</div>
            <input type="file" id="fileInput" accept="image/*" hidden>
            <button id="uploadBtn" class="secondary-btn">رفع صورة من المعرض 🖼️</button>
        </div>

        <div id="results" style="display:none;">
            <div class="card">
                <h3>🔍 نتائج التحليل:</h3>
                <ul id="skinProblems"></ul>
            </div>
            <div class="card highlight">
                <h3>🧴 الروتين الثلاثي المقترح:</h3>
                <ul id="skinRoutine"></ul>
            </div>
            <button id="sendWhatsApp" class="wa-btn">إرسال التقرير للواتساب ✅</button>
        </div>
    </div>

    <script src="routine_data.js"></script>
    <script src="ai_face_scan.js"></script>
    <script src="script.js"></script>
    <script src="whatsapp_send.js"></script>
</body>
</html>
