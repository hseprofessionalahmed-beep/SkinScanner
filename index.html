<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | ULTIMATE PRO V49</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; --green: #2ecc71; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}
.header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
.app-logo { width: 90%; max-height: 70px; object-fit: contain; }
.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.live-detection-text { position: absolute; bottom: 15px; right: 15px; left: 15px; z-index: 50; background: rgba(0,0,0,0.8); padding: 12px; border-radius: 15px; border-right: 4px solid var(--gold); font-size: 0.85rem; line-height: 1.5; }
.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
.card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
.package-card { background: #1a1a1a; border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
.product-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
.buy-btn { background: var(--gold); color: #000; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>
    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="detectionText" class="live-detection-text">جاري تفعيل نظام Verona المجهري...</div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startCam()">فتح الكاميرا 📸</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        <button id="analyzeBtn" class="btn" style="background: var(--green);" onclick="openQuestions()" disabled>استلام خطة العلاج 📋</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تخصيص الروتين</h3>
        <label>الميزانية المطلوبة؟</label>
        <select id="qBudget" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border-radius:8px;">
            <option value="economy">الباقة الاقتصادية (الأساسيات)</option>
            <option value="super">باقة السوبر (علاج + نضارة)</option>
            <option value="ultra">باقة الألترا (الروتين المتكامل)</option>
        </select>
        <label>هل يوجد حمل أو رضاعة؟</label>
        <select id="qPreg" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border-radius:8px;">
            <option value="no">لا</option><option value="yes">نعم</option>
        </select>
        <button class="btn" onclick="generateFinalReport()">عرض الروتين النهائي ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="pkgContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
const productDB = {
    "أرجنتو كلير": "https://amzn.to/3uN2R3Q",
    "شان جيل": "https://amzn.to/3InR0Zk",
    "ستارفيل وايتنينج": "https://amzn.to/3YVfXfI",
    "ناتافيس فيتامين C": "https://amzn.to/3SREm9v",
    "ستارفيل آي كونتور": "https://amzn.to/3YVfXfI",
    "بوباي جل": "https://amzn.to/3uREn6Z"
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let aiResults = { skinType: 'جاري الفحص', circles: false, pig: false, acne: false };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm=results.multiFaceLandmarks[0];
        
        // تحليل دقيق جداً للهالات والتصبغات
        const forehead = getPx(lm[10]); 
        const eyeZone = getPx(lm[230]); 
        const cheekZone = getPx(lm[205]);

        aiResults.skinType = (forehead.v > 180) ? "دهنية" : (forehead.v < 110 ? "جافة" : "مختلطة");
        aiResults.circles = (eyeZone.v < cheekZone.v - 15); // حساسية عالية للهالات
        aiResults.pig = (Math.abs(forehead.v - cheekZone.v) > 25); // رصد تصبغات حقيقي

        document.getElementById('detectionText').innerHTML = `
            <b style="color:var(--gold)">تحليل Verona المجهري:</b><br>
            • البشرة: ${aiResults.skinType}<br>
            • الهالات: ${aiResults.circles ? "⚠️ رصد تصبغ تحت العين" : "✅ منطقة العين صافية"}<br>
            • التصبغات: ${aiResults.pig ? "⚠️ رصد بقع داكنة" : "✅ اللون موحد"}
        `;
        document.getElementById('analyzeBtn').disabled = false;
    }
});

function getPx(p){ 
    const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height); 
    const d=ctx.getImageData(x,y,1,1).data; return {v:(d[0]+d[1]+d[2])/3}; 
}
function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function handleImage(e) { const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img}); }; img.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }
function openQuestions(){ document.getElementById('controls').style.display='none'; document.getElementById('questionsCard').style.display='block'; }

function generateFinalReport(){
    document.getElementById('questionsCard').style.display='none'; 
    document.getElementById('reportCard').style.display='block';
    const budget = document.getElementById('qBudget').value;
    const container = document.getElementById('pkgContainer');
    
    let list = ["أرجنتو كلير", "شان جيل", "بوباي جل"]; // الاقتصادية
    if(budget === 'super') list.push("ستارفيل وايتنينج");
    if(budget === 'ultra') list.push("ستارفيل وايتنينج", "ناتافيس فيتامين C", "ستارفيل آي كونتور");

    let html = `<h3>الروتين المخصص (${budget})</h3><div class="package-card">`;
    list.forEach(name => {
        html += `<div class="product-item"><span>${name}</span><a href="${productDB[name]}" target="_blank" class="buy-btn">شراء 🛒</a></div>`;
    });
    container.innerHTML = html + "</div>";
}
</script>
</body>
</html>
