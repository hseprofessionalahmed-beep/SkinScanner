<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | CLINICAL DIAGNOSIS</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --glass: rgba(255,255,255,0.07); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; }
        video, canvas, #uploadedImg { width: 100%; height: 100%; object-fit: cover; }
        #uploadedImg { display: none; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--gold); top: 0; display: none; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        
        .card { background: var(--glass); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .gold-btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; }
        select, input[type="checkbox"] { margin: 10px 5px; }
        .routine-item { background: rgba(255,255,255,0.05); padding: 12px; border-right: 4px solid var(--gold); border-radius: 8px; margin-bottom: 10px; }
        .tag { font-size: 0.7rem; color: #00f2ff; border: 1px solid #00f2ff; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">VERONA AI PRECISION</h2>

    <div class="preview-box">
        <video id="input_video" playsinline></video>
        <img id="uploadedImg">
        <canvas id="output_canvas"></canvas>
        <div class="scan-line" id="scanLine"></div>
    </div>

    <div id="initBtns">
        <button class="gold-btn" onclick="startCamera()">فتح الكاميرا 📸</button>
        <label class="gold-btn" style="display:block; background:#222; color:#fff;">
            رفع صورة 📁 <input type="file" hidden onchange="handleFile(event)">
        </label>
        <button id="scanBtn" class="gold-btn" style="display:none; background: #d4af37;" onclick="triggerScan()">ابدأ التحليل السريري 🔬</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تأكيد نتائج التحليل الذكي</h3>
        <p style="font-size:0.8rem; color:#aaa">لقد رصدنا التالي، يرجى التأكيد أو التعديل:</p>
        
        <label><b>1. الحبوب الملتهبة:</b></label>
        <select id="qAcne">
            <option value="none">لا يوجد</option>
            <option value="red">حبوب حمراء ملتهبة</option>
            <option value="white">رؤوس بيضاء/سوداء</option>
        </select>

        <label><b>2. التصبغات ولونها:</b></label>
        <select id="qPigment">
            <option value="none">لا يوجد</option>
            <option value="brown">تصبغات بنية (كلف/نمش)</option>
            <option value="grey">تصبغات رمادية/داكنة</option>
        </select>

        <label><b>3. الهالات السوداء:</b></label>
        <select id="qDark">
            <option value="none">لا يوجد</option>
            <option value="mild">هالات خفيفة (إجهاد)</option>
            <option value="deep">هالات عميقة (وراثية/تجويف)</option>
        </select>

        <hr style="opacity:0.2">
        <label><input type="checkbox" id="addGlow"> إضافة باقة النضارة (هيالورونيك) ✨</label><br>
        <label><input type="checkbox" id="addBright"> إضافة باقة التفتيح (فيتامين C) 🤍</label>

        <button class="gold-btn" onclick="generateFinalReport()">عرض الروتين النهائي 📄</button>
    </div>

    <div id="resultCard" class="card">
        <div id="scoreDisplay" style="font-size:2.5rem; text-align:center; color:var(--gold); font-weight:900;">0%</div>
        <div id="diagnosisSummary" class="routine-item" style="border-color:#00f2ff"></div>
        <div id="routineOutput"></div>
        <button class="gold-btn" onclick="location.reload()">فحص جديد 📸</button>
    </div>
</div>

<script>
    const video = document.getElementById('input_video');
    const uploadedImg = document.getElementById('uploadedImg');
    const canvas = document.getElementById('output_canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    let faceMesh, lastLandmarks, detected = { acne: 'none', pigment: 'none', dark: 'none' };

    async function init() {
        faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(onResults);
    }

    function onResults(results) {
        canvas.width = (video.style.display !== 'none') ? video.videoWidth : uploadedImg.naturalWidth;
        canvas.height = (video.style.display !== 'none') ? video.videoHeight : uploadedImg.naturalHeight;
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks) {
            lastLandmarks = results.multiFaceLandmarks[0];
            drawConnectors(ctx, lastLandmarks, FACEMESH_TESSELATION, {color: '#d4af3733'});
            autoDetect(lastLandmarks);
        }
    }

    function autoDetect(lm) {
        // تحليل مبسط للألوان والتباين
        const forehead = getPixelData(lm[10]);
        const eye = getPixelData(lm[101]);
        const cheek = getPixelData(lm[205]);

        // كشف الهالات
        if ((eye.l / forehead.l) < 0.85) detected.dark = 'mild';
        // كشف التصبغات (بناءً على التباين)
        if ((cheek.l / forehead.l) < 0.88) detected.pigment = 'brown';
        // كشف الحبوب (بناءً على اللون الأحمر)
        if (cheek.r > cheek.g * 1.2) detected.acne = 'red';
    }

    function getPixelData(point) {
        const x = Math.floor(point.x * canvas.width);
        const y = Math.floor(point.y * canvas.height);
        const p = ctx.getImageData(x, y, 1, 1).data;
        return { r: p[0], g: p[1], b: p[2], l: (p[0]+p[1]+p[2])/3 };
    }

    function triggerScan() {
        document.getElementById('scanLine').style.display = 'block';
        setTimeout(() => {
            document.getElementById('scanLine').style.display = 'none';
            document.getElementById('initBtns').style.display = 'none';
            document.getElementById('questionsCard').style.display = 'block';
            
            // تعبئة الأسئلة تلقائياً بناءً على المسح
            document.getElementById('qAcne').value = detected.acne;
            document.getElementById('qPigment').value = detected.pigment;
            document.getElementById('qDark').value = detected.dark;
        }, 2500);
    }

    function generateFinalReport() {
        const acne = document.getElementById('qAcne').value;
        const pigment = document.getElementById('qPigment').value;
        const dark = document.getElementById('qDark').value;
        const glow = document.getElementById('addGlow').checked;
        const bright = document.getElementById('addBright').checked;

        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('resultCard').style.display = 'block';

        let score = 98;
        let diag = "<b>التشخيص المعتمد:</b><br>";
        let routine = "";

        if(acne !== 'none') {
            score -= 10;
            diag += `• حبوب ملتهبة (${acne === 'red' ? 'حمراء' : 'رؤوس بيضاء'})<br>`;
            routine += createItem("علاج الحبوب", "سيروم نياسيناميد 10% + ساليسيليك", "Salicylic Acid, Zinc");
        }
        if(pigment !== 'none') {
            score -= 12;
            diag += `• تصبغات ${pigment === 'brown' ? 'بنية' : 'داكنة'} ناتجة عن تفاوت الميلانين<br>`;
            routine += createItem("علاج التصبغات", "سيروم ألفا أربوتين + ترانيكساميك", "Alpha Arbutin, Vit C");
        }
        if(dark !== 'none') {
            score -= 8;
            diag += `• هالات تحت العين (${dark === 'mild' ? 'إجهاد' : 'عميقة'})<br>`;
            routine += createItem("عناية العين", "كريم كافيين وريتينول", "Caffeine, Peptides");
        }
        if(glow) routine += createItem("باقة النضارة ✨", "سيروم هيالورونيك أسيد مكثف", "Hyaluronic Acid 2%");
        if(bright) routine += createItem("باقة التفتيح 🤍", "ماسك تفتيح + فيتامين C", "Vitamin C, Kojic Acid");

        document.getElementById('scoreDisplay').innerText = score + "%";
        document.getElementById('diagnosisSummary').innerHTML = diag;
        document.getElementById('routineOutput').innerHTML = routine;
    }

    function createItem(title, name, active) {
        return `<div class="routine-item"><b>${title}:</b><br>${name}<br><span class="tag">المواد الفعالة: ${active}</span></div>`;
    }

    function startCamera() {
        uploadedImg.style.display = 'none'; video.style.display = 'block';
        const cam = new Camera(video, { onFrame: async () => { await faceMesh.send({image: video}); }, width: 640, height: 480 });
        cam.start(); document.getElementById('scanBtn').style.display = 'block';
    }

    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = (f) => {
            uploadedImg.src = f.target.result; uploadedImg.style.display = 'block'; video.style.display = 'none';
            uploadedImg.onload = async () => { await faceMesh.send({image: uploadedImg}); document.getElementById('scanBtn').style.display = 'block'; };
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
