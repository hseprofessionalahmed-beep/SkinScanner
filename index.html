<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI - Pro Facial Precision</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root {
  --gold:#d4af37;
  --gold-soft:#f1d77a;
  --bg1:#0a0a0a;
  --bg2:#111111;
  --glass:rgba(255,255,255,0.05);
}
body{margin:0;font-family:'Segoe UI',Tahoma,sans-serif;background:radial-gradient(circle at top,var(--bg2),var(--bg1));color:#fff;text-align:center;}
.container{max-width:700px;margin:auto;padding:20px;visibility:hidden;}
h2{letter-spacing:2px;font-weight:700;}
.preview-box{position:relative;width:100%;border-radius:25px;overflow:hidden;background:#000;border:1px solid var(--gold);box-shadow:0 0 40px rgba(212,175,55,0.25);backdrop-filter:blur(10px);min-height:350px;}
video,canvas,img.preview-img{width:100%;display:block;}
#overlay{position:absolute;top:0;left:0;z-index:10;}
.btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0;}
.action-btn{background:linear-gradient(135deg,var(--gold),var(--gold-soft));color:#000;padding:15px;border:none;border-radius:14px;font-weight:bold;cursor:pointer;transition:0.3s;box-shadow:0 5px 20px rgba(212,175,55,0.4);}
.action-btn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(212,175,55,0.6);}
.scan-btn{width:100%;font-size:1.1rem;border:2px solid var(--gold);}
.result-card,.question-card,.routine-card,.recommend-card{background:var(--glass);backdrop-filter:blur(15px);border-radius:25px;padding:25px;margin-top:25px;border:1px solid rgba(212,175,55,0.4);box-shadow:0 10px 40px rgba(0,0,0,0.6);text-align:right;}
.routine-grid{display:grid;grid-template-columns:1fr;gap:20px;}
.routine-card{transition:0.3s;}
.routine-card:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(212,175,55,0.5);}
.routine-card button{margin-top:15px;background:#25d366;color:#fff;width:100%;padding:12px;border:none;border-radius:10px;font-weight:bold;cursor:pointer;}
.status-msg{color:var(--gold-soft);margin:10px 0;font-size:0.95rem;letter-spacing:1px;}
select{width:100%;padding:10px;border-radius:10px;margin:8px 0;background:#1c1c1c;color:#fff;border:1px solid var(--gold);}
.hidden{display:none;}
.premium-badge{display:inline-block;padding:6px 14px;border-radius:20px;background:linear-gradient(90deg,var(--gold),var(--gold-soft));color:#000;font-size:0.75rem;font-weight:bold;margin-bottom:10px;box-shadow:0 0 15px rgba(212,175,55,0.6);}
</style>
</head>
<body>
<div class="container">
<h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>
<div id="status" class="status-msg">جاري تحميل المحرك الذكي...</div>
<div class="preview-box">
<video id="input_video" class="hidden" playsinline></video>
<canvas id="overlay"></canvas>
<img id="previewImg" class="preview-img hidden" />
</div>
<div class="btn-grid">
<button class="action-btn" id="cameraBtn">📸 الكاميرا</button>
<button class="action-btn" style="background:#333; color:#fff;" id="uploadBtn">📁 رفع صورة</button>
<input type="file" id="fileInput" class="hidden" accept="image/*" />
</div>
<button id="scanBtn" class="action-btn scan-btn">تحليل النتائج الآن 🔬</button>
<div id="questionCard" class="question-card hidden">
<h3 style="color:var(--gold); margin:0;">لقد اكتشف المحلل الذكي بعض المشاكل، يرجى تأكيدها:</h3>
<div id="questionsArea"></div>
<button class="action-btn scan-btn" id="extractRoutine">استخراج الروتين ✅</button>
</div>
<div id="routineArea" class="routine-grid hidden"></div>
<div id="recommendCard" class="recommend-card hidden">
<h3 style="color:var(--gold);">التوصيات العامة</h3>
<ul>
<li>الترطيب لمدة أسبوع على الأقل قبل الروتين إذا كانت البشرة جافة.</li>
<li>شرب كمية كافية من الماء يوميًا.</li>
<li>النوم باكرًا لتحفيز تجديد البشرة.</li>
<li>استخدام واقي الشمس يوميًا.</li>
</ul>
</div>
</div><script>
window.onload = () => {
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('overlay');
    const canvasCtx = canvasElement.getContext('2d',{willReadFrequently:true});
    const previewImg = document.getElementById('previewImg');
    let faceMesh;
    let lastResults = null;
    let currentImg = null;
    let detectedIssues = {};
    let beforeImageData = null;
    let analysisData = {pigmentLevel:null, halationLevel:null, confidence:0, skinType:null};

    async function setupFaceMesh(){
        faceMesh = new FaceMesh({locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
        faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5 });
        faceMesh.onResults(onResults);
        await new Promise(r=>setTimeout(r,500));
        document.getElementById('status').innerText="المحرك جاهز للفحص ✅";
        document.querySelector('.container').style.visibility='visible';
    }

    setupFaceMesh();

    function onResults(results){
        lastResults = results;
        canvasElement.width = canvasElement.clientWidth;
        canvasElement.height = (currentImg)? (currentImg.height*(canvasElement.width/currentImg.width)) : videoElement.videoHeight*(canvasElement.width/videoElement.videoWidth);
        canvasCtx.save();
        canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
        if(results.image) canvasCtx.drawImage(results.image,0,0,canvasElement.width,canvasElement.height);
        detectedIssues = {pigment:false, freckles:false, halations:false, acne:false, dryness:false};
        if(results.multiFaceLandmarks){
            for(const landmarks of results.multiFaceLandmarks){
                drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color:'#d4af3744', lineWidth:0.5});
            }
            analyzeFace(results.multiFaceLandmarks[0]);
        }
        canvasCtx.restore();
    }

    document.getElementById('cameraBtn').onclick = () => {
        currentImg=null;
        previewImg.classList.add('hidden');
        videoElement.classList.remove('hidden');
        const camera = new Camera(videoElement, {onFrame: async()=>{await faceMesh.send({image:videoElement});}});
        camera.start();
    };

    document.getElementById('uploadBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (event)=>{
        const file = event.target.files[0];
        if(!file)return;
        const img = new Image();
        img.onload = async ()=>{
            currentImg=img;
            videoElement.classList.add('hidden');
            previewImg.src = img.src;
            previewImg.classList.remove('hidden');
            await faceMesh.send({image:img});
        };
        img.src = URL.createObjectURL(file);
    };

    function getPixelMean(lm){
        const x = Math.floor(lm.x * canvasElement.width);
        const y = Math.floor(lm.y * canvasElement.height);
        const size = 5;
        try{
            const startX=Math.max(0,x-2);
            const startY=Math.max(0,y-2);
            const width=Math.min(size,canvasElement.width-startX);
            const height=Math.min(size,canvasElement.height-startY);
            const pData = canvasCtx.getImageData(startX,startY,width,height).data;
            let totalLum=0,validPixels=0;
            for(let i=0;i<pData.length;i+=4){
                const r=pData[i], g=pData[i+1], b=pData[i+2];
                if(r<20 && g<20 && b<20) continue;
                totalLum += 0.299*r + 0.587*g + 0.114*b;
                validPixels++;
            }
            return validPixels? totalLum/validPixels:150;
        }catch(e){return 150;}
    }

    function analyzeFace(landmarks){
        if(!landmarks) return;
        const forehead = getPixelMean(landmarks[10]);
        const leftCheek = getPixelMean(landmarks[205]);
        const rightCheek = getPixelMean(landmarks[425]);
        const leftEye = getPixelMean(landmarks[159]);
        const rightEye = getPixelMean(landmarks[386]);
        const cheekAvg = (leftCheek + rightCheek)/2;
        const eyeAvg = (leftEye + rightEye)/2;

        const pigmentRatio = cheekAvg / forehead;
        detectedIssues.pigment = pigmentRatio < 0.93;
        analysisData.pigmentLevel = pigmentRatio < 0.85?'عميق': pigmentRatio <0.90?'متوسط':'خفيف';

        const halationRatio = eyeAvg / forehead;
        detectedIssues.halations = halationRatio < 0.90;
        analysisData.halationLevel = halationRatio < 0.80?'شديد': halationRatio<0.87?'متوسط':'خفيف';

        detectedIssues.dryness = cheekAvg<110;
        analysisData.skinType = cheekAvg<105?'جافة':cheekAvg>150?'دهنية':'مختلطة';

        const colorVariance = Math.abs(leftCheek - rightCheek);
        detectedIssues.freckles = colorVariance>18;
        detectedIssues.acne = Math.abs(forehead-cheekAvg)>25;

        let confidenceScore = 100;
        if(detectedIssues.pigment) confidenceScore-=5;
        if(detectedIssues.halations) confidenceScore-=5;
        if(detectedIssues.acne) confidenceScore-=5;
        if(detectedIssues.freckles) confidenceScore-=3;
        analysisData.confidence=Math.max(75,confidenceScore);
        document.getElementById('status').innerText=`دقة التحليل: ${analysisData.confidence}% | نوع البشرة: ${analysisData.skinType}`;

        try{beforeImageData=canvasElement.toDataURL('image/png');}catch(e){}

        // Heatmap بسيط
        canvasCtx.fillStyle='rgba(255,0,0,0.25)';
        if(detectedIssues.halations){
            [159,386].forEach(i=>{
                canvasCtx.beginPath();
                canvasCtx.arc(landmarks[i].x*canvasElement.width, landmarks[i].y*canvasElement.height,20,0,Math.PI*2);
                canvasCtx.fill();
            });
        }
        if(detectedIssues.pigment){
            canvasCtx.beginPath();
            canvasCtx.arc(landmarks[205].x*canvasElement.width, landmarks[205].y*canvasElement.height,25,0,Math.PI*2);
            canvasCtx.fill();
        }
    }

    document.getElementById('scanBtn').onclick = () => {
        if(!lastResults) return alert('يرجى التقاط وجه واضح أولاً');
        const qCard=document.getElementById('questionCard');
        const qArea=document.getElementById('questionsArea');
        qArea.innerHTML='';
        Object.keys(detectedIssues).forEach(issue=>{
            let val=detectedIssues[issue]?'نعم':'لا';
            qArea.innerHTML+=`<label>${issue.replace('pigment','تصبغات').replace('freckles','نمش').replace('halations','هالات').replace('acne','حبوب').replace('dryness','جفاف')}؟</label>
            <select id='${issue}'><option value='نعم' ${val==='نعم'?'selected':''}>نعم</option><option value='لا' ${val==='لا'?'selected':''}>لا</option></select><br>`;
        });
        qCard.classList.remove('hidden');
    };

    document.getElementById('extractRoutine').onclick = () => {
        const routineArea=document.getElementById('routineArea');
        routineArea.innerHTML='';
        routineArea.classList.remove('hidden');
        const routines=[{type:'اقتصادي',price:'200 جنيه',improvement:'50%'},{type:'سوبر',price:'500 جنيه',improvement:'70%'},{type:'ألترا',price:'900 جنيه',improvement:'90%'}];
        routines.forEach(r=>{
            const card=document.createElement('div');
            card.className='routine-card';
            card.innerHTML=`<h4 style='color:var(--gold)'>${r.type}</h4>
            <p><b>الروتين الكامل:</b> ${analysisData.pigmentLevel==='عميق'?'سيروم ألفا أربوتين 2% + كريم عين كافيين + غسول لطيف + واقي شمس SPF50':'سيروم فيتامين C + كريم عين + غسول + واقي شمس'}</p>
            <p><b>المواد الفعالة:</b> ${analysisData.pigmentLevel==='عميق'?'Alpha Arbutin 2%, Niacinamide 5%, Vitamin C 15%':'Vitamin C, Niacinamide, Hyaluronic Acid'}</p>
            <p><b>مدة الاستخدام:</b> ${analysisData.pigmentLevel==='عميق'?'8-12 أسبوع':'4-8 أسابيع'}</p>
            <p><b>نسبة التحسن المتوقعة:</b> ${r.improvement}</p>
            <button onclick="window.open('https://wa.me/201063994139?text=اختار الروتين: ${r.type}')">اختيار هذا الروتين ✅</button>`;
            routineArea.appendChild(card);
        });
        document.getElementById('recommendCard').classList.remove('hidden');
        if(beforeImageData){
            const compareBtn=document.createElement('button');
            compareBtn.innerText='عرض صورة قبل التحليل 📷';
            compareBtn.className='action-btn';
            compareBtn.style.marginTop='10px';
            compareBtn.onclick=()=>{const win=window.open(); win.document.write(`<img src='${beforeImageData}' style='width:100%'>`);};
            routineArea.appendChild(compareBtn);
        }
    };
};
</script></body>
</html>
