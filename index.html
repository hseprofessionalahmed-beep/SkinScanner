<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | MULTI-SCOPE V29</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#050505; --cyan: #00f2ff; --red: #ff4d4d; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}
.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.live-overlay{position:absolute;top:15px;right:15px;z-index:30;pointer-events:none;text-align:right;}
.badge{background:rgba(0,0,0,0.7);padding:5px 12px;border-radius:20px;font-size:0.75rem;margin-bottom:5px;display:inline-block;border:1px solid var(--gold);}

/* حاوية العدسات في الجانب الأيسر */
.scopes-container { position: absolute; left: 10px; top: 10px; display: flex; flex-direction: column; gap: 8px; z-index: 40; }
.scope-box { width: 70px; height: 70px; border: 2px solid var(--cyan); border-radius: 12px; overflow: hidden; background: #000; position: relative; }
.scope-box canvas { width: 100%; height: 100%; position: static; }
.scope-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,242,255,0.7); color: #000; font-size: 0.5rem; text-align: center; font-weight: bold; }

.flex-btns { display: flex; gap: 10px; margin-bottom: 10px; }
.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%;}
.btn-secondary { background: #222; color: #fff; border: 1px solid #444; }

.card{background:#111;border:1px solid #d4af3733;border-radius:20px;padding:15px;display:none;margin-top:15px;}
.pkg-card{background:#1a1a1a;border:1px solid #333;border-radius:18px;padding:15px;border-top:4px solid var(--gold); margin-bottom: 25px;}

.product-box { background: #222; padding: 12px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; }
.prod-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prod-time { font-size: 0.75rem; background: #d4af3722; color: var(--gold); padding: 2px 8px; border-radius: 5px; border: 0.5px solid var(--gold); }
.usage-instruction { background: #001a1a; color: #eee; padding: 8px; border-radius: 8px; font-size: 0.8rem; border-right: 3px solid var(--cyan); line-height: 1.4; }
.buy-link-btn { display: inline-block; color: var(--gold); text-decoration: none; font-size: 0.9rem; font-weight: bold; border: 1px solid var(--gold); padding: 5px 12px; border-radius: 8px; margin-top: 10px; }
.total-row{display:flex;justify-content:space-between;font-weight:bold;color:var(--gold);margin-top:15px; border-top: 1px solid #333; padding-top: 10px; font-size: 1.1rem;}
</style>
</head>
<body>
<div class="container">
<h2 style="color:var(--gold);text-align:center;">VERONA AI | الفحص المجهري V29</h2>
<div class="preview-box">
<video id="video" playsinline hidden></video>
<canvas id="canvas"></canvas>

<div class="scopes-container">
    <div class="scope-box"><canvas id="scopeForehead"></canvas><div class="scope-label">الجبهة</div></div>
    <div class="scope-box"><canvas id="scopeRCheek"></canvas><div class="scope-label">الخد الأيمن</div></div>
    <div class="scope-box"><canvas id="scopeLCheek"></canvas><div class="scope-label">الخد الأيسر</div></div>
    <div class="scope-box"><canvas id="scopeMouth"></canvas><div class="scope-label">حول الفم</div></div>
</div>

<div class="live-overlay">
<div id="lightLevel" class="badge">قياس الإضاءة...</div><br>
<div id="liveDetection" class="badge" style="color: var(--cyan); display:none;">فحص التصبغات نشط 🔎</div>
</div>
<div id="liveStatus" style="position:absolute;bottom:15px;width:100%;color:var(--cyan);font-weight:bold;z-index:20;text-align:center;">ثبت وجهك للفحص المجهري...</div>
</div>

<div id="controls">
<div class="flex-btns">
    <button class="btn" onclick="startCam()">بدء المسح 📸</button>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">أضف صورة 🖼️</button>
</div>
<input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
<button class="btn" style="background: #25d366; color: white;" onclick="openQuestions()">عرض النتيجة النهائية 🔍</button>
</div>

<div id="questionsCard" class="card">
<h3 style="color:var(--gold);text-align:center;">تأكيد الفحص المجهري</h3>
<label>حبوب ملتهبة؟</label>
<select id="qAcne" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border-radius:8px;"><option value="no">لا</option><option value="yes">نعم</option></select>
<label>تصبغات مكتشفة؟</label>
<select id="qPig" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border-radius:8px;"><option value="no">لا</option><option value="yes">نعم</option></select>
<label>هالات سوداء؟</label>
<select id="qCircles" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border-radius:8px;"><option value="none">لا يوجد</option><option value="brown">بني</option></select>
<button class="btn" onclick="generateFinalReport()">عرض الروتين النهائي ✨</button>
</div>

<div id="reportCard" class="card">
<div id="skinTypeDisplay" style="text-align:center;color:var(--cyan);font-weight:bold;margin-bottom:15px; font-size: 1.2rem;"></div>
<div id="pkgContainer"></div>
<button class="btn" onclick="location.reload()" style="background:#333;color:#fff;margin-top:20px;">إعادة الفحص 🔄</button>
<button class="btn" style="background:#25d366;color:white;" onclick="sendToWhatsApp()">طلب المنتجات 💬</button>
</div>
</div>

<script>
const myPhone = "201063994139";
const productDB = {
"ستارفيل وايتنينج": {p:145, ing:"أربوتين + كوجيك أسيد", ben:"تفتيح البقع الداكنة وتوحيد لون البشرة", time:"صباحاً ومساءً", use:"يوضع على بشرة مبللة، يدلك برفق لمدة دقيقة ثم يشطف بالماء.", link: "https://amzn.to/3YVfXfI"},
"أرجنتو كلير": {p:165, ing:"زيت شجرة الشاي + فيتامين E", ben:"علاج الحبوب النشطة ومنع ظهورها مجدداً", time:"صباحاً ومساءً", use:"يستخدم كغسول يومي مع التركيز على مناطق الحبوب، ثم يشطف بالماء.", link: "https://amzn.to/3uN2R3Q"},
"فيشي نورماديرم": {p:850, ing:"حمض الساليسيليك + زنك", ben:"تنظيف عميق للمسام والتحكم في الدهون", time:"صباحاً ومساءً", use:"يستخدم كمية بسيطة على وجه مبلل، يدلك ثم يشطف جيداً.", link: "https://amzn.to/3uS4H6J"},
"شان جيل": {p:195, ing:"ألوفيرا + بانثينول", ben:"ترطيب عميق وتهدئة للبشرة المتهالكة", time:"صباحاً ومساءً", use:"يوضع بعد الغسول مباشرة على بشرة مندية لضمان أفضل امتصاص.", link: "https://amzn.to/3InR0Zk"},
"ناتافيس فيتامين C": {p:485, ing:"فيتامين C 10% + هيالورونيك", ben:"نضارة فورية ومحاربة شحوب البشرة", time:"صباحاً فقط", use:"توضع 3-4 قطرات على الوجه والرقبة قبل واقي الشمس.", link: "https://amzn.to/3SREm9v"},
"لاروش بيجمنتكلار": {p:1250, ing:"فينيل ألانين + كافيين", ben:"علاج الهالات السوداء العميقة والانتفاخات", time:"مساءً فقط", use:"طبطبة خفيفة بإصبع البنصر حول منطقة العين من الخارج للداخل.", link: "https://amzn.to/3UPuK4D"},
"ستارفيل آي كونتور": {p:155, ing:"كافيين + ريتينول", ben:"ترطيب محيط العين وتقليل الخطوط الرفيعة", time:"صباحاً ومساءً", use:"يوضع كمية بسيطة حول العين مع تدليك رقيق جداً.", link: "https://amzn.to/3uREn6Z"},
"بوباي جل واقي شمس": {p:180, ing:"SPF 50+", ben:"حماية من الشمس ومنع غمقان البشرة", time:"صباحاً فقط", use:"يوضع قبل الخروج بـ 20 دقيقة، ويجدد كل ساعتين عند التعرض المستمر.", link: "https://amzn.to/3uREn6Z"},
"لاروش أنثيليوس": {p:650, ing:"تكنولوجيا Mexoryl 400", ben:"أعلى حماية من الأشعة فوق البنفسجية", time:"صباحاً فقط", use:"يوضع كآخر خطوة في الروتين الصباحي قبل الخروج.", link: "https://amzn.to/3T0pG8f"},
"غسول سيرافيه": {p:450, ing:"سيراميدات أساسية + هيالورونيك", ben:"ترطيب وحماية حاجز البشرة الطبيعي", time:"صباحاً ومساءً", use:"يستخدم لتنظيف البشرة دون تجفيفها، مثالي للبشرة المختلطة والجافة.", link: "https://amzn.to/3SREm9v"}
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d',{willReadFrequently:true});

// إعداد عدسات الفحص
const scopes = {
    Forehead: document.getElementById('scopeForehead').getContext('2d'),
    RCheek: document.getElementById('scopeRCheek').getContext('2d'),
    LCheek: document.getElementById('scopeLCheek').getContext('2d'),
    Mouth: document.getElementById('scopeMouth').getContext('2d')
};

let aiAnalysis = {acne:false,pig:false,circles:false,skinType:'مختلطة'};

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.7});

faceMesh.onResults(results=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

if(results.multiFaceLandmarks?.length>0){
const lm=results.multiFaceLandmarks[0];

// إعادة رسم الفحص المباشر بخطوط ذهبية رقيقة جداً
drawConnectors(ctx,lm,FACEMESH_TESSELATION,{color:'#d4af3725',lineWidth:0.3});

// تحديد النقاط (الجبهة، الخدين، حول الفم)
const pFore = lm[10];
const pRCheek = lm[205];
const pLCheek = lm[425];
const pMouth = lm[15];

// معالجة العدسات المجهرية
processScope(scopes.Forehead, pFore, "جبهة");
processScope(scopes.RCheek, pRCheek, "يمين");
processScope(scopes.LCheek, pLCheek, "يسار");
processScope(scopes.Mouth, pMouth, "حول الفم");

const foreData=getPx(pFore); 
const rData=getPx(pRCheek); 
const lData=getPx(pLCheek);
const eyeData=getPx(lm[230]);

// قياس الإضاءة
const lightEl=document.getElementById('lightLevel');
lightEl.innerText = foreData.v < 110 ? "⚠️ قرب من الإضاءة" : "✅ إضاءة مجهرية ممتازة";

// خوارزمية رصد التصبغات المجهرية (مقارنة تباين الألوان في 3 مناطق)
const avgCheek = (rData.v + lData.v) / 2;
aiAnalysis.skinType=(foreData.v>205)?"دهنية":(foreData.v<115?"جافة":"مختلطة");
aiAnalysis.acne=(rData.r - rData.g > 30 || lData.r - lData.g > 30);
aiAnalysis.pig=(avgCheek / foreData.v < 0.85); // رصد أي فرق لون بين الخد والجبهة
aiAnalysis.circles=(eyeData.v < foreData.v * 0.82);

document.getElementById('liveDetection').style.display="inline-block";
document.getElementById('liveStatus').innerText="تم رصد العيوب بدقة مجهرية ✅";
}
});

function processScope(sCtx, point, label) {
    const x = point.x * canvas.width - 25;
    const y = point.y * canvas.height - 25;
    sCtx.canvas.width = 100;
    sCtx.canvas.height = 100;
    sCtx.drawImage(canvas, x, y, 50, 50, 0, 0, 100, 100);
}

function getPx(p){const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height); const d=ctx.getImageData(x,y,1,1).data; return {r:d[0],g:d[1],v:(d[0]+d[1]+d[2])/3};}
function startCam(){new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480;}

function handleImage(e) {
    const reader = new FileReader();
    reader.onload = (event) => {
        const img = new Image();
        img.onload = () => { canvas.width = img.width; canvas.height = img.height; faceMesh.send({image: img}); };
        img.src = event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
}

function openQuestions(){
document.getElementById('controls').style.display='none';
document.getElementById('questionsCard').style.display='block';
document.getElementById('qAcne').value=aiAnalysis.acne?"yes":"no";
document.getElementById('qPig').value=aiAnalysis.pig?"yes":"no";
document.getElementById('qCircles').value=aiAnalysis.circles?"brown":"none";
}

function generateFinalReport(){
document.getElementById('questionsCard').style.display='none';
document.getElementById('reportCard').style.display='block';
document.getElementById('skinTypeDisplay').innerText="نتائج فحص فيرونا المجهري للبشرة " + aiAnalysis.skinType;
const container=document.getElementById('pkgContainer'); container.innerHTML="";

[{id:'low', n:'الباقة الاقتصادية 🥉'}, {id:'high', n:'الباقة الألترا الفاخرة 🥇'}].forEach(lvl=>{
    let products = [];
    let wash = aiAnalysis.skinType==="دهنية" ? (lvl.id==='high'?"فيشي نورماديرم":"أرجنتو كلير") : (lvl.id==='high'?"غسول سيرافيه":"ستارفيل وايتنينج");
    products.push(wash);
    if(aiAnalysis.acne && wash !== "أرجنتو كلير") products.push("أرجنتو كلير");
    if(aiAnalysis.pig) products.push("ناتافيس فيتامين C");
    if(aiAnalysis.circles) products.push(lvl.id==='high'?"لاروش بيجمنتكلار":"ستارفيل آي كونتور");
    products.push("شان جيل");
    products.push(lvl.id==='high'?"لاروش أنثيليوس":"بوباي جل واقي شمس");

    let html = `<div class="pkg-card"><div style="color:var(--gold);font-weight:bold;text-align:center;margin-bottom:15px; font-size:1.1rem;">${lvl.n}</div>`;
    let total = 0;
    
    [...new Set(products)].forEach(name => {
        const d = productDB[name]; total += d.p;
        html += `
        <div class="product-box">
            <div class="prod-header"><b>${name}</b><span class="prod-time">${d.time}</span></div>
            <span style="font-size:0.8rem; color:#aaa;">🧪 المادة: ${d.ing} | السعر: ${d.p} ج.م</span><br>
            <span style="font-size:0.8rem; color:var(--cyan);">✨ الفائدة: ${d.ben}</span>
            <div class="usage-instruction">📝 طريقة الاستخدام: ${d.use}</div>
            <div style="text-align:left; margin-top:10px;"><a href="${d.link}" target="_blank" class="buy-link-btn">اطلب المنتج 🛒</a></div>
        </div>`;
    });
    
    html += `<div class="total-row"><span>المجموع الكلي:</span><span>${total} ج.م</span></div></div>`;
    container.innerHTML += html;
});
}

function sendToWhatsApp(){window.open(`https://wa.me/${myPhone}?text=أريد طلب روتين Verona AI الخاص بي.`, '_blank');}
</script>
</body>
</html>
