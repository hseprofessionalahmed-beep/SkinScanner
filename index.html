<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI - CLINICAL PRECISION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        :root {
            --gold: linear-gradient(135deg, #a67c00 0%, #ffbf00 50%, #a67c00 100%);
            --gold-solid: #d4af37;
            --dark-bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --neon-blue: #00f2ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--dark-bg);
            color: #fff;
            margin: 0;
            line-height: 1.4;
        }

        .container { max-width: 500px; margin: auto; padding: 15px; }

        .header { text-align: center; padding: 20px 0; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .header h1 { 
            background: var(--gold); -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; font-size: 1.8rem; margin: 0;
            font-weight: 900;
        }

        /* نافذة المعاينة */
        .scanner-view {
            position: relative; border-radius: 25px; overflow: hidden;
            border: 2px solid var(--gold-solid); background: #000;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            aspect-ratio: 4/5;
        }

        video, canvas { width: 100%; height: 100%; object-fit: cover; }

        .scan-line {
            position: absolute; width: 100%; height: 4px;
            background: var(--gold-solid); box-shadow: 0 0 20px var(--gold-solid);
            top: 0; display: none; z-index: 10;
            animation: scanAnim 2.5s infinite linear;
        }

        @keyframes scanAnim { 0% { top: 0%; } 100% { top: 100%; } }

        /* البطاقات */
        .card {
            background: var(--card-bg); border: 1px solid rgba(212,175,55,0.3);
            border-radius: 20px; padding: 20px; margin-top: 15px;
            backdrop-filter: blur(10px); display: none;
        }

        .score-box {
            font-size: 3rem; font-weight: 900; color: var(--gold-solid);
            text-align: center; margin: 10px 0;
            text-shadow: 0 0 20px rgba(212,175,55,0.4);
        }

        .routine-item {
            background: rgba(255,255,255,0.03); border-right: 4px solid var(--gold-solid);
            padding: 12px; border-radius: 10px; margin-bottom: 12px; text-align: right;
        }

        .gold-btn {
            background: var(--gold); color: #000; border: none;
            padding: 15px; border-radius: 50px; font-weight: bold;
            width: 100%; cursor: pointer; margin-top: 10px;
            font-size: 1rem; box-shadow: 0 5px 15px rgba(212,175,55,0.3);
        }

        .tag {
            display: inline-block; background: rgba(0, 242, 255, 0.1);
            color: var(--neon-blue); font-size: 0.75rem; padding: 3px 10px;
            border-radius: 5px; margin-top: 5px; border: 1px solid var(--neon-blue);
        }

        .instruction-box {
            background: rgba(212, 175, 55, 0.05); padding: 12px;
            border-radius: 10px; border: 1px dashed var(--gold-solid);
            font-size: 0.8rem; color: #ddd; text-align: right; margin-top: 15px;
        }
        
        #statusOverlay {
            position: absolute; bottom: 20px; width: 100%;
            text-align: center; color: var(--gold-solid);
            font-weight: bold; font-size: 0.9rem; z-index: 15;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>VERONA | AI PRECISION</h1>
        <p style="color:#888; font-size:0.7rem; margin:5px 0 0 0;">نظام التحليل السريري عالي الدقة</p>
    </div>

    <div class="scanner-view">
        <video id="input_video" playsinline></video>
        <canvas id="output_canvas"></canvas>
        <div class="scan-line" id="scanLine"></div>
        <div id="statusOverlay">بانتظار تفعيل الكاميرا...</div>
    </div>

    <div id="actionPanel">
        <button class="gold-btn" onclick="startClinicalScan()">بدء الفحص السريري 🧬</button>
    </div>

    <div id="reportCard" class="card">
        <div class="score-box" id="scoreNum">0%</div>
        <p style="text-align:center; color:#aaa; margin-top:-10px;">مؤشر صحة البشرة</p>
        
        <div id="diagnosisSummary" class="instruction-box"></div>

        <div id="routineList" style="margin-top:20px;"></div>

        <div class="instruction-box">
            <b>💡 نصيحة الخبير:</b><br>
            يجب شرب 3 لتر ماء يومياً وتجنب السهر لتقليل إجهاد تحت العين.
        </div>

        <button class="gold-btn" onclick="location.reload()" style="background:#222; color:#fff;">إعادة التحليل 📸</button>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('output_canvas');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently: true});
const statusOverlay = document.getElementById('statusOverlay');

let faceMesh;
let lastLandmarks = null;
let detectedIssues = { pigment: false, halations: false, dry: false, acne: false };

// 1. تهيئة المحرك
async function setupAI() {
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.7 });
    faceMesh.onResults(onResults);

    const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); },
        width: 640, height: 480
    });
    camera.start().then(() => statusOverlay.innerText = "المحرك جاهز. وجه الكاميرا نحوك.");
}

function onResults(results) {
    canvasElement.width = videoElement.videoWidth;
    canvasElement.height = videoElement.videoHeight;
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

    if (results.multiFaceLandmarks) {
        lastLandmarks = results.multiFaceLandmarks[0];
        // رسم شبكة التشخيص (شفافة)
        drawConnectors(canvasCtx, lastLandmarks, FACEMESH_TESSELATION, {color: '#d4af3722', lineWidth: 0.5});
        
        // التحليل الفوري للمناطق
        analyzeClinical(lastLandmarks);
    }
    canvasCtx.restore();
}

function getPixelMean(lm) {
    const x = Math.floor(lm.x * canvasElement.width);
    const y = Math.floor(lm.y * canvasElement.height);
    try {
        const pData = canvasCtx.getImageData(x-4, y-4, 8, 8).data;
        let lumSum = 0;
        for (let i = 0; i < pData.length; i += 4) {
            lumSum += (pData[i] * 0.299 + pData[i+1] * 0.587 + pData[i+2] * 0.114);
        }
        return lumSum / (pData.length / 4);
    } catch (e) { return 120; }
}

function analyzeClinical(landmarks) {
    // تحديد مناطق القياس
    const foreheadTop = getPixelMean(landmarks[10]);      // مرجع الجبهة
    const foreheadLeft = getPixelMean(landmarks[109]);     // يسار الجبهة
    const foreheadRight = getPixelMean(landmarks[338]);    // يمين الجبهة
    
    const eyeLeft = getPixelMean(landmarks[101]);         // تحت العين يسار
    const eyeRight = getPixelMean(landmarks[330]);        // تحت العين يمين
    
    const cheekAvg = (getPixelMean(landmarks[205]) + getPixelMean(landmarks[425])) / 2;

    // خوارزمية كشف الهالات (Under Eye Detection)
    const eyeBrightnessRatio = ((eyeLeft + eyeRight) / 2) / foreheadTop;
    detectedIssues.halations = eyeBrightnessRatio < 0.86; // حساسية عالية للهالات

    // خوارزمية كشف تصبغات الجبهة (Forehead Pigment)
    const foreheadContrast = Math.abs(foreheadLeft - foreheadRight);
    detectedIssues.pigment = foreheadContrast > 15 || (foreheadLeft / foreheadTop < 0.90);

    // كشف الجفاف والمسام (Texture)
    detectedIssues.dry = cheekAvg < 95;
    detectedIssues.acne = Math.abs(cheekAvg - foreheadTop) > 25;

    // تحديث نص الحالة
    let reportTxt = detectedIssues.halations ? "⚠️ تم رصد هالات | " : "";
    reportTxt += detectedIssues.pigment ? "⚠️ تصبغات مكتشفة | " : "";
    statusOverlay.innerText = reportTxt || "البشرة تبدو مستقرة..";
}

function startClinicalScan() {
    if(!lastLandmarks) return alert("يرجى توجيه الوجه للكاميرا");
    
    document.getElementById('scanLine').style.display = "block";
    statusOverlay.innerText = "جاري مسح الطبقة القرنية وفحص الهالات...";
    
    setTimeout(() => {
        document.getElementById('scanLine').style.display = "none";
        document.getElementById('actionPanel').style.display = "none";
        document.getElementById('reportCard').style.display = "block";
        generateFinalReport();
    }, 3000);
}

function generateFinalReport() {
    let score = 95;
    let summary = "<b>التشخيص المكتشف:</b><br>";
    let routine = "";

    if (detectedIssues.halations) {
        score -= 10;
        summary += "• هالات سوداء تحت العين (إجهاد وعائي).<br>";
        routine += createRoutine("عناية الهالات", "كريم كولاجرا بالكافيين والريتينول", "Caffeine, Retinol");
    }
    if (detectedIssues.pigment) {
        score -= 12;
        summary += "• تصبغات غير منتظمة في الجبهة.<br>";
        routine += createRoutine("علاج التصبغات", "سيروم ألفا أربوتين + فيتامين C", "Alpha Arbutin, Vit C");
    }
    if (detectedIssues.acne) {
        score -= 8;
        summary += "• مسام واسعة أو حبوب نشطة.<br>";
        routine += createRoutine("علاج المسام", "غسول ستارفيل اكتيف", "Salicylic Acid, Zinc");
    }

    if (score > 90) {
        summary += "• بشرة نقية إجمالاً. حافظي على الوقاية.<br>";
        routine += createRoutine("الروتين اليومي", "غسول ميلانو جينتل + صن بلوك", "Aloe Vera, Zinc Oxide");
    }

    document.getElementById('scoreNum').innerText = score + "%";
    document.getElementById('diagnosisSummary').innerHTML = summary;
    document.getElementById('routineList').innerHTML = routine;
}

function createRoutine(title, product, actives) {
    return `<div class="routine-item">
                <b>${title}:</b><br>${product}
                <br><span class="tag">المواد الفعالة: ${actives}</span>
            </div>`;
}

setupAI();
</script>

</body>
</html>
