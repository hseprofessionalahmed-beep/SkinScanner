<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | BRAIN EDITION V40</title>
    <style>
        :root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        
        /* الإطار العلوي الأبيض */
        .header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 15px 0; text-align: center; border-bottom: 3px solid var(--gold); }
        .app-logo { width: 85%; max-height: 60px; object-fit: contain; }

        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; background: #000; margin-bottom: 15px; }
        #canvas, #video { width: 100%; height: 100%; object-fit: cover; }
        
        .btn { background: linear-gradient(135deg,#a67c00,#ffbf00); color: #000; border: none; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 1rem; }
        .btn-secondary { background: #222; color: #fff; border: 1px solid #444; }
        
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 25px; padding: 20px; display: none; margin-top: 15px; }
        .loading-box { text-align: center; padding: 20px; display: none; }
        .status-msg { background: #1a1a1a; padding: 15px; border-radius: 12px; border-right: 4px solid var(--gold); margin-bottom: 15px; line-height: 1.6; }
        
        .product-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; }
        .buy-btn { display: block; background: var(--gold); color: #000; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 0.9rem; font-weight: bold; text-align: center; margin-top: 10px; }
        
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>

    <div class="preview-box">
        <video id="video" playsinline autoplay></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="capturePhoto()">التقاط صورة 📸</button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileUpload(event)">
    </div>

    <div id="loading" class="loading-box">
        <div class="spinner"></div>
        <p>جاري تحليل البشرة بذكاء Gemini...</p>
    </div>

    <div id="reportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تقرير تحليل Verona AI</h3>
        <div id="aiAnalysisResult" class="status-msg"></div>
        <div id="productsContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyA1G6Dgxz-ZmwdgQWZRUmhFEwFRufpxXXI";
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    // تشغيل الكاميرا تلقائياً
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => video.srcObject = stream);

    function capturePhoto() {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];
        sendToGemini(base64Image);
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const base64Image = e.target.result.split(',')[1];
            sendToGemini(base64Image);
        };
        reader.readAsDataURL(file);
    }

    async function sendToGemini(base64Data) {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        const prompt = `أنت خبير تجميل وجلدية. حلل هذه الصورة بدقة ووضح: 
        1. نوع البشرة. 
        2. المشاكل المكتشفة (تصبغات، حبوب، هالات). 
        3. الروتين المناسب من هذه القائمة فقط: 
        - ستارفيل وايتنينج (تفتيح) -> https://amzn.to/3YVfXfI
        - أرجنتو كلير (غسول حبوب) -> https://amzn.to/3uN2R3Q
        - شان جيل (مرطب) -> https://amzn.to/3InR0Zk
        - ناتافيس فيتامين C (نضارة) -> https://amzn.to/3SREm9v
        - بوباي جل (واقي شمس) -> https://amzn.to/3uREn6Z
        اجعل الأسلوب فخماً ومهنياً.`;

        const payload = {
            contents: [{
                parts: [
                    { text: prompt },
                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                ]
            }]
        };

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            showReport(aiText);
        } catch (error) {
            alert("حدث خطأ في الاتصال بالسيرفر. تأكد من مفتاح الـ API.");
            location.reload();
        }
    }

    function showReport(text) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        
        // تحويل النص لروابط قابلة للضغط بشكل بسيط
        const formattedText = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" class="buy-btn">شراء المنتج عبر أمازون 🛒</a>');
        document.getElementById('aiAnalysisResult').innerHTML = formattedText.replace(/\n/g, '<br>');
    }
</script>

</body>
</html>
