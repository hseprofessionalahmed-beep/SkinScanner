<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | ULTIMATE DIAGNOSIS</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; --green: #2ecc71; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}

.header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
.app-logo { width: 90%; max-height: 70px; object-fit: contain; }

.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}

/* نظام الطبقات الحية */
.live-detection-text { position: absolute; bottom: 20px; right: 20px; z-index: 50; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 10px; border-right: 3px solid var(--cyan); font-size: 0.8rem; }

.scopes-container { position: absolute; left: 8px; top: 8px; display: flex; flex-direction: column; gap: 5px; z-index: 40; }
.scope-box { width: 45px; height: 45px; border: 1px solid var(--gold); border-radius: 8px; overflow: hidden; background: #000; }
.scope-box canvas { width: 100%; height: 100%; position: static; }

.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px; transition: 0.3s;}
.btn:disabled { background: #444; color: #777; }

.card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px; animation: fadeIn 0.5s; }
.info-box { background: #001a1a; border-right: 4px solid var(--cyan); padding: 15px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 15px; line-height: 1.6; }

/* تصميم الباقات */
.package-card { background: #1a1a1a; border: 1px solid #333; border-radius: 20px; padding: 15px; margin-bottom: 15px; border-top: 4px solid var(--gold); }
.product-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 8px; border-left: 3px solid var(--gold); }
.buy-small { background: var(--gold); color: #000; text-decoration: none; padding: 5px 10px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        
        <div class="scopes-container">
            <div class="scope-box"><canvas id="scopeForehead"></canvas></div>
            <div class="scope-box"><canvas id="scopeEyes"></canvas></div>
            <div class="scope-box"><canvas id="scopeCheek"></canvas></div>
        </div>

        <div id="detectionText" class="live-detection-text">
            جاري المسح المجهري...
        </div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startCam()">كاميرا لايف 📸</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        <button id="analyzeBtn" class="btn" style="background: var(--green);" onclick="showPreReport()" disabled>تحليل المشاكل المرصودة 🔍</button>
    </div>

    <div id="preReportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">التقرير التشخيصي الأولي</h3>
        <div id="preReportContent" class="info-box"></div>
        <button class="btn" onclick="openQuestions()">تأكيد واستلام الروتين 💬</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">أسئلة دقة الروتين</h3>
        <label>هل يوجد حمل أو رضاعة؟</label>
        <select id="qPreg"><option value="no">لا</option><option value="yes">نعم</option></select>
        
        <label>الميزانية المفضلة؟</label>
        <select id="qBudget">
            <option value="economy">الاقتصادية (الأساسيات)</option>
            <option value="super">سوبر (علاج + نضارة)</option>
            <option value="ultra">ألترا (الروتين المتكامل)</option>
        </select>

        <button class="btn" onclick="generateFinalReport()">عرض الباقة المناسبة ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="finalHeader" style="text-align:center; margin-bottom:15px;"></div>
        <div id="pkgContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
const productDB = {
    "أرجنتو كلير": {t:"غسول للحبوب والمسام", link: "https://amzn.to/3uN2R3Q"},
    "شان جيل": {t:"مرطب مائي خفيف", link: "https://amzn.to/3InR0Zk"},
    "ستارفيل وايتنينج": {t:"سيروم تفتيح التصبغات", link: "https://amzn.to/3YVfXfI"},
    "ناتافيس فيتامين C": {t:"سيروم نضارة صباحي", link: "https://amzn.to/3SREm9v"},
    "ستارفيل آي كونتور": {t:"كريم الهالات السوداء", link: "https://amzn.to/3YVfXfI"},
    "بوباي جل": {t:"واقي شمس جل", link: "https://amzn.to/3uREn6Z"}
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scopes = { Forehead: document.getElementById('scopeForehead').getContext('2d'), Eyes: document.getElementById('scopeEyes').getContext('2d'), Cheek: document.getElementById('scopeCheek').getContext('2d') };

let aiResults = { skinType: 'جاري الفحص...', acne: false, circles: false, pig: false };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm=results.multiFaceLandmarks[0];
        
        // رسم الشبكة بلون ذهبي خفيف للتأكيد أنها تعمل
        drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3730', lineWidth: 0.5});

        processScope(scopes.Forehead, lm[10]); 
        processScope(scopes.Eyes, lm[230]); 
        processScope(scopes.Cheek, lm[205]);

        // تحليل ذكي متقدم
        const fore = getPx(lm[10]); 
        const cheek = getPx(lm[205]);
        const eye = getPx(lm[230]);

        aiResults.skinType = (fore.v > 175) ? "دهنية / مختلطة" : "عادية / جافة";
        aiResults.acne = (cheek.r > cheek.g + 30);
        aiResults.circles = (eye.v < fore.v * 0.85); // حساس جداً للهالات
        aiResults.pig = (cheek.v < fore.v * 0.9);

        document.getElementById('detectionText').innerHTML = `
            <b>تحليل Verona AI المباشر:</b><br>
            • البشرة: ${aiResults.skinType}<br>
            • الهالات: ${aiResults.circles ? "رصد إجهاد تحت العين" : "منطقة العين مستقرة"}<br>
            • التصبغات: ${aiResults.pig ? "يوجد بقع داكنة" : "لون موحد"}<br>
            • مسام نشطة: ${aiResults.acne ? "نعم" : "لا"}
        `;
        document.getElementById('analyzeBtn').disabled = false;
    }
});

function processScope(sCtx, pt) {
    const x = pt.x * canvas.width - 25; const y = pt.y * canvas.height - 25;
    sCtx.canvas.width = 80; sCtx.canvas.height = 80;
    sCtx.drawImage(canvas, x, y, 50, 50, 0, 0, 80, 80);
}
function getPx(p){ const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height); const d=ctx.getImageData(x,y,1,1).data; return {r:d[0],g:d[1],v:(d[0]+d[1]+d[2])/3}; }
function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function handleImage(e) { const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img}); }; img.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }

function showPreReport() {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('preReportCard').style.display = 'block';
    let msg = `بناءً على الفحص المجهري، بشرتك <b>${aiResults.skinType}</b>. <br><br>`;
    if(aiResults.circles) msg += "• رصدنا نقص في ترطيب منطقة العين، تحتاجين لمادة الكافيين والترطيب.<br>";
    if(aiResults.pig) msg += "• توجد مؤشرات لتصبغات، يفضل استخدام فيتامين C أو مادة الألفا أربوتين.<br>";
    if(aiResults.acne) msg += "• رصدنا نشاط بكتيري/التهاب، نحتاج لغسول يحتوي على سالسليك أسيد.<br>";
    document.getElementById('preReportContent').innerHTML = msg;
}

function openQuestions() {
    document.getElementById('preReportCard').style.display = 'none';
    document.getElementById('questionsCard').style.display = 'block';
}

function generateFinalReport() {
    document.getElementById('questionsCard').style.display = 'none';
    document.getElementById('reportCard').style.display = 'block';
    const budget = document.getElementById('qBudget').value;
    
    document.getElementById('finalHeader').innerHTML = `<h3 style="color:var(--cyan)">باقة Verona الـ ${budget === 'ultra' ? 'المتكاملة' : (budget === 'super' ? 'المطورة' : 'الاقتصادية')}</h3>`;
    
    const container = document.getElementById('pkgContainer');
    container.innerHTML = "";

    let items = [];
    if(budget === 'economy') items = ["أرجنتو كلير", "شان جيل", "بوباي جل"];
    if(budget === 'super') items = ["أرجنتو كلير", "شان جيل", "بوباي جل", "ستارفيل وايتنينج"];
    if(budget === 'ultra') items = ["أرجنتو كلير", "شان جيل", "بوباي جل", "ستارفيل وايتنينج", "ناتافيس فيتامين C", "ستارفيل آي كونتور"];

    let html = `<div class="package-card">`;
    items.forEach(name => {
        const d = productDB[name];
        html += `
            <div class="product-item">
                <div><b>${name}</b><br><small>${d.t}</small></div>
                <a href="${d.link}" target="_blank" class="buy-small">شراء 🛒</a>
            </div>`;
    });
    html += `</div>`;
    container.innerHTML = html;
}
</script>
</body>
</html>
