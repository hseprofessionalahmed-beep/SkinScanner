<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | STABLE V23.9</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; margin-bottom: 15px; background: #000; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        /* طبقة التنبيهات فوق الكاميرا */
        .status-overlay { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 100; pointer-events: none; }
        .badge { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 5px; display: block; border: 1px solid var(--gold); width: fit-content; }

        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: block; }
        .result-btn { background: #25d366 !important; color: #fff !important; font-size: 1.1rem; border: 2px solid #fff; display: none; }
        
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 20px; padding: 15px; display: none; margin-top: 15px; }
        .pkg-card { background: #1a1a1a; border: 1px solid #333; border-radius: 18px; padding: 15px; border-top: 4px solid var(--gold); margin-bottom: 25px; }
        .product-item { padding: 12px 0; border-bottom: 1px solid #222; }
        .usage-box { background: #222; padding: 10px; border-radius: 10px; margin-top: 8px; font-size: 0.8rem; border-right: 3px solid #00f2ff; color: #ccc; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">VERONA AI | V23.9 PRO</h2>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div class="status-overlay">
            <div id="lightBadge" class="badge">جاري فحص الإضاءة...</div>
            <div id="scanBadge" class="badge" style="color:var(--gold); display:none;">جاري تحليل البشرة...</div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startCamera()">1. فتح الكاميرا 📸</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="document.getElementById('fileInput').click()">2. رفع صورة 🖼️</button>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFile(event)">
        
        <button id="resBtn" class="btn result-btn" onclick="goToQuestions()">3. أظهر النتيجة 🔍</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تأكيد الفحص 🔬</h3>
        <p id="aiSummaryText" style="text-align:center; font-size:0.9rem; margin-bottom:15px;"></p>
        <label>هل الحبوب ملتهبة؟</label>
        <select id="qAcne" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border-radius:8px; border:1px solid #444;">
            <option value="no">لا</option><option value="yes">نعم</option>
        </select>
        <button class="btn" onclick="showRoutine()">استخراج الروتين الكامل ✨</button>
    </div>

    <div id="routineCard" class="card">
        <div id="skinLabel" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:15px;"></div>
        <div id="routineList"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const productDB = {
        "أرجنتو كلير": { p: 165, ing: "شجرة الشاي + فيتامين E", ben: "تنظيف وعلاج حبوب", use: "مرتين يومياً (صباحاً ومساءً)", link: "https://www.amazon.eg/s?k=argento+clear" },
        "شان جيل": { p: 195, ing: "ألوفيرا + بانثينول", ben: "ترطيب مائي سريع", use: "بعد الغسول مباشرة", link: "https://www.amazon.eg/s?k=shaan+gel" },
        "بوباي جل": { p: 180, ing: "SPF 50", ben: "حماية من الشمس", use: "قبل الخروج بـ 20 دقيقة", link: "https://www.amazon.eg/s?k=bobai+sunscreen" }
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let analysis = { acne: false, pig: false, skin: 'مختلطة' };

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
    
    faceMesh.onResults(results => {
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const lm = results.multiFaceLandmarks[0];
            
            // رسم الشبكة الذهبية المستقرة
            drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3730', lineWidth: 1});

            const fore = getPixelData(lm[10]); const cheek = getPixelData(lm[205]);
            
            // 1. درجة الإضاءة اللحظية
            const lightBadge = document.getElementById('lightBadge');
            if(fore.v < 100) {
                lightBadge.innerText = "⚠️ إضاءة ضعيفة: زد الإضاءة";
                lightBadge.style.color = "#ff4d4d";
            } else {
                lightBadge.innerText = "✅ إضاءة جيدة";
                lightBadge.style.color = "#25d366";
            }

            // 2. الرصد اللحظي للعيوب
            analysis.acne = (cheek.r - cheek.g > 30);
            analysis.pig = (cheek.v / fore.v < 0.85);
            analysis.skin = (fore.v > 200) ? "دهنية" : "مختلطة";

            const scanBadge = document.getElementById('scanBadge');
            scanBadge.style.display = "block";
            scanBadge.innerText = (analysis.acne || analysis.pig) ? "تم رصد: عيوب محتملة" : "تم رصد: بشرة صافية";

            // 3. إظهار زر النتيجة
            document.getElementById('resBtn').style.display = "block";
        }
    });

    function getPixelData(p) {
        const x = Math.floor(p.x * canvas.width); const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], v: (d[0]+d[1]+d[2])/3 };
    }

    function startCamera() {
        new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start();
        canvas.width = 640; canvas.height = 480;
    }

    function handleFile(e) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height;
                faceMesh.send({image: img});
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function goToQuestions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
        document.getElementById('aiSummaryText').innerHTML = `رصد الذكاء الاصطناعي بشرة <b>${analysis.skin}</b> مع ${analysis.acne ? 'حبوب ملتهبة' : 'لا يوجد عيوب'}.<br>برجاء التحقق:`;
        document.getElementById('qAcne').value = analysis.acne ? "yes" : "no";
    }

    function showRoutine() {
        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('routineCard').style.display = 'block';
        document.getElementById('skinLabel').innerText = "روتينك المخصص للبشرة " + analysis.skin;

        let list = ["أرجنتو كلير", "شان جيل", "بوباي جل"];
        let html = `<div class="pkg-card">`;
        let total = 0;
        list.forEach(name => {
            const p = productDB[name]; total += p.p;
            html += `<div class="product-item">
                <div style="display:flex; justify-content:space-between;"><b>${name}</b> <a href="${p.link}" target="_blank">🛒</a></div>
                <small style="color:#aaa;">🧪 المواد: ${p.ing}</small>
                <div class="usage-box">📝 الاستخدام: ${p.use}</div>
            </div>`;
        });
        html += `<div class="total-row"><span>المجموع:</span><span>${total} ج.م</span></div></div>`;
        document.getElementById('routineList').innerHTML = html;
    }
</script>
</body>
</html>
