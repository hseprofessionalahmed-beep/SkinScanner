<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | V23.4 PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; margin-bottom: 15px; background: #000; }
        video, canvas, #userImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #userImg { display: none; z-index: 5; }
        
        .live-overlay { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 30; pointer-events: none; }
        .badge { background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 5px; display: inline-block; border: 1px solid var(--gold); }

        .btn-group { display: flex; gap: 10px; margin-bottom: 10px; }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; flex: 1; }
        
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 20px; padding: 15px; display: none; margin-top: 15px; }
        
        .pkg-card { background: #1a1a1a; border: 1px solid #333; border-radius: 18px; padding: 15px; border-top: 4px solid var(--gold); margin-bottom: 20px; }
        .product-item { padding: 10px 0; border-bottom: 1px solid #222; }
        .prod-header { display: flex; justify-content: space-between; align-items: center; }
        .prod-info { font-size: 0.75rem; color: #aaa; margin-top: 4px; display: block; }
        .prod-benefit { font-size: 0.75rem; color: #00f2ff; display: block; }
        
        .check-item { display: flex; align-items: center; gap: 12px; background: #222; padding: 12px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #444; cursor: pointer; }
        .check-item input { width: 22px; height: 22px; accent-color: var(--gold); }
        
        .total-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">VERONA AI | V23.4 PRO</h2>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <img id="userImg">
        <canvas id="canvas"></canvas>
        <div class="live-overlay">
            <div id="lightLevel" class="badge">قياس الإضاءة...</div><br>
            <div id="liveDetection" class="badge" style="color:var(--gold); display:none;">فحص العيوب...</div>
        </div>
        <div id="liveStatus" style="position:absolute; bottom:15px; width:100%; text-align:center; font-weight:bold;">جاهز للفحص</div>
    </div>

    <div id="controls">
        <div class="btn-group">
            <button class="btn" onclick="startCam()">الكاميرا 📸</button>
            <button class="btn" style="background:#444; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
            <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        </div>
        <button class="btn" style="background:#222; color:#fff; width:100%;" onclick="openQuestions()">تخصيص الروتين 🔬</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">خيارات إضافية للروتين</h3>
        
        <div class="check-item" onclick="toggleCheck('addGlow')">
            <input type="checkbox" id="addGlow" onclick="event.stopPropagation()">
            <label>إضافة باقة النضارة (هيالورونيك أسيد) ✨</label>
        </div>

        <div class="check-item" onclick="toggleCheck('addWhite')">
            <input type="checkbox" id="addWhite" onclick="event.stopPropagation()">
            <label>إضافة باقة التفتيح (فيتامين C المركز) ⚪</label>
        </div>

        <button class="btn" style="width:100%; margin-top:10px;" onclick="generateFinalReport()">عرض النتائج النهائية ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="skinTypeDisplay" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:15px;"></div>
        <div id="pkgContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff; width:100%;">إعادة الفحص 🔄</button>
        <button class="btn" style="background:#25d366; color:white; width:100%; margin-top:10px;" onclick="sendToWhatsApp()">طلب المنتجات 💬</button>
    </div>
</div>

<script>
    const myPhone = "201063994139";
    const productDB = {
        "ستارفيل وايتنينج غسول": { p: 145, ing: "ألفا أربوتين + عرقسوس", ben: "تفتيح البشرة وتنظيفها بعمق", link: "https://www.amazon.eg/s?k=starville+whitening+cleanser" },
        "أرجنتو كلير غسول": { p: 165, ing: "زيت شجرة الشاي + فيتامين E", ben: "مقاومة الحبوب وتنظيف المسام", link: "https://www.amazon.eg/s?k=argento+clear" },
        "فيشي نورماديرم غسول": { p: 850, ing: "حمض الساليسيليك + معادن", ben: "علاج دهون البشرة المفرطة", link: "https://www.amazon.eg/s?k=vichy+normaderm" },
        "شان جيل مرطب": { p: 195, ing: "بانثينول + ألوفيرا", ben: "ترطيب مائي سريع الامتصاص", link: "https://www.amazon.eg/s?k=shaan+gel" },
        "لوريال هيالورونيك سيروم": { p: 395, ing: "1.5% حمض الهيالورونيك", ben: "ملء الخطوط ونضارة فورية", link: "https://www.amazon.eg/s?k=loreal+hyaluronic" },
        "ديرماتيك هيالورونيك": { p: 260, ing: "هيالورونيك + فيتامين B5", ben: "ترطيب عميق وإصلاح الجلد", link: "https://www.amazon.eg/s?k=dermatique+gel" },
        "ناتافيس فيتامين C": { p: 485, ing: "فيتامين C + فيروليك أسيد", ben: "تفتيح البقع ومحاربة الأكسدة", link: "https://www.amazon.eg/s?k=natavis+vitamin+c" },
        "لاروش بيجمنتكلار": { p: 1250, ing: "كافيين + فينيل ألانين", ben: "علاج الهالات السوداء المزمنة", link: "https://www.amazon.eg/s?k=la+roche+pigmentclar" },
        "ستارفيل آي كونتور": { p: 155, ing: "كافيين + كولاجين", ben: "تخفيف انتفاخات وعلامات الإجهاد", link: "https://www.amazon.eg/s?k=starville+eye+contour" },
        "بوباي جل واقي شمس": { p: 180, ing: "فلاتر حماية SPF 50", ben: "حماية من الشمس للبشرة الدهنية", link: "https://www.amazon.eg/s?k=bobai+sunscreen+gel" },
        "لاروش أنثيليوس": { p: 650, ing: "تكنولوجيا ميكسوبلكس", ben: "أعلى حماية طبية من الشمس", link: "https://www.amazon.eg/s?k=la+roche+posay+anthelios" }
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    let aiAnalysis = { acne: false, pig: false, circles: false, skinType: 'مختلطة' };

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
    
    faceMesh.onResults(results => {
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const lm = results.multiFaceLandmarks[0];
            const fore = getPx(lm[10]); const cheek = getPx(lm[205]); const eye = getPx(lm[230]);
            
            // تحليل الإضاءة
            const light = fore.v;
            const lightEl = document.getElementById('lightLevel');
            lightEl.innerText = light < 100 ? "⚠️ قم بزيادة الإضاءة" : "✅ إضاءة مثالية";
            lightEl.style.color = light < 100 ? "#ff4d4d" : "#25d366";

            // تحليل العيوب
            aiAnalysis.skinType = (fore.v > 205) ? "دهنية" : (fore.v < 115 ? "جافة" : "مختلطة");
            aiAnalysis.acne = (cheek.r - cheek.g > 35);
            aiAnalysis.pig = (cheek.v / fore.v < 0.85);
            aiAnalysis.circles = (eye.v < fore.v * 0.72);

            const detEl = document.getElementById('liveDetection');
            detEl.style.display = "inline-block";
            let msgs = [];
            if(aiAnalysis.acne) msgs.push("حبوب ملتهبة");
            if(aiAnalysis.pig) msgs.push("تصبغات");
            if(aiAnalysis.circles) msgs.push("هالات");
            detEl.innerText = msgs.length > 0 ? "رصد: " + msgs.join(" - ") : "البشرة صافية ✨";

            drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3740', lineWidth: 1});
        }
    });

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width); const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], v: (d[0]+d[1]+d[2])/3 };
    }

    function startCam() {
        document.getElementById('userImg').style.display = 'none';
        new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start();
    }

    function handleImage(e) {
        const reader = new FileReader();
        reader.onload = function(event){
            const img = document.getElementById('userImg');
            img.src = event.target.result;
            img.style.display = 'block';
            img.onload = () => faceMesh.send({image: img});
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function toggleCheck(id) { document.getElementById(id).click(); }

    function openQuestions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
    }

    function generateFinalReport() {
        const addGlow = document.getElementById('addGlow').checked;
        const addWhite = document.getElementById('addWhite').checked;

        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeDisplay').innerText = "التقرير النهائي: بشرة " + aiAnalysis.skinType;

        const container = document.getElementById('pkgContainer');
        container.innerHTML = "";

        [{id:'low', n:'الباقة الاقتصادية 🥉'}, {id:'high', n:'الباقة الألترا 🥇'}].forEach(lvl => {
            let list = [];
            // غسول
            if(aiAnalysis.skinType === "دهنية") list.push(lvl.id === 'high' ? "فيشي نورماديرم غسول" : "أرجنتو كلير غسول");
            else list.push("ستارفيل وايتنينج غسول");
            
            // علاج العيوب
            if(aiAnalysis.acne) list.push("أرجنتو كلير غسول");
            if(aiAnalysis.pig) list.push("ناتافيس فيتامين C");
            if(aiAnalysis.circles) list.push(lvl.id === 'high' ? "لاروش بيجمنتكلار" : "ستارفيل آي كونتور");
            
            // إضافات المستخدم
            if(addGlow) list.push(lvl.id === 'high' ? "لوريال هيالورونيك سيروم" : "ديرماتيك هيالورونيك");
            if(addWhite) list.push("ناتافيس فيتامين C");

            // أساسيات
            list.push("شان جيل مرطب");
            list.push(lvl.id === 'high' ? "لاروش أنثيليوس" : "بوباي جل واقي شمس");

            let html = `<div class="pkg-card"><div style="color:var(--gold); font-weight:bold; margin-bottom:10px;">${lvl.n}</div>`;
            let total = 0;
            [...new Set(list)].forEach(name => {
                const d = productDB[name]; total += d.p;
                html += `<div class="product-item">
                    <div class="prod-header">
                        <b>${name}</b>
                        <a href="${d.link}" target="_blank" style="text-decoration:none;">🛒</a>
                    </div>
                    <span class="prod-info">🧪 المادة: ${d.ing}</span>
                    <span class="prod-benefit">✨ الفائدة: ${d.ben}</span>
                    <div style="text-align:left; font-weight:bold; color:#25d366; font-size:0.8rem;">${d.p} ج.م</div>
                </div>`;
            });
            html += `<div class="total-row"><span>الإجمالي:</span><span>${total} ج.م</span></div></div>`;
            container.innerHTML += html;
        });
    }

    function sendToWhatsApp() {
        window.open(`https://wa.me/${myPhone}?text=أريد طلب روتين العناية المخصص لي من VERONA AI.`, '_blank');
    }
</script>
</body>
</html>
