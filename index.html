<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | PROFESSIONAL V10</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; margin-bottom: 15px; }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #upImg { display: none; z-index: 5; }
        canvas { z-index: 10; pointer-events: none; }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .routine-item { background: rgba(0,0,0,0.4); padding: 12px; border-right: 4px solid var(--gold); border-radius: 8px; margin-bottom: 10px; font-size: 0.9rem; }
        .btn-whatsapp { background: #25d366; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-shadow: 0 2px 4px #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">VERONA AI | النظام المتكامل</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div id="liveStatus">بانتظار الصورة...</div>
    </div>

    <div id="controls">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="btn" style="background:#222; color:#fff;" onclick="startCam()">الكاميرا 📸</button>
            <label class="btn" style="background:#222; color:#fff; display:flex; align-items:center; justify-content:center;">
                صورة 📁 <input type="file" hidden onchange="handleFile(event)">
            </label>
        </div>
        <button class="btn" onclick="showBudgetOptions()">بدء التحليل واختيار الروتين 🔬</button>
    </div>

    <div id="budgetCard" class="card">
        <h3 style="text-align:center; color:var(--gold);">اختر ميزانية الروتين</h3>
        <button class="btn" onclick="generateRoutine('low')">اقتصادي (فعالية قصوى بأقل سعر)</button>
        <button class="btn" onclick="generateRoutine('mid')">متوسط (جودة طبية متقدمة)</button>
        <button class="btn" onclick="generateRoutine('high')">فاخر (أحدث تقنيات الليبوسومال والذهب)</button>
    </div>

    <div id="reportCard" class="card">
        <h2 id="finalScore" style="text-align:center; color:var(--gold); font-size:3rem;">100%</h2>
        <p id="skinTypeText" style="text-align:center; color:#00f2ff; font-weight:bold;"></p>
        <div id="routineList"></div>
        
        <button class="btn btn-whatsapp" onclick="sendToWhatsApp()">
            طلب الروتين عبر واتساب 💬
        </button>
        
        <button class="btn" style="background:#333; color:#fff; margin-top:10px;" onclick="location.reload()">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    
    let faceMesh, selectedProducts = [], userScore = 100, userSkinType = "مختلطة";

    async function init() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
        faceMesh.onResults(results => {
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks) {
                const lm = results.multiFaceLandmarks[0];
                const f = getPx(lm[10]);
                if (f.v > 190) userSkinType = "دهنية"; else if (f.v < 115) userSkinType = "جافة";
                document.getElementById('liveStatus').innerText = `تم تحليل نوع البشرة: ${userSkinType} ✅`;
            }
        });
    }

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { v: (d[0]+d[1]+d[2])/3 };
    }

    function showBudgetOptions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('budgetCard').style.display = 'block';
    }

    function generateRoutine(budget) {
        const list = document.getElementById('routineList');
        list.innerHTML = "";
        selectedProducts = [];
        
        if(budget === 'low') {
            addP("غسول", "ستارفيل وايتنينج", "تفتيح + تحكم بالدهون");
            addP("سيروم تفتيح", "كريم ديرويس (Derwise)", "أربوتين + كوجيك أسيد");
            addP("واقي شمس", "إيفا SPF50", "حماية يومية اقتصادية");
        } else if(budget === 'mid') {
            addP("غسول", "نانوتريت (Salicylic + Niacinamide)", "تنظيف مسام + تقوية حاجز");
            addP("سيروم تفتيح", "Natavis Serum", "أربوتين + فيروليك أسيد");
            addP("واقي شمس", "ستارفيل جل تبييض SPF50+", "حماية + توحيد لون");
        } else {
            addP("غسول فاخر", "دير غسول (Der Cleanser)", "فيتامين E + ماتمارين");
            addP("سيروم شامل", "XQ Pharma Serum", "Tranexamic + Arbutin + Vit C");
            addP("نضارة ملكية", "Nano Treat 24K Gold", "ذهب + كولاجين + ليبوسومال");
            addP("واقي شمس", "كولاجرا جل تفتيح SPF50", "تفتيح مكثف + حماية");
        }

        document.getElementById('budgetCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeText').innerText = "نوع البشرة المكتشف: " + userSkinType;
    }

    function addP(c, n, i) {
        selectedProducts.push(`${c}: ${n}`);
        document.getElementById('routineList').innerHTML += `<div class="routine-item"><b>${c}:</b> ${n}<br><small style="color:#00f2ff">${i}</small></div>`;
    }

    function sendToWhatsApp() {
        const phone = "201063994139";
        let msg = `مرحباً Verona AI، أود طلب الروتين التالي:\n\n📊 النتيجة: ${userScore}%\n👤 البشرة: ${userSkinType}\n\n📦 القائمة:\n`;
        selectedProducts.forEach(p => msg += `• ${p}\n`);
        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function startCam() { upImg.style.display='none'; video.style.display='block'; new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); }
    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => { upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none'; upImg.onload = async () => await faceMesh.send({image: upImg}); };
        r.readAsDataURL(e.target.files[0]);
    }
    init();
</script>
</body>
</html>
