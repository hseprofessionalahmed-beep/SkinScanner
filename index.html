<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | ULTIMATE V23.8</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; margin-bottom: 15px; background: #000; }
        video, canvas, #userImg { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        #userImg { display: none; z-index: 5; }
        
        /* طبقة المعلومات فوق الكاميرا */
        .status-overlay { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 100; pointer-events: none; }
        .badge { background: rgba(0,0,0,0.8); padding: 8px 12px; border-radius: 12px; font-size: 0.8rem; margin-bottom: 5px; display: block; border: 1px solid var(--gold); width: fit-content; }

        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; display: block; }
        .result-btn { background: #25d366 !important; color: #fff !important; font-size: 1.1rem; border: 2px solid #fff; }
        
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 20px; padding: 15px; display: none; margin-top: 15px; }
        .pkg-card { background: #1a1a1a; border: 1px solid #333; border-radius: 18px; padding: 15px; border-top: 4px solid var(--gold); margin-bottom: 25px; }
        .product-item { padding: 12px 0; border-bottom: 1px solid #222; }
        .usage-box { background: #222; padding: 10px; border-radius: 10px; margin-top: 10px; font-size: 0.8rem; border-right: 3px solid #00f2ff; color: #eee; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); margin-top: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">VERONA AI | V23.8 PRO</h2>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <img id="userImg">
        <canvas id="canvas"></canvas>
        <div class="status-overlay">
            <div id="lightLevel" class="badge">جاري قياس الإضاءة...</div>
            <div id="detectBadge" class="badge" style="color:var(--gold); display:none;">جاري فحص العيوب...</div>
        </div>
    </div>

    <div id="mainControls">
        <button class="btn" onclick="startCam()">1. فتح الكاميرا 📸</button>
        <button class="btn" style="background:#444; color:#fff;" onclick="document.getElementById('fileInput').click()">2. رفع صورة 🖼️</button>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        
        <button id="showResBtn" class="btn result-btn" style="display:none;" onclick="openQuestions()">3. أظهر النتيجة 🔍</button>
    </div>

    <div id="scanResultCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">نتائج المسح الأولي</h3>
        <p id="scanSummary" style="text-align:center; font-size:0.9rem;"></p>
        <hr style="border:0.5px solid #333;">
        <label>تأكيد: هل تعاني من حبوب حالياً؟</label>
        <select id="qAcne" style="width:100%; padding:10px; margin-bottom:15px; background:#222; color:#fff; border-radius:8px;">
            <option value="no">لا</option><option value="yes">نعم</option>
        </select>
        <button class="btn" onclick="generateFinalReport()">عرض الروتين الكامل 📊</button>
    </div>

    <div id="reportCard" class="card">
        <div id="skinTypeDisplay" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:15px;"></div>
        <div id="pkgContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">إعادة الفحص 🔄</button>
    </div>
</div>

<script>
    const myPhone = "201063994139";
    const productDB = {
        "ستارفيل وايتنينج غسول": { p: 145, ing: "ألفا أربوتين", ben: "تفتيح وتنظيف", use: "مرتين يومياً", link: "https://www.amazon.eg/s?k=starville+whitening" },
        "أرجنتو كلير غسول": { p: 165, ing: "زيت شجرة الشاي", ben: "علاج الحبوب", use: "مرة صباحاً ومرة مساءً", link: "https://www.amazon.eg/s?k=argento+clear" },
        "شان جيل": { p: 195, ing: "بانثينول + ألوفيرا", ben: "ترطيب مائي", use: "بعد الغسول مباشرة", link: "https://www.amazon.eg/s?k=shaan+gel" },
        "بوباي جل شمس": { p: 180, ing: "SPF 50", ben: "حماية من الشمس", use: "قبل الخروج بـ 20 دقيقة", link: "https://www.amazon.eg/s?k=bobai+sunscreen" }
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let aiAnalysis = { acne: false, pig: false, skinType: 'مختلطة' };

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
    
    faceMesh.onResults(results => {
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const lm = results.multiFaceLandmarks[0];
            
            // رسم الشبكة الذهبية (Face Mesh)
            drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3740', lineWidth: 1});

            const fore = getPx(lm[10]); const cheek = getPx(lm[205]);
            
            // درجة الإضاءة
            document.getElementById('lightLevel').innerText = fore.v < 100 ? "⚠️ إضاءة ضعيفة: زد الإضاءة" : "✅ إضاءة مثالية";
            document.getElementById('lightLevel').style.color = fore.v < 100 ? "#ff4d4d" : "#25d366";

            aiAnalysis.acne = (cheek.r - cheek.g > 35);
            aiAnalysis.pig = (cheek.v / fore.v < 0.85);
            aiAnalysis.skinType = (fore.v > 200) ? "دهنية" : "مختلطة";

            // الرصد اللحظي
            const detBadge = document.getElementById('detectBadge');
            detBadge.style.display = "block";
            detBadge.innerText = (aiAnalysis.acne || aiAnalysis.pig) ? "رصد: عيوب محتملة" : "رصد: بشرة نقية ✨";

            // إظهار زر النتيجة
            document.getElementById('showResBtn').style.display = "block";
        }
    });

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width); const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], v: (d[0]+d[1]+d[2])/3 };
    }

    function startCam() { 
        document.getElementById('userImg').style.display='none';
        new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start();
        canvas.width=640; canvas.height=480;
    }

    function handleImage(e) {
        const r = new FileReader();
        r.onload = (ev) => {
            const img = document.getElementById('userImg');
            img.src = ev.target.result; img.style.display = 'block';
            img.onload = () => { canvas.width=img.width; canvas.height=img.height; faceMesh.send({image: img}); };
        };
        r.readAsDataURL(e.target.files[0]);
    }

    function openQuestions() {
        document.getElementById('mainControls').style.display = 'none';
        document.getElementById('scanResultCard').style.display = 'block';
        document.getElementById('scanSummary').innerHTML = `لقد رصدنا بشرة <b style="color:var(--gold)">${aiAnalysis.skinType}</b> مع ${aiAnalysis.acne ? 'حبوب ملتهبة' : 'لا يوجد عيوب واضحة'}.`;
        document.getElementById('qAcne').value = aiAnalysis.acne ? "yes" : "no";
    }

    function generateFinalReport() {
        document.getElementById('scanResultCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeDisplay').innerText = "روتين فيرونا للبشرة " + aiAnalysis.skinType;

        const container = document.getElementById('pkgContainer');
        container.innerHTML = "";

        ["الروتين الاقتصادي", "الروتين الاحترافي"].forEach(lvl => {
            let list = ["أرجنتو كلير غسول", "شان جيل", "بوباي جل شمس"];
            let html = `<div class="pkg-card"><div style="color:var(--gold); font-weight:bold; text-align:center; margin-bottom:10px;">${lvl}</div>`;
            let total = 0;
            list.forEach(name => {
                const d = productDB[name] || {p:180, ing:'--', ben:'--', use:'--', link:'#'};
                total += d.p;
                html += `<div class="product-item">
                    <div style="display:flex; justify-content:space-between;"><b>${name}</b> <a href="${d.link}" target="_blank">🛒</a></div>
                    <span style="font-size:0.75rem; color:#aaa;">🧪 المادة: ${d.ing} | ✨ الفائدة: ${d.ben}</span>
                    <div class="usage-box">📝 الاستخدام: ${d.use}</div>
                </div>`;
            });
            html += `<div class="total-row"><span>الإجمالي:</span><span>${total} ج.م</span></div></div>`;
            container.innerHTML += html;
        });
    }
</script>
</body>
</html>
