<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI - Pro Facial Precision</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid #333; min-height: 300px; }
        video, canvas { width: 100%; height: auto; }
        #overlay { position: absolute; top: 0; left: 0; z-index: 10; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .action-btn { background: var(--gold); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .scan-btn { background: #fff; width: 100%; font-size: 1.1rem; border: 3px solid var(--gold); margin-top:10px; }
        .result-card { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--gold); text-align: right; }
        .hidden { display: none; }
        .status-msg { color: var(--gold); font-size: 0.9rem; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>
    <div id="status" class="status-msg">جاري تحميل المحرك الذكي...</div>

    <div class="preview-box">
        <video id="input_video" class="hidden" playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="btn-grid">
        <button class="action-btn" onclick="initCamera()">📸 الكاميرا</button>
        <button class="action-btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
    </div>
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(event)">

    <button id="scanBtn" class="action-btn scan-btn" onclick="performDiagnosis()">تحليل النتائج الآن 🔬</button>

    <div id="resultCard" class="result-card hidden">
        <h3 id="resTitle" style="color:var(--gold); margin:0;">--</h3>
        <p id="resDetails">--</p>
        <div id="scoreBox" style="font-size:1.2rem; font-weight:bold; border-top:1px solid #333; padding-top:10px;"></div>
        <button class="action-btn" style="background:#25d366; color:white; width:100%; margin-top:15px;" onclick="sendToWA()">إرسال واتساب ✅</button>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('overlay');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently: true});
let faceMesh;
let lastResults = null;
let currentImg = null;

// 1. تهيئة المحرك فور تحميل الصفحة
async function setupFaceMesh() {
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
    faceMesh.onResults(onResults);
    document.getElementById('status').innerText = "المحرك جاهز للفحص ✅";
}
setupFaceMesh();

function onResults(results) {
    lastResults = results;
    canvasElement.width = canvasElement.clientWidth;
    canvasElement.height = (currentImg) ? (currentImg.height * (canvasElement.width / currentImg.width)) : videoElement.videoHeight * (canvasElement.width / videoElement.videoWidth);
    
    canvasCtx.save();
    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
    
    if (results.multiFaceLandmarks) {
        for (const landmarks of results.multiFaceLandmarks) {
            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color: '#d4af3744', lineWidth: 0.5});
        }
    }
    canvasCtx.restore();
}

async function initCamera() {
    currentImg = null;
    videoElement.classList.remove('hidden');
    const camera = new Camera(videoElement, {
        onFrame: async () => { await faceMesh.send({image: videoElement}); }
    });
    camera.start();
}

function processFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const img = new Image();
    img.onload = async () => {
        currentImg = img;
        videoElement.classList.add('hidden');
        document.getElementById('status').innerText = "يتم الآن رسم خريطة الوجه...";
        await faceMesh.send({image: img});
    };
    img.src = URL.createObjectURL(file);
}

function performDiagnosis() {
    if (!lastResults || !lastResults.multiFaceLandmarks) {
        return alert("يرجى التقاط وجه واضح أولاً");
    }

    const landmarks = lastResults.multiFaceLandmarks[0];
    
    // دالة تحليل دقيقة للسطوع والتباين (حساسة للنمش والتصبغات)
    function checkArea(lm) {
        const x = Math.floor(lm.x * canvasElement.width);
        const y = Math.floor(lm.y * canvasElement.height);
        const pixel = canvasCtx.getImageData(x, y, 1, 1).data;
        return (pixel[0] + pixel[1] + pixel[2]) / 3;
    }

    const forehead = checkArea(landmarks[10]); 
    const cheek = checkArea(landmarks[205]);   // منطقة النمش والتصبغات
    const eye = (checkArea(landmarks[130]) + checkArea(landmarks[350])) / 2; // الهالات

    const pigmentDiff = cheek / forehead;
    const eyeDiff = eye / forehead;

    let res = { title: "بشرة مثالية ✅", desc: "توزيع الصبغات متناسق جداً وبشرتك صافية.", score: 98 };

    // رفع الحساسية: أي تفاوت بسيط يكتشف فوراً
    if (eyeDiff < 0.85) {
        res = { title: "هالات سوداء مكتشفة 👁️", desc: "تم رصد تباين لوني تحت العين. ننصح بكريمات تحتوي على الكافيين.", score: 76 };
    } else if (pigmentDiff < 0.90) {
        res = { title: "تصبغات / نمش نشط 🔍", desc: "رصدنا بقع داكنة في الوجنتين. ننصح بسيروم تفتيح وواقي شمس.", score: 82 };
    }

    document.getElementById('resultCard').classList.remove('hidden');
    document.getElementById('resTitle').innerText = res.title;
    document.getElementById('resDetails').innerText = res.desc;
    document.getElementById('scoreBox').innerText = `درجة الصحة: ${res.score}%`;
}

function sendToWA() {
    const text = `تقرير فيرونا AI: ${document.getElementById('resTitle').innerText}`;
    window.open(`https://wa.me/201063994139?text=${text}`);
}
</script>
</body>
</html>
