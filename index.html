<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Scanner Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Logo -->
  <div class="logo-container">
    <img src="logo.png" class="logo-img">
  </div>

  <h2>تحليل البشرة الذكي</h2>

  <!-- اختيار الوضع -->
  <div class="mode-select">
    <button onclick="chooseMode('camera')">📸 كاميرا</button>
    <button onclick="chooseMode('file')">📁 رفع صورة</button>
  </div>

  <!-- الكاميرا -->
  <video id="video" autoplay class="hidden"></video>
  <canvas id="canvas" class="hidden"></canvas>
  <button id="captureBtn" class="hidden">بدء التحليل</button>

  <!-- رفع صورة -->
  <div id="fileUpload" class="hidden">
    <input type="file" id="imageInput" accept="image/*">
  </div>

  <!-- نتيجة التحليل -->
  <div id="analysisResult" class="hidden"></div>

  <!-- اختيار مستوى الروتين -->
  <div id="levelSelect" class="hidden"></div>

  <!-- الروتين النهائي -->
  <div id="result" class="hidden"></div>

</div>

<script src="script.js"></script>
<script src="routine.js"></script>
</body>
</html>
