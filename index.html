<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA | Glow Smarter</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="brand-header">
            <img src="logo.png" alt="VERONA" class="main-logo">
        </header>

        <div class="scanner-box">
            <video id="video" autoplay muted playsinline></video>
            <div id="loading-overlay">جاري تشغيل محرك فيرونا الذكي...</div>
        </div>

        <div class="upload-controls">
            <button id="scanBtn" class="primary-btn">فحص بالكاميرا 📸</button>
            <label for="imageUpload" class="secondary-btn">
                رفع صورة من الاستوديو 📁
            </label>
            <input type="file" id="imageUpload" accept="image/*" style="display:none;">
        </div>

        <div id="results" style="display:none;"></div>
    </div>

    <script src="routine_data.js"></script>
    <script src="ai_face_scan.js"></script>
    <script src="script.js"></script>
    <script src="whatsapp_send.js"></script>
</body>
</html>
