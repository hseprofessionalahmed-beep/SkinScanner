<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI - Pro Facial Precision</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
.container { max-width: 600px; margin: auto; }
.preview-box { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid #333; min-height: 350px; }
video, canvas, img.preview-img { width: 100%; height: auto; display: block; margin:auto; }
#overlay { position: absolute; top: 0; left: 0; z-index: 10; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
.action-btn { background: var(--gold); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
.scan-btn { background: #fff; width: 100%; font-size: 1.1rem; border: 3px solid var(--gold); margin-top:10px; }
.result-card, .question-card, .routine-card, .recommend-card { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--gold); text-align: right; }
.hidden { display: none; }
.status-msg { color: var(--gold); font-size: 0.9rem; margin: 10px 0; }
.routine-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
.routine-card button { margin-top:10px; background:#25d366; color:white; width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
label {display:block; margin:5px 0;}
select {width:100%; padding:6px; border-radius:6px; border:1px solid #ccc; background:#222; color:white;}
</style>
</head>
<body>
<div class="container">
<h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>
<div id="status" class="status-msg">جاري تحميل المحرك الذكي...</div>
<div class="preview-box">
<video id="input_video" class="hidden" playsinline></video>
<img id="previewImg" class="preview-img hidden">
<canvas id="overlay"></canvas>
</div>
<div class="btn-grid">
<button class="action-btn" onclick="initCamera()">📸 الكاميرا</button>
<button class="action-btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
</div>
<input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(event)">
<button id="scanBtn" class="action-btn scan-btn" onclick="triggerQuestions()">تحليل النتائج الآن 🔬</button>

<div id="questionCard" class="question-card hidden">
<h3 style="color:var(--gold); margin:0;">لقد اكتشف المحلل الذكي بعض المشاكل، قم بتأكيدها:</h3>
<div id="questionsArea"></div>
<button class="action-btn scan-btn" onclick="computeRoutine()">استخراج الروتين ✅</button>
</div>

<div id="routineArea" class="routine-grid hidden"></div>
<div id="recommendCard" class="recommend-card hidden">
<h3 style="color:var(--gold);">التوصيات العامة</h3>
<ul>
<li>الترطيب لمدة أسبوع على الأقل قبل الروتين إذا كانت البشرة جافة.</li>
<li>شرب كمية كافية من الماء يوميًا.</li>
<li>النوم باكرًا لتحفيز تجديد البشرة.</li>
<li>استخدام واقي الشمس يوميًا.</li>
</ul>
</div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const previewImg = document.getElementById('previewImg');
const canvasElement = document.getElementById('overlay');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently:true});
let faceMesh;
let lastResults = null;
let currentImg = null;
let detectedIssues = {};

async function setupFaceMesh(){
    faceMesh = new FaceMesh({locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5 });
    faceMesh.onResults(onResults);
    document.getElementById('status').innerText="المحرك جاهز للفحص ✅";
}
setupFaceMesh();

function onResults(results){
    lastResults = results;
    canvasElement.width = canvasElement.clientWidth;
    canvasElement.height = (currentImg)? (currentImg.height*(canvasElement.width/currentImg.width)) : videoElement.videoHeight*(canvasElement.width/videoElement.videoWidth);
    canvasCtx.save();
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
    if(currentImg){
        canvasCtx.drawImage(currentImg,0,0,canvasElement.width,canvasElement.height);
    } else {
        canvasCtx.drawImage(results.image,0,0,canvasElement.width,canvasElement.height);
    }
    detectedIssues = detectFaceIssues(results);
    canvasCtx.restore();
}

async function initCamera(){
    currentImg=null;
    videoElement.classList.remove('hidden');
    previewImg.classList.add('hidden');
    const camera = new Camera(videoElement, {onFrame: async()=>{await faceMesh.send({image:videoElement});}});
    camera.start();
}

function processFile(event){
    const file = event.target.files[0];
    if(!file)return;
    const img = new Image();
    img.onload = async ()=>{
        currentImg=img;
        videoElement.classList.add('hidden');
        previewImg.src = img.src;
        previewImg.classList.remove('hidden');
        await faceMesh.send({image:img});
    };
    img.src = URL.createObjectURL(file);
}

function detectFaceIssues(results){
    // مثال مبسط: استخدم R/G ratio لاكتشاف الهالات، بقع، جفاف
    // هذه الدالة يمكن تطويرها لاحقًا لتفصيل أكثر حسب مناطق الوجه
    const issues = {};
    if(results && results.multiFaceLandmarks){
        const lm = results.multiFaceLandmarks[0];
        // هنا يمكن إضافة كشف دقيق للبقع، النمش، الهالات
        // الآن نعطي مثال تجريبي
        issues.halations=true;
        issues.pigment=true;
        issues.spot=true;
        issues.dry=false;
    }
    return issues;
}

function triggerQuestions(){
    if(!lastResults) return alert('يرجى التقاط وجه واضح أولاً');
    const qCard=document.getElementById('questionCard');
    const qArea=document.getElementById('questionsArea');
    qArea.innerHTML='';

    // الهالات
    if(detectedIssues.halations){
        qArea.innerHTML+='<label>الهالات تحت العين: <select id="halations"><option value="خفيفة" selected>خفيفة</option><option value="متوسطة">متوسطة</option><option value="عميقة">عميقة</option></select></label>';
    } else {
        qArea.innerHTML+='<label>الهالات تحت العين: <select id="halations"><option value="لا" selected>لا يوجد</option><option value="خفيفة">خفيفة</option><option value="متوسطة">متوسطة</option><option value="عميقة">عميقة</option></select></label>';
    }

    // التصبغات / البقع
    if(detectedIssues.pigment){
        qArea.innerHTML+='<label>البقع أو التصبغات: <select id="pigment"><option value="خفيفة" selected>خفيفة</option><option value="متوسطة">متوسطة</option><option value="عميقة">عميقة</option></select></label>';
    } else {
        qArea.innerHTML+='<label>البقع أو التصبغات: <select id="pigment"><option value="لا" selected>لا يوجد</option><option value="خفيفة">خفيفة</option><option value="متوسطة">متوسطة</option><option value="عميقة">عميقة</option></select></label>';
    }

    // الحبوب
    if(detectedIssues.spot){
        qArea.innerHTML+='<label>الحبوب: <select id="spot"><option value="نعم" selected>نعم</option><option value="لا">لا</option></select></label>';
        qArea.innerHTML+='<label>لون الحبوب: <select id="spotColor"><option value="أحمر" selected>أحمر</option><option value="أصفر">أصفر</option><option value="متقشر">متقشر</option></select></label>';
        qArea.innerHTML+='<label>مكان الحبوب: <select id="spotPlace"><option value="الخدود" selected>الخدود</option><option value="الجبهة">الجبهة</option><option value="الذقن">الذقن</option></select></label>';
    } else {
        qArea.innerHTML+='<label>الحبوب: <select id="spot"><option value="لا" selected>لا</option><option value="نعم">نعم</option></select></label>';
    }

    // جفاف البشرة
    if(detectedIssues.dry){
        qArea.innerHTML+='<label>جفاف البشرة: <select id="dry"><option value="نعم" selected>نعم</option><option value="لا">لا</option></select></label>';
    } else {
        qArea.innerHTML+='<label>جفاف البشرة: <select id="dry"><option value="لا" selected>لا</option><option value="نعم">نعم</option></select></label>';
    }

    // نضارة/تفتيح
    qArea.innerHTML+='<label>هل تريد نضارة / تفتيح / كلاهما؟ <select id="beauty"><option value="نضارة">نضارة</option><option value="تفتيح">تفتيح</option><option value="كلاهما" selected>كلاهما</option><option value="لا">لا</option></select></label>';

    qCard.classList.remove('hidden');
}

function computeRoutine(){
    const routineArea=document.getElementById('routineArea');
    routineArea.innerHTML='';
    routineArea.classList.remove('hidden');

    // مثال روتين مخصص وفق المشاكل المختارة
    const halation = document.getElementById('halations').value;
    const pigment = document.getElementById('pigment').value;
    const spot = document.getElementById('spot').value;
    const dry = document.getElementById('dry').value;
    const beauty = document.getElementById('beauty').value;

    const routines = [
        {
            type:'اقتصادي',
            products:[
                {name:'Garnier Fast Bright Serum',active:'فيتامين C + نياسيناميد',benefit:'تفتيح البقع الداكنة، توحيد لون البشرة، إشراقة فورية'},
                {name:'Neutrogena Retinol Booster',active:'ريتينول + كولاجين',benefit:'مكافحة التجاعيد والخطوط الدقيقة'},
                {name:'Starfeel Face Wash',active:'حمض الساليسيليك + بانثينول',benefit:'تنظيف البشرة الدهنية والمختلطة'}
            ],
            sunscreen:'Eva SPF50 حماية + تفتيح',
            price:'500 جنيه',
            duration:'4 أسابيع',
            improvement:'50%'
        },
        {
            type:'سوبر',
            products:[
                {name:'Cleo Radiance Booster',active:'Alpha Arbutin + فيتامين C + HA Exfoliant',benefit:'تفتيح البقع، تقشير لطيف، إشراقة وتوحيد اللون'},
                {name:'Infinity Retinol Serum',active:'ريتينول + فيتامين C',benefit:'مكافحة التجاعيد، إشراقة وتوحيد لون البشرة'},
                {name:'Garnier Fast Clear 3 in 1',active:'BHA + Vitamin C',benefit:'تنظيف البشرة الدهنية وحب الشباب'}
            ],
            sunscreen:'Starfeel SPF50+ حماية + تفتيح',
            price:'800 جنيه',
            duration:'6 أسابيع',
            improvement:'70%'
        },
        {
            type:'ألترا',
            products:[
                {name:'Natavis Serum',active:'Alpha Arbutin + Niacinamide + Ferulic Acid',benefit:'تفتيح البقع الداكنة والمتوسطة، توحيد اللون، حماية من الأكسدة'},
                {name:'Dermactive Acti-Glo',active:'فيتامين C + مكونات إشراقة إضافية',benefit:'إشراقة فورية، ترطيب متوسط، تفتيح بسيط'},
                {name:'Derma Ten Glycolic 10%',active:'حمض الجليكوليك',benefit:'تقشير وتفتيح البقع الداكنة، تحسين ملمس البشرة'}
            ],
            sunscreen:'Collagra SPF50 حماية + تفتيح',
            price:'1200 جنيه',
            duration:'8 أسابيع',
            improvement:'90%'
        }
    ];

    routines.forEach(r=>{
        const card=document.createElement('div');
        card.className='routine-card';
        let prodHtml = '';
        r.products.forEach(p=>{prodHtml+=`<p><b>${p.name}</b> (${p.active}): ${p.benefit}</p>`;});
        card.innerHTML=`<h4 style='color:var(--gold)'>${r.type}</h4>
        ${prodHtml}
        <p><b>واقي الشمس:</b> ${r.sunscreen}</p>
        <p><b>السعر:</b> ${r.price}</p>
        <p><b>مدة الاستخدام:</b> ${r.duration}</p>
        <p><b>نسبة التحسن المتوقعة:</b> ${r.improvement}</p>
        <button onclick="sendWA('${r.type}')">اختيار هذا الروتين ✅</button>`;
        routineArea.appendChild(card);
    });
    document.getElementById('recommendCard').classList.remove('hidden');
}

function sendWA(type){
    const text=`اختار الروتين: ${type}`;
    window.open(`https://wa.me/201063994139?text=${text}`);
}
</script>
</body>
</html>
