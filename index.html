<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | V97 ULTRA CLINIC</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>
:root{
--gold:#d4af37;
--bg:#0a0a0a;
--card:#141414;
--accent:#00f2ff;
--danger:#ff4d4d;
}

body{
margin:0;
background:var(--bg);
font-family:'Segoe UI';
color:#fff;
text-align:center;
}

.header{
background:#fff;
padding:10px;
border-bottom:3px solid var(--gold);
}
.header img{height:60px;}

.container{max-width:520px;margin:auto;padding:15px;}

.preview{
position:relative;
aspect-ratio:4/5;
border-radius:25px;
overflow:hidden;
border:2px solid var(--gold);
background:#000;
}

video,canvas{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

.overlay-grid{
position:absolute;
width:100%;
height:100%;
background-image:linear-gradient(rgba(255,255,255,0.05) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,0.05) 1px,transparent 1px);
background-size:25px 25px;
animation:fadeGrid 2s infinite alternate;
}

@keyframes fadeGrid{
from{opacity:0.2;}
to{opacity:0.6;}
}

.scan-line{
position:absolute;
width:100%;
height:3px;
background:linear-gradient(90deg,transparent,var(--accent),transparent);
animation:scan 2s linear infinite;
}

@keyframes scan{
0%{top:0%;}
100%{top:100%;}
}

.btn{
background:linear-gradient(135deg,#a67c00,#ffbf00);
border:none;
padding:14px;
border-radius:12px;
font-weight:bold;
width:100%;
margin-top:10px;
}

.card{
background:var(--card);
border-radius:20px;
padding:15px;
margin-top:15px;
display:none;
}

.gauge{
width:120px;
height:120px;
margin:10px auto;
}

.product{
display:flex;
justify-content:space-between;
background:#1a1a1a;
padding:8px;
border-radius:8px;
margin-bottom:8px;
}

.product a{
background:var(--gold);
color:#000;
padding:5px 10px;
border-radius:6px;
text-decoration:none;
font-size:12px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<div class="container">

<div class="preview">
<video id="video" playsinline hidden></video>
<canvas id="canvas"></canvas>
<div class="overlay-grid"></div>
<div class="scan-line"></div>
</div>

<button class="btn" onclick="startCamera()">فتح الكاميرا</button>
<button class="btn" onclick="analyze()">بدء التحليل</button>

<div id="results" class="card">
<h3 style="color:var(--gold)">نتائج التحليل</h3>

<canvas id="g1" class="gauge"></canvas>
<canvas id="g2" class="gauge"></canvas>
<canvas id="g3" class="gauge"></canvas>
<canvas id="g4" class="gauge"></canvas>

<div id="skinType"></div>

<h3 style="color:var(--gold)">روتينك المقترح</h3>
<div id="routine"></div>
</div>

</div>

<script>
const video=document.getElementById('video');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

let metrics={};

const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true});

faceMesh.onResults(res=>{
ctx.drawImage(res.image,0,0,canvas.width,canvas.height);
});

function startCamera(){
const cam=new Camera(video,{
onFrame:async()=>await faceMesh.send({image:video}),
width:640,height:480});
cam.start();
canvas.width=640;
canvas.height=480;
}

function analyze(){
let data=ctx.getImageData(0,0,canvas.width,canvas.height).data;

let total=0,red=0,variance=0;

for(let i=0;i<data.length;i+=4){
let v=(data[i]+data[i+1]+data[i+2])/3;
total+=v;
red+=data[i];
variance+=Math.abs(data[i]-data[i+1]);
}

let avg=total/(data.length/4);
let redAvg=red/(data.length/4);
let texture=variance/(data.length/4);

metrics.light=Math.min(100,avg/2);
metrics.oil=Math.min(100,(redAvg/2));
metrics.dry=Math.max(0,100-metrics.oil);
metrics.pig=Math.min(100,texture/2);
metrics.purity=Math.max(0,100-metrics.pig);

drawGauge("g1","نقاء",metrics.purity);
drawGauge("g2","دهنية",metrics.oil);
drawGauge("g3","تصبغ",metrics.pig);
drawGauge("g4","إضاءة",metrics.light);

detectSkinType();
generateRoutine();

document.getElementById('results').style.display='block';
}

function drawGauge(id,label,value){
let c=document.getElementById(id);
let ctx=c.getContext('2d');
let start=0;

let interval=setInterval(()=>{
ctx.clearRect(0,0,120,120);

ctx.beginPath();
ctx.arc(60,60,50,0,Math.PI*2);
ctx.strokeStyle="#222";
ctx.lineWidth=10;
ctx.stroke();

ctx.beginPath();
ctx.arc(60,60,50,-Math.PI/2,(Math.PI*2)*(start/100)-Math.PI/2);
ctx.strokeStyle="gold";
ctx.lineWidth=10;
ctx.stroke();

ctx.fillStyle="#fff";
ctx.font="14px Arial";
ctx.textAlign="center";
ctx.fillText(label,60,55);
ctx.fillText(start+"%",60,75);

if(start>=value) clearInterval(interval);
start++;
},10);
}

function detectSkinType(){
let type="عادية";

if(metrics.oil>65) type="دهنية";
else if(metrics.dry>65) type="جافة";
else if(metrics.oil>45 && metrics.dry>30) type="مختلطة";

document.getElementById('skinType').innerHTML=
"<h4>نوع البشرة: "+type+"</h4>";
}

function generateRoutine(){
let html="<h4>🌞 صباح</h4>";
html+=prod("غسول Argento","https://amzn.to/3uN2R3Q");
html+=prod("مرطب Shaan","https://amzn.to/3InR0Zk");
html+="<h4>🌙 مساء</h4>";
html+=prod("كريم Melatine","https://amzn.to/4kSzJSu");

document.getElementById('routine').innerHTML=html;
}

function prod(name,link){
return `<div class="product">
<span>${name}</span>
<a href="${link}" target="_blank">شراء</a>
</div>`;
}
</script>

</body>
</html>
