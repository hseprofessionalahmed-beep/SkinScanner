<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | STABLE V24</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; margin-bottom: 15px; background: #000; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        
        .live-overlay { position: absolute; top: 15px; left: 15px; right: 15px; z-index: 30; pointer-events: none; }
        .badge { background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; margin-bottom: 5px; display: inline-block; border: 1px solid var(--gold); }
        
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .result-btn { background: #25d366 !important; color: white !important; display: none; border: 2px solid #fff; }
        
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 20px; padding: 15px; display: none; margin-top: 15px; }
        .pkg-card { background: #1a1a1a; border: 1px solid #333; border-radius: 18px; padding: 15px; border-top: 4px solid var(--gold); margin-bottom: 20px; }
        
        .product-item { padding: 12px 0; border-bottom: 1px solid #222; }
        .prod-header { display: flex; justify-content: space-between; align-items: center; }
        .usage-box { background: #002b36; color: #00f2ff; padding: 8px; border-radius: 8px; font-size: 0.75rem; margin-top: 8px; border-right: 3px solid #00f2ff; }
        .prod-meta { font-size: 0.7rem; color: #888; display: block; margin-top: 2px; }
        
        .total-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); margin-top: 10px; font-size: 1.1rem; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">VERONA AI | V24 PRO</h2>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div class="live-overlay">
            <div id="lightLevel" class="badge">جاري قياس الإضاءة...</div><br>
            <div id="liveDetection" class="badge" style="color: var(--gold); display:none;">جاري فحص العيوب...</div>
        </div>
        <div id="liveStatus">بانتظار تفعيل الكاميرا...</div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startCam()">1. بدء المسح الذكي 📸</button>
        <button id="showResBtn" class="btn result-btn" onclick="openQuestions()">2. أظهر النتيجة وتحليل العيوب 🔍</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تم رصد الآتي.. برجاء التحقق 🔬</h3>
        <p id="aiReport" style="text-align:center; font-size:0.9rem; color:#aaa;"></p>
        <label>هل توجد حبوب نشطة؟</label>
        <select id="qAcne" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border-radius:8px;"><option value="no">لا</option><option value="yes">نعم</option></select>
        <label>تصبغات أو بقع؟</label>
        <select id="qPig" style="width:100%; padding:10px; margin:10px 0; background:#222; color:#fff; border-radius:8px;"><option value="no">لا</option><option value="yes">نعم</option></select>
        <button class="btn" onclick="generateFinalReport()">عرض الروتين الكامل ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="skinTypeDisplay" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:15px;"></div>
        <div id="pkgContainer"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">إعادة الفحص 🔄</button>
        <button class="btn" style="background:#25d366; color:white;" onclick="sendToWhatsApp()">طلب المنتجات 💬</button>
    </div>
</div>

<script>
    const myPhone = "201063994139";
    const productDB = {
        "ستارفيل وايتنينج": { p: 145, ing: "ألفا أربوتين", use: "صباحاً ومساءً على بشرة مبللة", link: "https://www.amazon.eg/s?k=starville+whitening" },
        "أرجنتو كلير": { p: 165, ing: "زيت شجرة الشاي", use: "يدلك لمدة دقيقة ثم يشطف بالماء الفاتر", link: "https://www.amazon.eg/s?k=argento+clear" },
        "شان جيل": { p: 195, ing: "بانثينول + ألوفيرا", use: "بعد الغسول مباشرة على بشرة مندية", link: "https://www.amazon.eg/s?k=shaan+gel" },
        "ناتافيس فيتامين C": { p: 485, ing: "فيتامين C 10%", use: "3 قطرات صباحاً قبل واقي الشمس", link: "https://www.amazon.eg/s?k=natavis+vitamin+c" },
        "بوباي جل واقي شمس": { p: 180, ing: "SPF 50+", use: "قبل التعرض للشمس بـ 20 دقيقة ويجدد كل ساعتين", link: "https://www.amazon.eg/s?k=bobai+sunscreen+gel" },
        "ستارفيل آي كونتور": { p: 155, ing: "كافيين + ريتينول", use: "طبطبة رقيقة حول العين من الخارج للداخل مساءً", link: "https://www.amazon.eg/s?k=starville+eye+contour" }
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    let aiAnalysis = { acne: false, pig: false, circles: false, skinType: 'مختلطة' };

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
    
    faceMesh.onResults(results => {
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const lm = results.multiFaceLandmarks[0];
            const fore = getPx(lm[10]); const cheek = getPx(lm[205]); const eye = getPx(lm[230]);
            
            // نظام الإضاءة (بدون تغيير)
            const light = fore.v;
            const lightEl = document.getElementById('lightLevel');
            lightEl.innerText = light < 100 ? "⚠️ إضاءة ضعيفة" : "✅ إضاءة جيدة";
            lightEl.style.color = light < 100 ? "#ff4d4d" : "#25d366";

            // التحليل اللحظي (بدون تغيير)
            aiAnalysis.skinType = (fore.v > 205) ? "دهنية" : (fore.v < 115 ? "جافة" : "مختلطة");
            aiAnalysis.acne = (cheek.r - cheek.g > 35);
            aiAnalysis.pig = (cheek.v / fore.v < 0.85);
            aiAnalysis.circles = (eye.v < fore.v * 0.72);

            document.getElementById('liveDetection').style.display = "inline-block";
            document.getElementById('liveDetection').innerText = (aiAnalysis.acne || aiAnalysis.pig) ? "رصد عيوب محتملة..." : "البشرة تبدو صافية ✨";

            drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3740', lineWidth: 1});
            document.getElementById('liveStatus').innerText = "تم الرصد! اضغط على الزر الأخضر 👇";
            document.getElementById('showResBtn').style.display = 'block'; // ظهور الزر الأخضر
        }
    });

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width); const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], v: (d[0]+d[1]+d[2])/3 };
    }

    function startCam() {
        new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start();
        canvas.width = 640; canvas.height = 480;
    }

    function openQuestions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
        document.getElementById('aiReport').innerText = `تم رصد بشرة ${aiAnalysis.skinType} مع ${aiAnalysis.acne ? 'حبوب' : 'بشرة صافية'}`;
        document.getElementById('qAcne').value = aiAnalysis.acne ? "yes" : "no";
        document.getElementById('qPig').value = aiAnalysis.pig ? "yes" : "no";
    }

    function generateFinalReport() {
        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeDisplay').innerText = "روتين فيرونا للبشرة " + aiAnalysis.skinType;

        const container = document.getElementById('pkgContainer');
        container.innerHTML = "";

        ["الروتين الاقتصادي 🥉", "الروتين الاحترافي 🥇"].forEach(lvl => {
            let list = ["أرجنتو كلير", "شان جيل", "بوباي جل واقي شمس"];
            if(aiAnalysis.pig) list.push("ناتافيس فيتامين C");
            if(aiAnalysis.circles) list.push("ستارفيل آي كونتور");

            let html = `<div class="pkg-card"><div style="color:var(--gold); font-weight:bold; text-align:center; margin-bottom:10px;">${lvl}</div>`;
            let total = 0;
            [...new Set(list)].forEach(name => {
                const d = productDB[name] || {p:0, ing:'--', use:'--', link:'#'};
                total += d.p;
                html += `<div class="product-item">
                    <div class="prod-header"><b>${name}</b><a href="${d.link}" target="_blank" style="text-decoration:none;">🛒</a></div>
                    <span class="prod-meta">المادة الفعالة: ${d.ing} | السعر: ${d.p} ج.م</span>
                    <div class="usage-box">📝 طريقة الاستخدام: ${d.use}</div>
                </div>`;
            });
            html += `<div class="total-row"><span>المجموع:</span><span>${total} ج.م</span></div></div>`;
            container.innerHTML += html;
        });
    }

    function sendToWhatsApp() {
        window.open(`https://wa.me/${myPhone}?text=أريد طلب روتين Verona AI الخاص بي.`, '_blank');
    }
</script>
</body>
</html>
