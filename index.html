<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | ULTIMATE V48</title>
    <style>
        :root { --gold:#d4af37; --bg:#0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 15px 0; text-align: center; border-bottom: 3px solid var(--gold); }
        .app-logo { width: 80%; max-height: 55px; object-fit: contain; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; background: #111; margin-bottom: 15px; }
        #video, #canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: linear-gradient(135deg,#a67c00,#ffbf00); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1.1rem; }
        .loading-box { text-align: center; padding: 20px; display: none; }
        .card { background: #111; border: 1px solid var(--gold); border-radius: 25px; padding: 20px; display: none; margin-top: 15px; }
        .status-msg { background: #1a1a1a; padding: 15px; border-radius: 12px; border-right: 5px solid var(--gold); margin-bottom: 15px; line-height: 1.8; }
        .buy-link { display: block; background: #fff; color: #000; text-decoration: none; padding: 12px; border-radius: 10px; font-weight: bold; text-align: center; margin-top: 10px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>
    <div class="preview-box">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>
    <div id="controls">
        <button class="btn" onclick="analyzeSkin()">بدء الفحص المجهري الذكي 🔬</button>
    </div>
    <div id="loading" class="loading-box">
        <div class="spinner"></div>
        <p>جاري استشارة الذكاء الاصطناعي من Verona AI...</p>
    </div>
    <div id="report" class="card">
        <h3 style="color:var(--gold); text-align:center;">تقرير تحليل البشرة</h3>
        <div id="resultText" class="status-msg"></div>
        <button class="btn" onclick="location.reload()" style="background:#222; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyA1G6Dgxz-ZmwdgQWZRUmhFEwFRufpxXXI";
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(s => video.srcObject = s);

    async function analyzeSkin() {
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const base64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];

        document.getElementById('controls').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        // الرابط المستقر النهائي (v1)
        const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const res = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [
                        { text: "أنت خبير جلدية متخصص. حلل الصورة المرفقة بدقة بالغة. ركز على التصبغات ومشاكل الجلد الواضحة. اقترح روتين علاج من: (أرجنتو كلير: https://amzn.to/3uN2R3Q)، (ستارفيل وايتنينج: https://amzn.to/3YVfXfI)، (شان جيل مرطب: https://amzn.to/3InR0Zk)." },
                        { inline_data: { mime_type: "image/jpeg", data: base64 } }
                    ]}]
                })
            });

            const data = await res.json();
            if (data.error) throw new Error(data.error.message);

            const aiText = data.candidates[0].content.parts[0].text;
            showResult(aiText);
        } catch (e) {
            alert("حدث خطأ: " + e.message + "\nيرجى التأكد من تفعيل الموديل في AI Studio.");
            document.getElementById('controls').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }

    function showResult(t) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('report').style.display = 'block';
        document.getElementById('resultText').innerHTML = t.replace(/(https?:\/\/[^\s\)]+)/g, '<a href="$1" target="_blank" class="buy-link">طلب المنتج 🛒</a>');
    }
</script>
</body>
</html>
