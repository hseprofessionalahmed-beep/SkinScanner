<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | CLINICAL V65</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; --green: #2ecc71; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}

/* الهيدر */
.header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
.app-logo { width: 90%; max-height: 70px; object-fit: contain; }

/* إطار المعاينة */
.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}

/* مربعات الفحص المحدثة V65 */
.scan-area { position: absolute; border: 2px solid var(--cyan); z-index: 60; display: none; background: rgba(0, 242, 255, 0.08); }
.scan-label { position: absolute; bottom: -20px; right: 0; font-size: 10px; color: var(--cyan); font-weight: bold; white-space: nowrap; }

/* مؤشر السكانر */
.scanner-line { position: absolute; width: 100%; height: 3px; background: var(--cyan); box-shadow: 0 0 20px var(--cyan); z-index: 70; top: 0; display: none; }
.scanning-active .scanner-line { display: block; animation: scanAnim 2s ease-in-out infinite; }
@keyframes scanAnim { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

/* التنبيهات والبصريات */
.loading-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
.card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
.product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; border-left: 3px solid var(--gold); }
.buy-link { color: var(--gold); text-decoration: none; font-weight: bold; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 6px; }
</style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>
    
    <div class="preview-box" id="pBox">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="scanner" class="scanner-line"></div>
        
        <div id="areaForehead" class="scan-area"><span class="scan-label">مسح التجاعيد والجبهة</span></div>
        <div id="areaEyes" class="scan-area"><span class="scan-label">تحليل الهالات العميقة</span></div>
        <div id="areaCheeks" class="scan-area"><span class="scan-label">رصد الحبوب والتصبغات</span></div>
        
        <div id="loadingScreen" class="loading-overlay">
            <div style="color:var(--cyan); margin-bottom:10px;">جاري تحليل خلايا البشرة...</div>
            <div style="width:50px; height:50px; border:3px solid var(--cyan); border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite;"></div>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startCam()">فتح الكاميرا المجهرية 📸</button>
        <button id="analyzeBtn" class="btn" style="background: var(--green);" onclick="runSmartScan()" disabled>تحليل المشاكل (2 ثانية) 🔍</button>
    </div>

    <div id="preReportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تقرير المختبر المبدئي</h3>
        <div id="preContent" style="background:#001a1a; padding:15px; border-radius:12px; font-size:0.9rem; line-height:1.7;"></div>
        <button class="btn" onclick="openQuestions()" style="margin-top:15px;">انتقل لتحديد روتينك ⬅️</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold);">تخصيص الخطة</h3>
        <label>عمق الهالات ولونها؟</label>
        <select id="qCircles">
            <option value="none">لا يوجد</option><option value="brown">بنية (تصبغ)</option><option value="blue">زرقاء (أوعية)</option>
        </select>
        <label>نوع التصبغات؟</label>
        <select id="qPig">
            <option value="none">لا يوجد</option><option value="acne">آثار حبوب</option><option value="sun">كلف/بقع شمس</option>
        </select>
        <label>اختر الباقة:</label>
        <select id="qPkg">
            <option value="eco">الاقتصادية</option><option value="super">سوبر</option><option value="ultra">ألترا</option>
        </select>
        <button class="btn" onclick="showFinalReport()">عرض الروتين النهائي ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="finalPkgDisplay"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">إعادة الفحص 🔄</button>
    </div>
</div>

<script>
// الروابط المحدثة المربوطة بالمنتجات
const productDB = {
    "أرجنتو كلير": "https://amzn.to/3ZNJnMs",
    "شان جيل": "https://amzn.to/46M1PZC",
    "ستارفيل وايتنينج": "https://amzn.to/3MyNZD9",
    "ناتافيس فيتامين C": "https://amzn.to/3OuGhKM",
    "ستارفيل آي كونتور": "https://amzn.to/3ORZvKm",
    "بوباي جل": "https://amzn.to/4rU6pgo",
    "ميلاتكس للتفتيح": "https://amzn.to/4kSzJSu"
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let aiResults = { skinType: 'جاري الفحص', acne: false, circles: false, pig: false };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm = results.multiFaceLandmarks[0];
        updateScanAreas(lm);
        
        // التحليل اللوني (رصد الحبوب الحمراء)
        const cheekData = getPixelData(lm[205]);
        aiResults.acne = (cheekData.r > cheekData.g + 30); // لو اللون الأحمر طاغي في الخد
        aiResults.circles = getPixelData(lm[230]).v < cheekData.v - 15;
        aiResults.pig = Math.abs(getPixelData(lm[10]).v - cheekData.v) > 20;
        
        document.getElementById('analyzeBtn').disabled = false;
    }
});

function updateScanAreas(lm) {
    const box = (id, pt, w, h) => {
        const el = document.getElementById(id); el.style.display = 'block';
        el.style.width = w+'%'; el.style.height = h+'%';
        el.style.left = (lm[pt].x*100 - w/2)+'%'; el.style.top = (lm[pt].y*100 - h/2)+'%';
    };
    box('areaForehead', 10, 45, 12); // جبهة واسعة
    box('areaEyes', 230, 30, 8);    // تحت العين بدقة
    box('areaCheeks', 205, 35, 20); // الخد - مركز الحبوب والتصبغات
}

function getPixelData(p){
    const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height);
    const d=ctx.getImageData(x,y,1,1).data;
    return {r:d[0], g:d[1], b:d[2], v:(d[0]+d[1]+d[2])/3};
}

function runSmartScan() {
    document.getElementById('pBox').classList.add('scanning-active');
    document.getElementById('loadingScreen').style.display = 'flex';
    document.getElementById('analyzeBtn').disabled = true;

    // التوقف لمدة ثانيتين لتعزيز تجربة المستخدم
    setTimeout(() => {
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('pBox').classList.remove('scanning-active');
        showInitialReport();
    }, 2000);
}

function showInitialReport() {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('preReportCard').style.display = 'block';
    
    let report = `• <b>الحبوب:</b> ${aiResults.acne ? "⚠️ رصد التهاب نشط" : "✅ لا يوجد حبوب نشطة"}<br>`;
    report += `• <b>الهالات:</b> ${aiResults.circles ? "⚠️ تصبغ داكن مكتشف" : "✅ منطقة العين صافية"}<br>`;
    report += `• <b>المواد المرشحة:</b> ${aiResults.acne ? "سالسليك أسيد" : "فيتامين C وأربوتين"}`;
    
    document.getElementById('preContent').innerHTML = report;
}

function openQuestions() {
    document.getElementById('preReportCard').style.display = 'none';
    document.getElementById('questionsCard').style.display = 'block';
}

function showFinalReport() {
    document.getElementById('questionsCard').style.display = 'none';
    document.getElementById('reportCard').style.display = 'block';
    const pkg = document.getElementById('qPkg').value;
    
    let list = ["أرجنتو كلير", "شان جيل", "بوباي جل"];
    if(pkg === 'super') list.push("ستارفيل وايتنينج");
    if(pkg === 'ultra') list.push("ستارفيل وايتنينج", "ناتافيس فيتامين C", "ستارفيل آي كونتور", "ميلاتكس للتفتيح");

    let html = `<h3>روتينك المخصص - باقة ${pkg.toUpperCase()}</h3>`;
    list.forEach(name => {
        html += `<div class="product-item"><span>${name}</span><a href="${productDB[name]}" target="_blank" class="buy-link">شراء 🛒</a></div>`;
    });
    document.getElementById('finalPkgDisplay').innerHTML = html;
}

function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
</script>
<style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
</body>
</html>
