<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI PRO - Facial Scan & Routine</title>

<!-- Mediapipe Face Mesh -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --card:#161616; }
body { background:var(--bg); color:#fff; font-family:sans-serif; margin:0; padding:10px; text-align:center; }
.container { max-width:600px; margin:auto; }
.preview-box { position:relative; width:100%; border-radius:20px; overflow:hidden; background:#000; border:2px solid #333; min-height:320px; }
video, canvas { width:100%; height:auto; }
#overlay { position:absolute; top:0; left:0; z-index:10; }
.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0; }
.action-btn { background:var(--gold); color:#000; padding:15px; border-radius:12px; border:none; font-weight:bold; cursor:pointer; }
.scan-btn { background:#fff; width:100%; font-size:1.1rem; border:3px solid var(--gold); margin-top:10px; }
.result-card { background:var(--card); padding:20px; border-radius:20px; margin-top:20px; border:1px solid var(--gold); text-align:right; }
.hidden { display:none; }
.status-msg { color:var(--gold); font-size:0.9rem; margin:10px 0; }
.question-box { background:#222; border:1px solid var(--gold); border-radius:15px; padding:15px; margin-top:20px; text-align:right; }
.question-box label { display:block; margin:8px 0; }
.routine-box { background:#111; border:1px solid var(--gold); border-radius:15px; padding:15px; margin-top:15px; text-align:right; }
.routine-box h4 { color:var(--gold); margin:5px 0; }
.routine-box button { margin-top:10px; width:100%; background:#25d366; color:white; padding:10px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; }
</style>
</head>
<body>

<div class="container">
    <h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>
    <div id="status" class="status-msg">جاري تحميل المحرك الذكي...</div>

    <div class="preview-box">
        <video id="input_video" class="hidden" playsinline></video>
        <canvas id="overlay"></canvas>
    </div>

    <div class="btn-grid">
        <button class="action-btn" onclick="initCamera()">📸 الكاميرا</button>
        <button class="action-btn" style="background:#333;color:#fff;" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
    </div>
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(event)">

    <button id="scanBtn" class="action-btn scan-btn hidden" onclick="showQuestions()">تحليل النتائج الآن 🔬</button>

    <div id="questionBox" class="question-box hidden">
        <h3 style="color:var(--gold); margin:0;">الرجاء الإجابة على الأسئلة التالية:</h3>
        <div id="dynamicQuestions"></div>
        <button class="action-btn" style="background:var(--gold); color:#000;" onclick="generateRoutine()">إستخراج الروتين</button>
    </div>

    <div id="routineContainer" class="hidden">
        <!-- سيتم عرض الروتينات الثلاثة هنا -->
    </div>

    <div id="recommendations" class="result-card hidden">
        <h3 style="color:var(--gold); margin:0;">التوصيات المهمة 💡</h3>
        <p>ترطيب البشرة قبل استخدام الروتين لمدة أسبوع إلى أسبوعين، النوم الكافي، شرب الماء، وضع واقي شمس يومياً. هذه الخطوات ضرورية لنجاح الروتين.</p>
    </div>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('overlay');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently:true});
let faceMesh, lastResults=null, currentImg=null, detectedIssues=[];

async function setupFaceMesh() {
    faceMesh = new FaceMesh({locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5 });
    faceMesh.onResults(onResults);
    document.getElementById('status').innerText="المحرك جاهز للفحص ✅";
}
setupFaceMesh();

function onResults(results){
    lastResults=results;
    canvasElement.width = canvasElement.clientWidth;
    canvasElement.height = (currentImg)? (currentImg.height*(canvasElement.width/currentImg.width)) : videoElement.videoHeight*(canvasElement.width/videoElement.videoWidth);
    
    canvasCtx.save();
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
    canvasCtx.drawImage(results.image,0,0,canvasElement.width,canvasElement.height);
    
    if(results.multiFaceLandmarks){
        for(const landmarks of results.multiFaceLandmarks){
            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color:'#d4af3744', lineWidth:0.5});
        }
    }
    canvasCtx.restore();

    // الكشف عن المشاكل (تصبغات / هالات / حبوب)
    detectedIssues=[];
    if(results.multiFaceLandmarks){
        const landmarks=results.multiFaceLandmarks[0];
        const rGForehead=checkArea(landmarks[10]);
        const rGCheeks=checkArea(landmarks[205]);
        const rGEyes=(checkArea(landmarks[130])+checkArea(landmarks[350]))/2;
        const pigmentDiff= rGCheeks/rGForehead;
        const eyeDiff= rGEyes/rGForehead;

        if(pigmentDiff<0.95) detectedIssues.push('تصبغات');
        if(eyeDiff<0.9) detectedIssues.push('هالات');
        // التجاعيد وحب الشباب نتركها للسؤال
    }

    // إظهار زر التحليل إذا تم اكتشاف أي مشكلة
    document.getElementById('scanBtn').classList.toggle('hidden', detectedIssues.length===0);
}

function checkArea(lm){
    const x=Math.floor(lm.x*canvasElement.width);
    const y=Math.floor(lm.y*canvasElement.height);
    const pixel=canvasCtx.getImageData(x,y,1,1).data;
    return (pixel[0]+pixel[1]+pixel[2])/3;
}

async function initCamera(){
    currentImg=null;
    videoElement.classList.remove('hidden');
    const camera = new Camera(videoElement,{onFrame:async()=>{await faceMesh.send({image:videoElement});}});
    camera.start();
}

function processFile(event){
    const file=event.target.files[0];
    if(!file) return;
    const img=new Image();
    img.onload=async()=>{
        currentImg=img;
        videoElement.classList.add('hidden');
        document.getElementById('status').innerText="يتم الآن رسم خريطة الوجه...";
        await faceMesh.send({image:img});
    };
    img.src=URL.createObjectURL(file);
}

function showQuestions(){
    if(detectedIssues.length===0){
        alert("البشرة نقية ومتوازنة، لا توجد مشاكل لتحليلها");
        return;
    }
    const container=document.getElementById('dynamicQuestions');
    container.innerHTML="";
    detectedIssues.forEach(issue=>{
        if(issue==='تصبغات'){
            container.innerHTML+=`
            <label>هل تريد تفتيح شامل وتوحيد لون؟</label>
            <select id="lightenSkin">
                <option value="نعم">نعم</option>
                <option value="لا">لا</option>
            </select>`;
        }
        if(issue==='هالات'){
            container.innerHTML+=`
            <label>لون الهالات:</label>
            <select id="eyeColor">
                <option value="بني">بني</option>
                <option value="أسود">أسود</option>
                <option value="أزرق">أزرق</option>
            </select>`;
        }
        container.innerHTML+=`
        <label>هل توجد حبوب؟</label>
        <select id="hasPimples">
            <option value="لا يوجد">لا يوجد</option>
            <option value="يوجد">يوجد</option>
        </select>
        <label>هل توجد تجاعيد؟</label>
        <select id="hasWrinkles">
            <option value="لا يوجد">لا يوجد</option>
            <option value="يوجد">يوجد</option>
        </select>`;
    });
    document.getElementById('questionBox').classList.remove('hidden');
}

function generateRoutine(){
    // جمع إجابات الأسئلة
    const lightenSkin=document.getElementById('lightenSkin')?document.getElementById('lightenSkin').value:'لا';
    const eyeColor=document.getElementById('eyeColor')?document.getElementById('eyeColor').value:'بني';
    const hasPimples=document.getElementById('hasPimples').value;
    const hasWrinkles=document.getElementById('hasWrinkles').value;

    const routines=[
        {type:'اقتصادي',materials:'فيتامين C + Alpha Arbutin',products:'غسول + سيروم + واقي شمس',price:'500ج',duration:'6 أسابيع',improve:'60%'},
        {type:'سوبر',materials:'فيتامين C + Alpha Arbutin + Niacinamide',products:'غسول + سيروم + واقي شمس + كريم تجاعيد',price:'900ج',duration:'8 أسابيع',improve:'75%'},
        {type:'الترا',materials:'فيتامين C + Alpha Arbutin + Niacinamide + Tranexamic',products:'غسول + سيروم + واقي شمس + كريم تجاعيد + ماسك خاص',price:'1500ج',duration:'12 أسبوع',improve:'90%'}
    ];

    const container=document.getElementById('routineContainer');
    container.innerHTML='';
    routines.forEach(r=>{
        container.innerHTML+=`
        <div class="routine-box">
            <h4>روتين ${r.type}</h4>
            <p><b>المواد الفعالة:</b> ${r.materials}</p>
            <p><b>المنتجات:</b> ${r.products}</p>
            <p><b>السعر التقريبي:</b> ${r.price}</p>
            <p><b>مدة الاستخدام:</b> ${r.duration}</p>
            <p><b>نسبة التحسن:</b> ${r.improve}</p>
            <button onclick="sendWA('${r.type}')">اختيار هذا الروتين وإرساله</button>
        </div>`;
    });
    document.getElementById('routineContainer').classList.remove('hidden');
    document.getElementById('recommendations').classList.remove('hidden');
}

function sendWA(type){
    const text=`تم اختيار روتين ${type} من VERONA AI PRO`;
    window.open(`https://wa.me/201063994139?text=${encodeURIComponent(text)}`);
}
</script>
</body>
</html>
