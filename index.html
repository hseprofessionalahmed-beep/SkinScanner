<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | CLINICAL SYSTEM V80</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --green: #2ecc71; }
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
        .container{max-width:500px;margin:auto;}
        .header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
        .app-logo { width: 90%; max-height: 70px; object-fit: contain; }
        
        .preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
        video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
        
        .scanner-line { position: absolute; width: 100%; height: 3px; background: var(--cyan); box-shadow: 0 0 20px var(--cyan); z-index: 70; top: 0; display: none; }
        .scanning-active .scanner-line { display: block; animation: scanAnim 2s ease-in-out forwards; }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

        .scan-area { position: absolute; border: 1.5px solid var(--cyan); z-index: 60; display: none; background: rgba(0,242,255,0.05); }
        .metrics { position: absolute; top: 10px; right: 10px; z-index: 80; }
        .badge { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--gold); font-size: 0.7rem; margin-bottom: 5px; }

        .btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
        .card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
        
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a1a; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--gold); }
        .buy-link { color: #000; background: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.8rem; padding: 7px 14px; border-radius: 8px; }
        
        select, input { width:100%; padding:12px; margin:8px 0; background:#222; color:#fff; border:1px solid #444; border-radius:10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>

    <div class="preview-box" id="pBox">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="scanner" class="scanner-line"></div>
        
        <div id="areaForehead" class="scan-area"></div>
        <div id="areaEyes" class="scan-area"></div>
        <div id="areaCheeks" class="scan-area"></div>
        
        <div class="metrics">
            <div id="lightMet" class="badge">الإضاءة: --</div>
            <div id="hydraMet" class="badge">الترطيب: --</div>
            <div id="wrinkleMet" class="badge">التجاعيد: --</div>
        </div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startCam()">كاميرا لايف 📸</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        <button id="analyzeBtn" class="btn" style="background: var(--green);" onclick="runSmartScan()" disabled>بدء التحليل النهائي (2 ثانية) 🔍</button>
    </div>

    <div id="preReportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تقرير الفحص المجهري</h3>
        <div id="preContent" style="line-height:1.8; font-size:0.9rem; background:#001a1a; padding:15px; border-radius:15px;"></div>
        <button class="btn" onclick="openQuestions()" style="margin-top:15px;">تخصيص الروتين ⬅️</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold);">تأكيد بيانات الحالة</h3>
        
        <label>عمق الهالات ولونها؟</label>
        <select id="qCircles">
            <option value="none">لا يوجد هالات</option>
            <option value="eva">بسيطة (Eva Natural Glow)</option>
            <option value="star">متوسطة (Star Ville Gel)</option>
            <option value="laroche">عميقة (La Roche Pigmentclar)</option>
        </select>

        <label>واقي الشمس المناسب لبشرتك؟</label>
        <select id="qSun">
            <option value="bobai">جل خفيف (Bobai)</option>
            <option value="evaAcne">للبشرة المعرضة للحبوب (Eva)</option>
            <option value="evaColl">مضاد للتجاعيد (Eva Collagen)</option>
            <option value="kolagra">حماية قصوى (Kolagra)</option>
        </select>

        <label>الميزانية:</label>
        <select id="qPkg">
            <option value="eco">الاقتصادية (الأساسيات)</option>
            <option value="ultra">الألترا (الروتين المتكامل + تفتيح)</option>
        </select>
        
        <button class="btn" onclick="showFinalReport()">اعتماد الروتين وشراء المنتجات ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="finalPkgDisplay"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
// قاعدة البيانات النهائية للروابط المظبوطة
const productDB = {
    "Argento Clear": "https://amzn.to/3uN2R3Q",
    "Shaan Gel": "https://amzn.to/3InR0Zk",
    "Star Ville Whitening": "https://amzn.to/3YVfXfI",
    "Natavis Vitamin C": "https://amzn.to/3SREm9v",
    "Bobai Gel": "https://amzn.to/3uREn6Z",
    "Eva Natural Glow Eye": "https://amzn.to/3ZNJnMs",
    "Star Ville Eye Contour": "https://amzn.to/46M1PZC",
    "La Roche Pigmentclar": "https://amzn.to/3MyNZD9",
    "Eva Acne Sunscreen": "https://amzn.to/3OuGhKM",
    "Eva Collagen Sunblock": "https://amzn.to/3ORZvKm",
    "Kolagra Sunscreen": "https://amzn.to/4rU6pgo",
    "Melatine Extra Lighting": "https://amzn.to/4kSzJSu"
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let aiResults = { skinType: '', acne: false, circles: false, pig: false, light: 0, hydra: 0, wrinkle: 0 };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm = results.multiFaceLandmarks[0];
        updateAreas(lm);
        
        const fH = getPx(lm[10]); const cH = getPx(lm[205]); const eY = getPx(lm[230]);
        aiResults.light = Math.round((fH.v / 255) * 100);
        aiResults.hydra = Math.round(100 - (Math.abs(fH.v - cH.v)));
        aiResults.wrinkle = aiResults.light < 45 ? 20 : 5;

        document.getElementById('lightMet').innerText = `الإضاءة: ${aiResults.light}%`;
        document.getElementById('hydraMet').innerText = `الترطيب: ${aiResults.hydra}%`;
        document.getElementById('wrinkleMet').innerText = `التجاعيد: ${aiResults.wrinkle}%`;

        aiResults.acne = (cH.r > cH.g + 20);
        aiResults.pig = (Math.abs(fH.v - cH.v) > 22);
        aiResults.circles = (eY.v < cH.v - 18);
        aiResults.skinType = fH.v > 180 ? "دهنية" : (fH.v < 110 ? "جافة" : "مختلطة");

        if(aiResults.light > 35) document.getElementById('analyzeBtn').disabled = false;
    }
});

function updateAreas(lm) {
    const draw = (id, pt, w, h) => {
        const el = document.getElementById(id); el.style.display = 'block';
        el.style.width = w+'%'; el.style.height = h+'%';
        el.style.left = (lm[pt].x*100 - w/2)+'%'; el.style.top = (lm[pt].y*100 - h/2)+'%';
    };
    draw('areaForehead', 10, 45, 12);
    draw('areaEyes', 230, 30, 10);
    draw('areaCheeks', 205, 35, 20);
}

function getPx(p){
    const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height);
    const d=ctx.getImageData(x,y,1,1).data; return {r:d[0], g:d[1], v:(d[0]+d[1]+d[2])/3};
}

function runSmartScan() {
    document.getElementById('pBox').classList.add('scanning-active');
    document.getElementById('analyzeBtn').disabled = true;
    setTimeout(() => {
        document.getElementById('pBox').classList.remove('scanning-active');
        showPreReport();
    }, 2000);
}

function showPreReport() {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('preReportCard').style.display = 'block';
    document.getElementById('preContent').innerHTML = `
        • <b>نوع البشرة:</b> ${aiResults.skinType}<br>
        • <b>حالة الحبوب:</b> ${aiResults.acne ? '⚠️ التهاب مكتشف' : '✅ صافية'}<br>
        • <b>التصبغات:</b> ${aiResults.pig ? '⚠️ تفاوت في اللون' : '✅ لون موحد'}<br>
        • <b>الهالات:</b> ${aiResults.circles ? '⚠️ إجهاد تحت العين' : '✅ منطقة سليمة'}
    `;
}

function openQuestions() {
    document.getElementById('preReportCard').style.display = 'none';
    document.getElementById('questionsCard').style.display = 'block';
}

function showFinalReport() {
    document.getElementById('questionsCard').style.display = 'none';
    document.getElementById('reportCard').style.display = 'block';
    
    const eye = document.getElementById('qCircles').value;
    const sun = document.getElementById('qSun').value;
    const pkg = document.getElementById('qPkg').value;

    let list = [];
    // الغسول والمرطب (أساسي)
    list.push({n:"Argento Clear", l:productDB["Argento Clear"]});
    list.push({n:"Shaan Gel", l:productDB["Shaan Gel"]});

    // العين
    if(eye === 'eva') list.push({n:"Eva Natural Glow Eye", l:productDB["Eva Natural Glow Eye"]});
    if(eye === 'star') list.push({n:"Star Ville Eye Contour", l:productDB["Star Ville Eye Contour"]});
    if(eye === 'laroche') list.push({n:"La Roche Pigmentclar", l:productDB["La Roche Pigmentclar"]});

    // الشمس
    if(sun === 'bobai') list.push({n:"Bobai Gel", l:productDB["Bobai Gel"]});
    if(sun === 'evaAcne') list.push({n:"Eva Acne Sunscreen", l:productDB["Eva Acne Sunscreen"]});
    if(sun === 'evaColl') list.push({n:"Eva Collagen Sunblock", l:productDB["Eva Collagen Sunblock"]});
    if(sun === 'kolagra') list.push({n:"Kolagra Sunscreen", l:productDB["Kolagra Sunscreen"]});

    // باقة الألترا / التفتيح
    if(pkg === 'ultra' || aiResults.pig) {
        list.push({n:"Star Ville Whitening", l:productDB["Star Ville Whitening"]});
        list.push({n:"Melatine Extra Lighting", l:productDB["Melatine Extra Lighting"]});
    }

    let html = `<h3>الروتين المقترح من Verona</h3>`;
    list.forEach(item => {
        html += `<div class="product-item"><span>${item.n}</span><a href="${item.l}" target="_blank" class="buy-link">شراء 🛒</a></div>`;
    });
    document.getElementById('finalPkgDisplay').innerHTML = html;
}

function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function handleImage(e) { const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img}); }; img.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }
</script>
</body>
</html>
