<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | CLINICAL SYSTEM</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; --glass: rgba(255,255,255,0.05); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); background: #000; aspect-ratio: 4/5; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; }
        #upImg { display: none; }
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--gold); top: 0; display: none; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .card { background: var(--glass); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        .routine-item { background: rgba(0,0,0,0.4); padding: 15px; border-right: 4px solid var(--gold); border-radius: 8px; margin-bottom: 12px; }
        .status-badge { color: #00f2ff; font-weight: bold; font-size: 0.9rem; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; z-index: 20; text-shadow: 0 2px 4px #000; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold)">VERONA AI CLINICAL V4</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div class="scan-line" id="sLine"></div>
        <div id="liveStatus" class="status-badge">بانتظار المصدر...</div>
    </div>

    <div class="btn-grid" id="controls">
        <button class="btn" onclick="startCam()">الكاميرا 📸</button>
        <label class="btn" style="background:#222; color:#fff;">أضف صورة 📁 <input type="file" hidden onchange="handleFile(event)"></label>
    </div>

    <button id="runBtn" class="btn" style="width:100%; margin-top:10px; display:none;" onclick="processAnalysis()">تحليل النتائج الآن 🔬</button>

    <div id="reportCard" class="card">
        <div id="scoreDisplay" style="font-size:3rem; text-align:center; color:var(--gold); font-weight:900;">100%</div>
        <div id="skinTypeBox" style="text-align:center; color:#00f2ff; margin-bottom:15px; font-weight:bold;">نوع البشرة: جاري التحديد...</div>
        
        <div id="diagnosisBox"></div>
        <div id="routineBox"></div>

        <div class="routine-item" style="border-color:#fff; background:rgba(212,175,55,0.1);">
            <b style="color:var(--gold)">⚠️ تعليمات وتوجيهات Verona:</b><br>
            <small>
                • شرب 8 أكواب ماء يومياً لتحسين مرونة الجلد.<br>
                • استخدام واقي شمس Verona يومياً كل ساعتين.<br>
                • تجنب لمس الحبوب باليد نهائياً لمنع الندبات.
            </small>
        </div>

        <button class="btn" onclick="location.reload()" style="width:100%; background:#333; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    let faceMesh, lastLM, currentSkinType = "مختلطة";
    let analysis = { acne: false, pig: false, dark: false, dry: false };

    async function init() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(results => {
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks) {
                lastLM = results.multiFaceLandmarks[0];
                drawConnectors(ctx, lastLM, FACEMESH_TESSELATION, {color: '#d4af3722'});
                runLiveLogic(lastLM);
                document.getElementById('runBtn').style.display = 'block';
            }
        });
    }

    function runLiveLogic(lm) {
        const forehead = getL(lm[10]);
        const cheek = getL(lm[205]);
        const eye = getL(lm[101]);

        // 1. تحديد نوع البشرة
        if (forehead.v > 180) currentSkinType = "دهنية";
        else if (forehead.v < 110) currentSkinType = "جافة";
        else currentSkinType = "مختلطة";

        // 2. كشف المشاكل
        analysis.dark = (eye.v / forehead.v) < 0.86;
        analysis.pig = (cheek.v / forehead.v) < 0.88;
        analysis.acne = (cheek.r > cheek.g * 1.18); // كشف الاحمرار (الحبوب)
        analysis.dry = (forehead.v < 115);

        let status = `بشرة ${currentSkinType} | `;
        if (analysis.acne) status += "⚠️ حبوب ملتهبة ";
        if (analysis.pig) status += "⚠️ تصبغات ";
        if (analysis.dark) status += "⚠️ هالات ";
        if (!analysis.acne && !analysis.pig && !analysis.dark) status = "✅ البشرة نقية جداً";
        
        document.getElementById('liveStatus').innerText = status;
    }

    function getL(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], b: d[2], v: (d[0]+d[1]+d[2])/3 };
    }

    function processAnalysis() {
        document.getElementById('sLine').style.display = 'block';
        setTimeout(() => {
            document.getElementById('sLine').style.display = 'none';
            document.getElementById('controls').style.display = 'none';
            document.getElementById('runBtn').style.display = 'none';
            showReport();
        }, 2000);
    }

    function showReport() {
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeBox').innerText = "نوع البشرة المكتشف: " + currentSkinType;
        
        let score = 100;
        let diag = "<b>التشخيص المجهري:</b><br>";
        let rout = "";

        // حالة الطفل (بشرة نقية)
        if (!analysis.acne && !analysis.pig && !analysis.dark && !analysis.dry) {
            diag += "• مظهر صحي تماماً، غياب كامل للشوائب.<br>";
            rout += addItem("الحماية اليومية", "Verona Kids Sunscreen", "Zinc Oxide (حماية فيزيائية)");
            rout += addItem("الترطيب", "Verona Gentle Lotion", "Panthenol (ترطيب لطيف)");
        } else {
            if (analysis.acne) { score -= 15; diag += "• حبوب ملتهبة (نشطة).<br>"; rout += addItem("علاج الحبوب", "Verona Acni-Clear Serum", "Salicylic Acid 2%"); }
            if (analysis.pig) { score -= 12; diag += "• تفاوت في الميلانين (تصبغات).<br>"; rout += addItem("التفتيح", "Verona Melano-Fade Serum", "Alpha Arbutin + Vit C"); }
            if (analysis.dark) { score -= 8; diag += "• هالات سوداء وعائية.<br>"; rout += addItem("عناية العين", "Verona Eye-Lift Cream", "Caffeine + Peptides"); }
            
            // باقة الترطيب الإلزامية للبشرة الجافة
            if (currentSkinType === "جافة" || analysis.dry) {
                diag += "• جفاف حاد في الطبقة السطحية.<br>";
                rout += addItem("مرطب إلزامي 💧", "Verona Hydro-Boost Cream", "Hyaluronic Acid + Ceramides");
            }
        }

        document.getElementById('scoreDisplay').innerText = score + "%";
        document.getElementById('diagnosisBox').innerHTML = diag;
        document.getElementById('routineBox').innerHTML = rout;
    }

    function addItem(t, n, a) { return `<div class="routine-item"><b>${t}:</b><br>${n}<br><small style="color:#00f2ff">المادة الفعالة: ${a}</small></div>`; }

    function startCam() { upImg.style.display='none'; video.style.display='block'; new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start(); }
    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => { upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none'; upImg.onload = async () => await faceMesh.send({image: upImg}); };
        r.readAsDataURL(e.target.files[0]);
    }

    init();
</script>
</body>
</html>
