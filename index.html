<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | V23.1 PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; margin-bottom: 15px; background: #000; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; }
        .btn { background: linear-gradient(135deg, #a67c00, #ffbf00); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 20px; padding: 15px; display: none; }
        .packages-wrapper { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; scroll-snap-type: x mandatory; }
        .pkg-card { flex: 0 0 85%; background: #1a1a1a; border: 1px solid #333; border-radius: 18px; padding: 15px; scroll-snap-align: center; border-top: 4px solid var(--gold); }
        .product-line { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.85rem; }
        .buy-link { color: var(--gold); text-decoration: none; font-size: 1.1rem; margin-right: 5px; }
        .total-row { display: flex; justify-content: space-between; font-weight: bold; color: var(--gold); margin-top: 10px; }
        .check-item { display: flex; align-items: center; gap: 10px; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; border: 1px solid #444; }
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; z-index: 20; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="color:var(--gold); text-align:center;">VERONA AI | V23.1 PRO</h2>

    <div class="preview-box">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="liveStatus">بانتظار تفعيل الكاميرا...</div>
    </div>

    <div id="controls">
        <button class="btn" onclick="startCam()">بدء المسح الذكي 📸</button>
        <button class="btn" style="background:#222; color:#fff;" onclick="openQuestions()">تخصيص الروتين 🔬</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">تأكيد الحالة</h3>
        <label>حبوب ملتهبة؟</label>
        <select id="qAcne"><option value="no">لا</option><option value="yes">نعم</option></select>
        <label>تصبغات؟</label>
        <select id="qPig"><option value="no">لا</option><option value="yes">نعم</option></select>
        <label>هالات؟</label>
        <select id="qCircles"><option value="none">لا يوجد</option><option value="brown">بني</option></select>
        <div class="check-item"><input type="checkbox" id="addGlow"><label>باقة النضارة ✨</label></div>
        <div class="check-item"><input type="checkbox" id="addWhite"><label>باقة التفتيح ⚪</label></div>
        <button class="btn" onclick="generateFinalReport()">النتائج النهائية ✨</button>
    </div>

    <div id="reportCard" class="card">
        <div id="skinTypeDisplay" style="text-align:center; color:#00f2ff; font-weight:bold; margin-bottom:10px;"></div>
        <div class="packages-wrapper" id="pkgContainer"></div>
        <button class="btn" style="background:#25d366; color:white;" onclick="sendToWhatsApp()">اطلب الروتين عبر الواتساب 💬</button>
    </div>
</div>

<script>
    const myPhone = "201063994139";
    // قاعدة البيانات مع إضافة الروابط (استبدل '#' برابط المتجر الحقيقي)
    const productDB = {
        "ستارفيل وايتنينج": { p: 145, link: "#" }, 
        "أرجنتو كلير": { p: 165, link: "#" },
        "فيشي نورماديرم": { p: 850, link: "#" }, 
        "شان جيل": { p: 195, link: "#" },
        "لوريال هيالورونيك": { p: 395, link: "#" }, 
        "ديرماتيك جيل": { p: 260, link: "#" },
        "ناتافيس فيتامين C": { p: 485, link: "#" }, 
        "لاروش بيجمنتكلار": { p: 1250, link: "#" },
        "ستارفيل آي كونتور": { p: 155, link: "#" },
        "بوباي جل واقي شمس": { p: 180, link: "#" },
        "لاروش أنثيليوس": { p: 650, link: "#" },
        "غسول سيرافيه": { p: 450, link: "#" }
    };

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    let aiAnalysis = { acne: false, pig: false, circles: false, skinType: 'مختلطة' };

    const faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
    faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.6 });
    
    faceMesh.onResults(results => {
        ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
        if (results.multiFaceLandmarks && results.multiFaceLandmarks.length > 0) {
            const lm = results.multiFaceLandmarks[0];
            const fore = getPx(lm[10]);
            const cheek = getPx(lm[205]);
            const eye = getPx(lm[230]);
            
            aiAnalysis.skinType = (fore.v > 205) ? "دهنية" : (fore.v < 115 ? "جافة" : "مختلطة");
            aiAnalysis.acne = (cheek.r - cheek.g > 35);
            aiAnalysis.pig = (cheek.v / fore.v < 0.85);
            aiAnalysis.circles = (eye.v < fore.v * 0.72);

            drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3740', lineWidth: 1});
            document.getElementById('liveStatus').innerText = "تم الفحص بـ Face Mesh ✅";
        }
    });

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width); const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], v: (d[0]+d[1]+d[2])/3 };
    }

    function startCam() {
        new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start();
        canvas.width = 640; canvas.height = 480;
    }

    function openQuestions() {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
        document.getElementById('qAcne').value = aiAnalysis.acne ? "yes" : "no";
        document.getElementById('qPig').value = aiAnalysis.pig ? "yes" : "no";
        document.getElementById('qCircles').value = aiAnalysis.circles ? "brown" : "none";
    }

    function generateFinalReport() {
        const acne = document.getElementById('qAcne').value === 'yes';
        const pig = document.getElementById('qPig').value === 'yes';
        const circ = document.getElementById('qCircles').value;
        const addGlow = document.getElementById('addGlow').checked;
        const addWhite = document.getElementById('addWhite').checked;

        document.getElementById('questionsCard').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        document.getElementById('skinTypeDisplay').innerText = "روتين مخصص للبشرة الـ" + aiAnalysis.skinType;

        const container = document.getElementById('pkgContainer');
        container.innerHTML = "";

        [{id:'low', n:'الاقتصادية 🥉'}, {id:'mid', n:'سوبر برو 🥈'}, {id:'high', n:'ألترا فاخرة 🥇'}].forEach(lvl => {
            let list = [];
            
            // 1. غسول حسب الحالة
            if(aiAnalysis.skinType === "دهنية") list.push(lvl.id === 'high' ? "فيشي نورماديرم" : "أرجنتو كلير");
            else list.push(lvl.id === 'high' ? "غسول سيرافيه" : "ستارفيل وايتنينج");

            // 2. العلاج (حبوب/تصبغات/هالات)
            if(acne) list.push("أرجنتو كلير");
            if(pig) list.push("ناتافيس فيتامين C");
            if(circ !== 'none') list.push(lvl.id === 'high' ? "لاروش بيجمنتكلار" : "ستارفيل آي كونتور");
            
            // 3. الإضافات
            if(addGlow) list.push(lvl.id === 'high' ? "لوريال هيالورونيك" : "ديرماتيك جيل");
            if(addWhite && !pig) list.push("ناتافيس فيتامين C");
            
            // 4. ترطيب وواقي شمس
            list.push("شان جيل");
            list.push(lvl.id === 'high' ? "لاروش أنثيليوس" : "بوباي جل واقي شمس");

            let html = `<div class="pkg-card"><div class="pkg-name">${lvl.n}</div>`;
            let total = 0;
            [...new Set(list)].forEach(name => {
                const d = productDB[name] || {p:0, link:'#'}; 
                total += d.p;
                html += `<div class="product-line">
                            <span>${name} <a href="${d.link}" class="buy-link">🛒</a></span>
                            <b>${d.p} ج.م</b>
                         </div>`;
            });
            html += `<div class="total-row"><span>المجموع:</span><span>${total} ج.م</span></div></div>`;
            container.innerHTML += html;
        });
    }

    function sendToWhatsApp() {
        window.open(`https://wa.me/${myPhone}?text=مرحباً، قمت بتحليل بشرتي وأريد طلب الروتين المناسب لي.`, '_blank');
    }
</script>
</body>
</html>
