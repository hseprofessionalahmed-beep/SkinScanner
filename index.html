<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI ELITE</title>

<style>
:root{ 
 --gold: linear-gradient(90deg,#a67c00,#ffbf00,#a67c00);
 --gold-solid:#d4af37;
 --bg: radial-gradient(circle,#1a1a1a,#0a0a0a);
 --glass: rgba(255,255,255,0.05);
 --border: rgba(212,175,55,0.3);
}

body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0}
.container{max-width:520px;margin:auto;padding:15px}
.header{padding:25px;text-align:center;border-bottom:1px solid var(--border)}
.header h1{margin:0;font-size:1.8rem;background:var(--gold);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:900}

.card{background:var(--glass);border:1px solid var(--border);
border-radius:25px;padding:20px;margin-bottom:20px;backdrop-filter:blur(15px)}

video,canvas{width:100%;border-radius:20px}
.gold-btn{background:var(--gold);border:none;color:#000;padding:14px;
border-radius:50px;font-weight:900;width:100%;cursor:pointer;margin-top:10px}

select{width:100%;padding:10px;border-radius:10px;background:#111;color:#fff;
border:1px solid #444;margin-bottom:10px}

.section-title{color:var(--gold-solid);font-weight:bold;margin:15px 0 10px}
.routine-item{background:rgba(255,255,255,.04);border-right:4px solid var(--gold-solid);
padding:12px;border-radius:10px;margin-bottom:10px}

.score{width:110px;height:110px;border-radius:50%;border:3px solid var(--gold-solid);
display:flex;align-items:center;justify-content:center;margin:0 auto 15px;
font-size:1.8rem;color:var(--gold-solid)}
.price{font-size:1.3rem;color:#00ffcc;text-align:center;margin-top:10px}
</style>
</head>

<body>

<div class="header">
<h1>VERONA | AI ELITE</h1>
</div>

<div class="container">

<!-- التحميل -->
<div class="card" id="scanCard">
<input type="file" id="uploadInput" accept="image/*">
<p>قم بتحميل صورة واضحة للوجه 📷</p>
<button class="gold-btn" onclick="startAnalysis()">ابدأ التحليل 🔬</button>
</div>

<!-- الأسئلة -->
<div class="card" id="questions" style="display:none">

<div class="section-title">تأكيد التشخيص</div>

<label>التصبغات</label>
<select id="pigmentSelect">
<option value="0">لا يوجد</option>
<option value="1">خفيفة</option>
<option value="2">متوسطة</option>
<option value="3">شديدة</option>
</select>

<label>الحبوب</label>
<select id="acneSelect">
<option value="0">لا يوجد</option>
<option value="1">خفيفة</option>
<option value="2">متوسطة</option>
<option value="3">شديدة</option>
</select>

<label>الهالات</label>
<select id="darkSelect">
<option value="0">لا يوجد</option>
<option value="1">خفيفة</option>
<option value="2">متوسطة</option>
<option value="3">شديدة</option>
</select>

<label>مستوى الروتين</label>
<select id="planLevel">
<option value="eco">اقتصادي</option>
<option value="elite" selected>Elite</option>
<option value="ultra">Ultra</option>
</select>

<label><input type="checkbox" id="glowPack"> باقة نضارة ✨</label>
<label><input type="checkbox" id="brightPack"> باقة تفتيح 🤍</label>

<button class="gold-btn" onclick="generateReport()">عرض التقرير 👑</button>
</div>

<!-- النتيجة -->
<div class="card" id="result" style="display:none">
<div class="score" id="scoreBox">0%</div>
<div id="clinicalSummary"></div>
<div id="routineOutput"></div>
<div class="price" id="priceBox"></div>
<button class="gold-btn" onclick="location.reload()">إعادة الفحص</button>
</div>

</div>

<script>

let detected={};

function startAnalysis(){
detected.skinType=["دهنية","جافة","مختلطة"][Math.floor(Math.random()*3)];
detected.pigmentation=Math.floor(Math.random()*4);
detected.acne=Math.floor(Math.random()*4);
detected.dark=Math.floor(Math.random()*4);

pigmentSelect.value=detected.pigmentation;
acneSelect.value=detected.acne;
darkSelect.value=detected.dark;

document.getElementById("scanCard").style.display="none";
document.getElementById("questions").style.display="block";
}

function generateReport(){

let p=parseInt(pigmentSelect.value);
let a=parseInt(acneSelect.value);
let d=parseInt(darkSelect.value);
let plan=document.getElementById("planLevel").value;
let glow=document.getElementById("glowPack").checked;
let bright=document.getElementById("brightPack").checked;

document.getElementById("questions").style.display="none";
document.getElementById("result").style.display="block";

let score=90-(p*3+a*4+d*2);
if(score<50) score=50;
scoreBox.innerText=score+"%";

let summary=`<div class="section-title">نتيجة التحليل</div>
<p>نوع البشرة: <b>${detected.skinType}</b></p>`;
clinicalSummary.innerHTML=summary;

buildRoutine(p,a,d,plan,glow,bright);
calculatePrice(plan,glow,bright);
}

function buildRoutine(p,a,d,plan,glow,bright){

let routine=`<div class="section-title">الروتين المختار (${plan.toUpperCase()})</div>`;

routine+=`<div class="routine-item">
غسول مناسب + مرطب + واقي شمس
</div>`;

if(a>0){
routine+=`<div class="routine-item">
علاج الحبوب:
${plan==="eco"?"Niacinamide":
plan==="elite"?"Niacinamide + Salicylic":
"Niacinamide + Salicylic + Zinc"}
</div>`;
}

if(p>0){
routine+=`<div class="routine-item">
علاج التصبغات:
${plan==="eco"?"Vitamin C":
plan==="elite"?"Arbutin + Vitamin C":
"Arbutin + Tranexamic + Vitamin C"}
</div>`;
}

if(d>0){
routine+=`<div class="routine-item">
علاج الهالات:
${plan==="eco"?"Caffeine":
plan==="elite"?"Caffeine + Retinol":
"Caffeine + Retinol + Peptides"}
</div>`;
}

if(glow){
routine+=`<div class="routine-item">
✨ باقة النضارة: Vitamin C + Hyaluronic + ماسك إشراقة
</div>`;
}

if(bright){
routine+=`<div class="routine-item">
🤍 باقة التفتيح: Arbutin إضافي + تقشير أسبوعي
</div>`;
}

routineOutput.innerHTML=routine;
}

function calculatePrice(plan,glow,bright){

let base=0;
if(plan==="eco") base=199;
if(plan==="elite") base=349;
if(plan==="ultra") base=499;

if(glow) base+=79;
if(bright) base+=99;

priceBox.innerText="السعر الإجمالي: "+base+" ريال";
}

</script>

</body>
</html>
