<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verona Ai Final</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
body{font-family:Arial;background:#f5f5f5;text-align:center;padding:20px}
button{padding:10px 18px;margin:5px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#111;color:#fff}
.card{background:#fff;padding:15px;margin:15px auto;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,.08);max-width:700px;text-align:right}
.section{font-weight:bold;margin-top:10px}
video,canvas,img{max-width:100%;border-radius:12px;margin-top:10px}
.badge{display:inline-block;padding:5px 10px;border-radius:20px;background:#eee;margin:3px;font-size:12px}
</style>
</head>
<body><h2>Verona Ai - النسخة النهائية</h2><input type="file" id="upload" accept="image/*" hidden>
<button class="primary" onclick="upload.click()">أضف صورة</button>
<button onclick="startCamera()">فتح الكاميرا</button>
<button onclick="capture()">التقاط</button><br>
<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas"></canvas>
<img id="preview" /><div id="result" class="card" style="display:none"></div>
<div id="packages" style="display:none"></div>
<div id="tips" class="card" style="display:none">
<h3>تعليمات عامة</h3>
<ul>
<li>واقي الشمس يوميًا SPF50.</li>
<li>ترطيب صباحًا ومساءً.</li>
<li>عدم خلط الريتينول مع فيتامين C في نفس الروتين.</li>
<li>شرب ماء كافي يوميًا.</li>
</ul>
</div><script>
let video=document.getElementById("video");
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let faceMesh=new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true});
faceMesh.onResults(onResults);

function startCamera(){
navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
video.srcObject=stream;
video.style.display="block";
});
}

function capture(){
canvas.width=video.videoWidth;
canvas.height=video.videoHeight;
ctx.drawImage(video,0,0);
faceMesh.send({image:canvas});
}

upload.onchange=e=>{
let reader=new FileReader();
reader.onload=function(){
preview.src=reader.result;
preview.onload=()=>{
canvas.width=preview.width;
canvas.height=preview.height;
ctx.drawImage(preview,0,0);
faceMesh.send({image:canvas});
}
}
reader.readAsDataURL(e.target.files[0]);
}

function onResults(results){
ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
if(results.multiFaceLandmarks.length>0){
for(const landmarks of results.multiFaceLandmarks){
drawConnectors(ctx,landmarks,FaceMesh.FACEMESH_TESSELATION,{color:'#00FF00',lineWidth:0.5});
}
analyzeImage();
}
}

function analyzeImage(){
let imgData=ctx.getImageData(0,0,canvas.width,canvas.height).data;
let total=0;
for(let i=0;i<imgData.length;i+=4){
total+=(imgData[i]+imgData[i+1]+imgData[i+2])/3;
}
let brightness=total/(imgData.length/4);

let acne=brightness<110?"متوسطة":"خفيفة";
let pigmentation=brightness<100?"عميقة":"خفيفة";

result.innerHTML=`<h3>نتيجة التحليل</h3>
<div class='badge'>درجة الإضاءة: ${brightness.toFixed(0)}</div>
<div class='badge'>حبوب: ${acne}</div>
<div class='badge'>تصبغات: ${pigmentation}</div>`;
result.style.display="block";
showPackages();
}

function product(name,active,why,benefit,price,link){
return `<p><strong>${name}</strong><br>
المادة الفعالة: ${active}<br>
لماذا يستخدم: ${why}<br>
الفائدة: ${benefit}<br>
السعر: ${price} جنيه<br>
<a href='${link}' target='_blank'>رابط الشراء</a></p>`;
}

function showPackages(){
packages.innerHTML=`
<div class='card'>
<h3>الباقة الاقتصادية</h3>
<div class='section'>صباحًا</div>
${product("غسول Garnier","Salicylic Acid","تنظيف المسام","تقليل الحبوب",120,"#")}
${product("سيروم Eva","Vitamin C","تفتيح","إشراقة",150,"#")}
<div class='section'>مساءً</div>
${product("سيروم The Ordinary","Niacinamide","تقليل الدهون","تحسين الملمس",350,"#")}
${product("مرطب Nivea","Hyaluronic Acid","ترطيب","منع الجفاف",90,"#")}
</div>`;
packages.style.display="block";
tips.style.display="block";
}

</script></body>
</html>
