<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI PRO - النسخة الملكية</title>
<style>
:root { 
    --gold: linear-gradient(90deg, #a67c00 0%, #ffbf00 50%, #a67c00 100%);
    --gold-solid: #d4af37;
    --dark-bg: radial-gradient(circle, #1a1a1a 0%, #0a0a0a 100%);
    --glass: rgba(255, 255, 255, 0.03);
    --border: rgba(212, 175, 55, 0.3);
}

body { 
    font-family: 'Segoe UI', sans-serif; 
    background: var(--dark-bg); 
    color: #fff; margin: 0; padding: 0; 
}

/* الهيدر المحترف */
.header { 
    padding: 30px; border-bottom: 1px solid var(--border); 
    text-align: center; background: rgba(0,0,0,0.5);
}
.header h1 { 
    font-size: 2rem; margin: 0; background: var(--gold);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 3px; font-weight: 900;
}

/* حاويات التصميم (الكروت) */
.main-grid {
    display: grid; grid-template-columns: 1fr; gap: 20px; padding: 20px;
    max-width: 500px; margin: auto;
}

.premium-card {
    background: var(--glass); border: 1px solid var(--border);
    border-radius: 25px; padding: 20px; backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* الكاميرا بشكل الصورة */
#canvasWrapper { 
    position: relative; border-radius: 20px; overflow: hidden;
    border: 2px solid var(--gold-solid);
}
video, canvas { width: 100%; display: block; }

/* عداد الـ Score المضيء */
.score-display {
    border: 2px solid var(--gold-solid); border-radius: 15px;
    padding: 20px; margin: 20px 0; background: rgba(0,0,0,0.3);
}
.score-display h2 { margin: 0; font-size: 3rem; color: var(--gold-solid); text-shadow: 0 0 20px var(--gold-solid); }

/* زر الذهب الفاخر */
.gold-btn {
    background: var(--gold); color: #000; border: none;
    padding: 15px 40px; border-radius: 50px; font-weight: 900;
    font-size: 1.1rem; cursor: pointer; transition: 0.4s;
    width: 100%; box-shadow: 0 5px 15px rgba(166, 124, 0, 0.4);
}
.gold-btn:hover { transform: scale(1.05); box-shadow: 0 8px 25px rgba(166, 124, 0, 0.6); }

/* سلايدر المقارنة */
.comparison-slider {
    position: relative; width: 100%; height: 250px; 
    border-radius: 15px; overflow: hidden; border: 1px solid var(--border);
}
.compare-img { position: absolute; top:0; left:0; width:100%; height:100%; background-size: cover; }
#afterImg { width: 50%; border-right: 2px solid var(--gold-solid); z-index: 2; }

/* تأثيرات الـ HUD */
.scan-line {
    position: absolute; top:0; left:0; width:100%; height:4px;
    background: var(--gold-solid); box-shadow: 0 0 15px var(--gold-solid);
    display: none; animation: scan 2s infinite linear; z-index: 10;
}
@keyframes scan { 0%{top:0} 100%{top:100%} }
</style>
</head>
<body>

<div class="header">
    <h1>VERONA <span style="color:#fff">| AI PRO</span></h1>
</div>

<div class="main-grid">
    <div class="premium-card">
        <div id="canvasWrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
            <div class="scan-line"></div>
        </div>
        <p id="status" style="color:#888; margin-top:15px;">جاهز لبدء الفحص المجهري ✅</p>
    </div>

    <div class="premium-card" id="scoreCard" style="display:none;">
        <p style="margin:0; color:var(--gold-solid);">Skin Score Display</p>
        <div class="score-display">
            <h2 id="finalScore">0%</h2>
        </div>
        <p style="font-size:0.8rem; color:#aaa;">صلاحية التقرير: 24 ساعة فقط</p>
    </div>

    <button class="gold-btn" id="startBtn">ابدأ التحليل (StartBtn)</button>

    <div id="resultArea" style="display:none;">
        <div class="premium-card">
            <h4 style="color:var(--gold-solid);">مقارنة النتائج المتوقعة:</h4>
            <div class="comparison-slider" id="slider">
                <div id="beforeImg" class="compare-img"></div>
                <div id="afterImg" class="compare-img"></div>
            </div>
            <p style="font-size:0.7rem; color:#666; margin-top:5px;">← اسحب لرؤية الفرق →</p>
        </div>
        
        <button class="gold-btn" style="margin-top:20px;" onclick="sendWA()">حجز الباقة واتساب ✅</button>
        <button id="resetBtn" style="background:none; border:none; color:#555; cursor:pointer; margin-top:10px;" onclick="location.reload()">ResetBtn</button>
    </div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const startBtn = document.getElementById('startBtn');
const scoreCard = document.getElementById('scoreCard');
const resultArea = document.getElementById('resultArea');

navigator.mediaDevices.getUserMedia({video: true}).then(s => video.srcObject = s);

startBtn.onclick = function() {
    this.style.display = 'none';
    const ctx = canvas.getContext('2d');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    
    video.style.display = 'none';
    canvas.style.display = 'block';
    document.querySelector('.scan-line').style.display = 'block';
    
    let score = 0;
    let timer = setInterval(() => {
        score += 2;
        document.getElementById('status').innerText = `جاري المعالجة... ${score}%`;
        if(score >= 100) {
            clearInterval(timer);
            showFinalResults();
        }
    }, 40);
};

function showFinalResults() {
    document.querySelector('.scan-line').style.display = 'none';
    scoreCard.style.display = 'block';
    resultArea.style.display = 'block';
    
    const s = Math.floor(Math.random() * 20) + 75;
    document.getElementById('finalScore').innerText = s + "%";

    // إعداد السلايدر (قبل وبعد)
    const beforeImg = document.getElementById('beforeImg');
    const afterImg = document.getElementById('afterImg');
    const dataUrl = canvas.toDataURL();
    
    beforeImg.style.backgroundImage = `url(${dataUrl})`;
    afterImg.style.backgroundImage = `url(${dataUrl})`;
    // إضافة فلتر تحسين لصورة "بعد"
    afterImg.style.filter = "brightness(1.1) contrast(1.1) saturate(1.2)";
}

// إضافة حركة بسيطة للسلايدر بالماوس
document.getElementById('slider').onmousemove = function(e) {
    const rect = this.getBoundingClientRect();
    const x = e.pageX - rect.left;
    document.getElementById('afterImg').style.width = x + "px";
};
</script>

</body>
</html>
