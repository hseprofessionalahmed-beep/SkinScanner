<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI - Pro Facial Precision</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; text-align: center; }
.container { max-width: 600px; margin: auto; }
.preview-box { position: relative; width: 100%; border-radius: 20px; overflow: hidden; background: #000; border: 2px solid #333; min-height: 300px; }
video, canvas { width: 100%; height: auto; display:block; }
#overlay { position: absolute; top: 0; left: 0; z-index: 10; }
.btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
.action-btn { background: var(--gold); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
.scan-btn { background: #fff; width: 100%; font-size: 1.1rem; border: 3px solid var(--gold); margin-top:10px; }
.result-card, .question-card, .routine-card, .recommend-card { background: var(--card); padding: 20px; border-radius: 20px; margin-top: 20px; border: 1px solid var(--gold); text-align: right; }
.hidden { display: none; }
.status-msg { color: var(--gold); font-size: 0.9rem; margin: 10px 0; }
.routine-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
.routine-card button { margin-top:10px; background:#25d366; color:white; width:100%; padding:10px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
select { padding:5px; margin-top:5px; width:100%; border-radius:5px; background:#fff; color:#000; }
</style>
</head>
<body>
<div class="container">
<h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>
<div id="status" class="status-msg">جاري تحميل المحرك الذكي...</div>
<div class="preview-box">
<video id="input_video" class="hidden" playsinline></video>
<canvas id="overlay"></canvas>
</div>
<div class="btn-grid">
<button class="action-btn" onclick="initCamera()">📸 الكاميرا</button>
<button class="action-btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
</div>
<input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(event)">
<button id="scanBtn" class="action-btn scan-btn" onclick="triggerQuestions()">تحليل النتائج الآن 🔬</button><div id="questionCard" class="question-card hidden">
<h3 style="color:var(--gold); margin:0;">لقد اكتشف المحلل الذكي بعض المشاكل، قم بتأكيدها:</h3>
<div id="questionsArea"></div>
<button class="action-btn scan-btn" onclick="computeRoutine()">استخراج الروتين ✅</button>
</div><div id="routineArea" class="routine-grid hidden"></div>
<div id="recommendCard" class="recommend-card hidden">
<h3 style="color:var(--gold);">التوصيات العامة</h3>
<ul>
<li>الترطيب لمدة أسبوع على الأقل قبل الروتين.</li>
<li>شرب كمية كافية من الماء يوميًا.</li>
<li>النوم باكرًا لتحفيز تجديد البشرة.</li>
<li>استخدام واقي الشمس يوميًا.</li>
</ul>
</div>
</div><script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('overlay');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently:true});
let faceMesh;
let lastResults = null;
let currentImg = null;
let detectedIssues = {};

async function setupFaceMesh(){
    faceMesh = new FaceMesh({locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5 });
    faceMesh.onResults(onResults);
    document.getElementById('status').innerText="المحرك جاهز للفحص ✅";
}
setupFaceMesh();

function onResults(results){
    lastResults = results;
    canvasElement.width = canvasElement.clientWidth;
    canvasElement.height = (currentImg)? (currentImg.height*(canvasElement.width/currentImg.width)) : videoElement.videoHeight*(canvasElement.width/videoElement.videoWidth);
    canvasCtx.save();
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
    canvasCtx.drawImage(results.image,0,0,canvasElement.width,canvasElement.height);
    detectedIssues = {};
    if(results.multiFaceLandmarks){
        for(const landmarks of results.multiFaceLandmarks){
            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color:'#d4af3744', lineWidth:0.5});
        }
        analyzeFace(results.multiFaceLandmarks[0]);
    }
    canvasCtx.restore();
}

async function initCamera(){
    currentImg=null;
    videoElement.classList.remove('hidden');
    const camera = new Camera(videoElement, {onFrame: async()=>{await faceMesh.send({image:videoElement});}});
    camera.start();
}

function processFile(event){
    const file = event.target.files[0];
    if(!file)return;
    const img = new Image();
    img.onload = async ()=>{
        currentImg=img;
        videoElement.classList.add('hidden');
        await faceMesh.send({image:img});
    };
    img.src = URL.createObjectURL(file);
}

function analyzeFace(landmarks){
    function getPixelMean(lm){
        const x=Math.floor(lm.x*canvasElement.width);
        const y=Math.floor(lm.y*canvasElement.height);
        const p = canvasCtx.getImageData(x,y,1,1).data;
        return (p[0]+p[1]+p[2])/3;
    }
    const forehead = getPixelMean(landmarks[10]);
    const cheek = getPixelMean(landmarks[205]);
    const eye = (getPixelMean(landmarks[130])+getPixelMean(landmarks[350]))/2;
    const pigmentDiff = cheek/forehead;
    const eyeDiff = eye/forehead;
    detectedIssues.halations=(eyeDiff<0.85)? true:false;
    detectedIssues.pigment=(pigmentDiff<0.90)? true:false;
    detectedIssues.acne=false; // يمكن تطوير اكتشاف الحبوب لاحقًا
    detectedIssues.dry=false; // يمكن تطوير اكتشاف الجفاف لاحقًا
}

function triggerQuestions(){
    if(!lastResults || !lastResults.multiFaceLandmarks) return alert('يرجى التقاط وجه واضح أولاً');
    const qCard=document.getElementById('questionCard');
    const qArea=document.getElementById('questionsArea');
    qArea.innerHTML='';
    // الأسئلة تظهر فقط عند اكتشاف مشكلة
    if(detectedIssues.halations){
        qArea.innerHTML+='<label>الهالات تحت العين: <select id="halations"><option value="نعم" selected>نعم</option><option value="لا">لا يوجد</option></select></label><br>';
    }
    if(detectedIssues.pigment){
        qArea.innerHTML+='<label>التصبغات: <select id="pigment"><option value="خفيفة" selected>خفيفة</option><option value="متوسطة">متوسطة</option><option value="عميقة">عميقة</option><option value="لا">لا يوجد</option></select></label><br>';
    }
    qArea.innerHTML+='<label>الحبوب: <select id="acne"><option value="لا" selected>لا يوجد</option><option value="نعم">نعم</option></select></label><br>';
    qArea.innerHTML+='<label>جفاف البشرة: <select id="dry"><option value="لا" selected>لا يوجد</option><option value="نعم">نعم</option></select></label><br>';
    qArea.innerHTML+='<label>هل تريد نضارة أو نضارة وتفتيح؟ <select id="glow"><option value="نضارة">نضارة</option><option value="نضارة+تفتيح">نضارة + تفتيح</option></select></label><br>';
    qCard.classList.remove('hidden');
}

function computeRoutine(){
    const routineArea=document.getElementById('routineArea');
    routineArea.innerHTML='';
    routineArea.classList.remove('hidden');
    document.getElementById('recommendCard').classList.remove('hidden');

    const halations = document.getElementById('halations')?.value;
    const pigment = document.getElementById('pigment')?.value;
    const acne = document.getElementById('acne')?.value;
    const dry = document.getElementById('dry')?.value;
    const glow = document.getElementById('glow')?.value;

    // بناء الروتين حسب المشاكل
    const productsBase = [];
    if(dry==='نعم'){productsBase.push('مرطب إجباري للبشرة الجافة');}
    if(pigment && pigment!=='لا'){productsBase.push('سيروم تفتيح للبقع');}
    if(halations==='نعم'){productsBase.push('كريم العيون للهالات');}
    if(acne==='نعم'){productsBase.push('غسول ومقشر للحبوب');}
    if(glow==='نضارة+تفتيح'){productsBase.push('سيروم تفتيح إضافي');}

    const rData=[
        {type:'اقتصادي', products:productsBase.join(' + '), price:'200 جنيه', duration:'4 أسابيع', improvement:'50%'},
        {type:'سوبر', products:productsBase.join(' + ')+ ' + واقي شمس و سيروم إضافي', price:'500 جنيه', duration:'6 أسابيع', improvement:'70%'},
        {type:'ألترا', products:productsBase.join(' + ')+ ' + كامل الروتين المتكامل', price:'900 جنيه', duration:'8 أسابيع', improvement:'90%'}
    ];

    rData.forEach(r=>{
        const card=document.createElement('div');
        card.className='routine-card';
        card.innerHTML=`<h4 style='color:var(--gold)'>${r.type}</h4>
        <p><b>المنتجات والمواد الفعالة:</b> ${r.products}</p>
        <p><b>السعر:</b> ${r.price}</p>
        <p><b>مدة الاستخدام:</b> ${r.duration}</p>
        <p><b>نسبة التحسن المتوقعة:</b> ${r.improvement}</p>
        <button onclick="sendWA('${r.type}')">اختيار هذا الروتين ✅</button>`;
        routineArea.appendChild(card);
    });
}

function sendWA(type){
    const text=`اختار الروتين: ${type}`;
    window.open(`https://wa.me/201063994139?text=${text}`);
}
</script></body>
</html>
