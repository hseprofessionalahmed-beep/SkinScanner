<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Scanner Live</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>ماسح البشرة الذكي (لايف) ✨</h1>
            <p>ضع وجهك أمام الكاميرا للتحليل الفوري</p>
        </header>

        <div class="scanner-box">
            <video id="video" autoplay muted playsinline></video>
            <div id="loading-overlay" style="display:none;">جاري فحص خلايا البشرة...</div>
        </div>

        <button id="scanBtn">تحليل الوجه الآن 📸</button>

        <div id="results" style="display:none;">
            <div class="card">
                <h3>🔍 حالة البشرة المكتشفة:</h3>
                <ul id="skinProblems"></ul>
            </div>

            <div class="card highlight">
                <h3>🧴 الروتين الثلاثي المقترح:</h3>
                <ul id="skinRoutine"></ul>
            </div>

            <button id="sendWhatsApp" class="wa-btn">إرسال التقرير للواتساب ✅</button>
        </div>
    </div>

    <script src="routine_data.js"></script>
    <script src="ai_face_scan.js"></script>
    <script src="script.js"></script>
    <script src="whatsapp_send.js"></script>
</body>
</html>
