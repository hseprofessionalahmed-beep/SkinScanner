<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONA AI - Pro Vision</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000000; --card: #1c1c1e; --blue: #0a84ff; }
        body { margin: 0; background: var(--bg); color: white; font-family: -apple-system, sans-serif; text-align: center; }
        .app { padding: 20px; max-width: 450px; margin: auto; }
        .logo { width: 70px; height: 70px; background: white; border-radius: 18px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        button { padding: 15px; border-radius: 14px; border: none; cursor: pointer; font-weight: bold; }
        .primary-btn { background: var(--blue); color: white; }
        .secondary-btn { background: var(--card); color: white; border: 1px solid #333; }
        video, canvas { width: 100%; border-radius: 20px; background: #111; margin-top: 10px; border: 1px solid #222; }
        .loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .result-card { background: var(--card); padding: 25px; border-radius: 24px; margin-top: 20px; border: 1px solid #333; text-align: right; }
        .score-box { width: 110px; height: 110px; border: 4px solid var(--gold); border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .routine-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; margin-top: 10px; border-right: 3px solid var(--gold); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loading" class="hidden">
    <div class="loader"><div class="spinner"></div><p>جاري المسح المجهري للصبغات والمسام...</p></div>
</div>

<div class="app">
    <div class="logo">VERONA</div>
    <h2>VERONA <span style="color:var(--gold)">AI VISION</span></h2>

    <div class="btn-group">
        <button class="primary-btn" onclick="startCamera()">📸 كاميرا</button>
        <button class="secondary-btn" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
    </div>
    <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFile(event)">

    <video id="video" autoplay playsinline class="hidden"></video>
    <canvas id="canvas" class="hidden"></canvas>
    <button id="scanBtn" class="primary-btn hidden" style="width:100%; margin-top:10px; background:var(--gold); color:black;" onclick="runAnalysis()">تحليل الصبغات العميقة</button>

    <div id="results" class="result-card hidden">
        <div class="score-box"><span id="scoreDisplay" style="font-size:2rem; font-weight:bold;">0</span><small>صحة البشرة</small></div>
        <canvas id="chart" style="margin:15px 0;"></canvas>
        <div id="statusList"></div>
        <div id="routineDetails"></div>
        <button class="primary-btn" style="width:100%; background:#25d366; margin-top:15px;" onclick="sendWhatsApp()">إرسال التقرير للمتخصص ✅</button>
    </div>
</div>

<script>
let scanData = { acne: 0, pigment: 0, darkCircles: 0, score: 98 };
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');

async function startCamera() {
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
        video.srcObject = s; video.classList.remove('hidden');
        document.getElementById('scanBtn').classList.remove('hidden');
    } catch (e) { alert("يرجى تفعيل الكاميرا"); }
}

function handleFile(e) {
    const file = e.target.files[0];
    const img = new Image();
    img.onload = () => {
        canvas.classList.remove('hidden');
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400;
        ctx.drawImage(img, 0, 0, 400, 400);
        runAnalysis();
    };
    img.src = URL.createObjectURL(file);
}

function runAnalysis() {
    document.getElementById('loading').classList.remove('hidden');
    
    if (!video.classList.contains('hidden')) {
        const ctx = canvas.getContext('2d');
        canvas.width = 400; canvas.height = 400;
        ctx.drawImage(video, 0, 0, 400, 400);
    }

    setTimeout(() => {
        const ctx = canvas.getContext('2d');
        const pixels = ctx.getImageData(0,0,400,400).data;
        
        let darkAreaCount = 0; // للهالات والتصبغات
        let redAreaCount = 0;  // للالتهاب والحبوب
        let skinToneSum = 0;   // لمتوسط لون البشرة الأساسي
        
        // 1. حساب متوسط لون البشرة أولاً لعمل "معايرة" (Calibration)
        for (let i = 0; i < pixels.length; i += 40) {
            skinToneSum += (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
        }
        let avgSkinTone = skinToneSum / (pixels.length / 40);

        // 2. التحليل العميق بمقارنة كل نقطة بالمتوسط العام للوجه
        for (let i = 0; i < pixels.length; i += 8) {
            let r = pixels[i], g = pixels[i+1], b = pixels[i+2];
            let currentBrightness = (r + g + b) / 3;

            // رصد التصبغات والهالات: إذا كانت النقطة أغمق من متوسط الوجه بنسبة 35% 
            // وبها ميل للون البني (r > b)
            if (currentBrightness < avgSkinTone * 0.65 && r > b) {
                darkAreaCount++;
            }

            // رصد الحبوب: إذا كانت النقطة تميل للأسوداد/الأحمر الصارخ مقارنة بالبشرة
            if (r > g + 50 && r > b + 50) {
                redAreaCount++;
            }
        }

        const totalPoints = pixels.length / 8;
        const pigmentRatio = (darkAreaCount / totalPoints) * 100;
        const acneRatio = (redAreaCount / totalPoints) * 100;

        // التشخيص الدقيق
        if (pigmentRatio > 4.5) { // تصبغات أو هالات واضحة
            scanData.score = 78;
            showUI("تصبغات وهالات سوداء 🔍", "تم رصد مناطق داكنة بنسبة عالية تحت العين أو في مناطق متفرقة.");
        } else if (acneRatio > 1.5) {
            scanData.score = 72;
            showUI("بشرة ملتهبة (حبوب) ⚠️", "تم رصد نقاط التهاب نشطة وتفاوت لوني أحمر.");
        } else if (avgSkinTone > 200 && pigmentRatio < 2.0) { // بشرة فاتحة وصافية جداً (طفل)
            scanData.score = 98;
            showUI("بشرة مثالية (صافية) ✅", "لا يوجد أي أثر لهالات أو تصبغات عميقة.");
        } else {
            scanData.score = 90;
            showUI("بشرة صحية مستقرة ✅", "البشرة في حالة جيدة جداً مع وجود تباين طبيعي.");
        }

        document.getElementById('loading').classList.add('hidden');
    }, 1500);
}

function showUI(title, desc) {
    document.getElementById('results').classList.remove('hidden');
    document.getElementById('scoreDisplay').innerText = scanData.score;
    document.getElementById('statusList').innerHTML = `<p style="font-weight:bold; color:var(--gold);">${title}</p><p>${desc}</p>`;
    
    let routine = scanData.score < 80 ? "روتين علاجي مكثف: سيروم تفتيح + كريم محيط العين + واقي شمس." : "روتين وقائي: غسول لطيف + مرطب هايلورونيك.";
    document.getElementById('routineDetails').innerHTML = `<div class="routine-box"><b>التوصية:</b><br>${routine}</div>`;
    
    new Chart(document.getElementById('chart'), {
        type: 'line',
        data: { labels:['اليوم','أسبوع 2','أسبوع 4'], datasets:[{label:'التحسن', data:[scanData.score, scanData.score+10, 98], borderColor:'#d4af37', tension:0.4}] }
    });
}

function sendWhatsApp() {
    let msg = `تقرير تحليل البشرة VERONA AI:%0Aالدرجة: ${scanData.score}%0Aالحالة: ${document.getElementById('statusList').innerText}`;
    window.open(`https://wa.me/201063994139?text=${msg}`);
}
</script>
</body>
</html>
