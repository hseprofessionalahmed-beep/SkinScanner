<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | FINAL V27</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#050505; --cyan: #00f2ff; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}
.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
.live-overlay{position:absolute;top:15px;left:15px;right:15px;z-index:30;pointer-events:none;}
.badge{background:rgba(0,0,0,0.7);padding:5px 12px;border-radius:20px;font-size:0.8rem;margin-bottom:5px;display:inline-block;border:1px solid var(--gold);}

.flex-btns { display: flex; gap: 10px; margin-bottom: 10px; }
.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%;}
.btn-secondary { background: #222; color: #fff; border: 1px solid #444; }

.card{background:#111;border:1px solid #d4af3733;border-radius:20px;padding:15px;display:none;margin-top:15px;}
.pkg-card{background:#1a1a1a;border:1px solid #333;border-radius:18px;padding:15px;border-top:4px solid var(--gold); margin-bottom: 25px;}

.product-box { background: #222; padding: 12px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #333; }
.prod-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.prod-time { font-size: 0.75rem; background: #d4af3722; color: var(--gold); padding: 2px 8px; border-radius: 5px; border: 0.5px solid var(--gold); }
.usage-instruction { background: #001a1a; color: #eee; padding: 8px; border-radius: 8px; font-size: 0.8rem; border-right: 3px solid var(--cyan); line-height: 1.4; margin-top:10px;}

.buy-now { display: inline-block; margin-top: 12px; color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.85rem; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 8px; transition: 0.3s; }
.buy-now:hover { background: var(--gold); color: #000; }

.total-row{display:flex;justify-content:space-between;font-weight:bold;color:var(--gold);margin-top:15px; border-top: 1px solid #333; padding-top: 10px; font-size: 1.1rem;}
</style>
</head>
<body>
<div class="container">
<h2 style="color:var(--gold);text-align:center;">VERONA AI | V27 FINAL</h2>
<div class="preview-box">
<video id="video" playsinline hidden></video>
<canvas id="canvas"></canvas>
<div class="live-overlay">
<div id="lightLevel" class="badge">الإضاءة...</div><br>
<div id="liveDetection" class="badge" style="color: var(--gold); display:none;">الفحص...</div>
</div>
<div id="liveStatus" style="position:absolute;bottom:15px;width:100%;color:var(--cyan);font-weight:bold;z-index:20;text-align:center;">بانتظار الصورة...</div>
</div>

<div id="controls">
<div class="flex-btns">
    <button class="btn" onclick="startCam()">بدء المسح 📸</button>
    <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">أضف صورة 🖼️</button>
</div>
<input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
<button class="btn" style="background: #25d366; color: white;" onclick="openQuestions()">عرض وتحليل النتيجة 🔍</button>
</div>

<div id="questionsCard" class="card">
<h3 style="color:var(--gold);text-align:center;">تأكيد التحليل</h3>
<label>حبوب ملتهبة؟</label>
<select id="qAcne" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border-radius:8px;"><option value="no">لا</option><option value="yes">نعم</option></select>
<label>تصبغات؟</label>
<select id="qPig" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border-radius:8px;"><option value="no">لا</option><option value="yes">نعم</option></select>
<label>هالات سوداء؟</label>
<select id="qCircles" style="width:100%; padding:10px; margin-bottom:10px; background:#222; color:#fff; border-radius:8px;"><option value="none">لا يوجد</option><option value="brown">بني</option></select>
<button class="btn" onclick="generateFinalReport()">عرض الروتين النهائي ✨</button>
</div>

<div id="reportCard" class="card">
<div id="skinTypeDisplay" style="text-align:center;color:var(--cyan);font-weight:bold;margin-bottom:15px;"></div>
<div id="pkgContainer"></div>
<button class="btn" onclick="location.reload()" style="background:#333;color:#fff;">فحص جديد 🔄</button>
</div>
</div>

<script>
const myPhone = "201063994139";
const productDB = {
"ستارفيل وايتنينج": {p:145, ing:"أربوتين", ben:"تفتيح البقع", time:"صباحاً ومساءً", use:"يوضع على بشرة مبللة ويدلك دقيقة.", link:"https://www.amazon.eg/s?k=starville+whitening+cleanser"},
"أرجنتو كلير": {p:165, ing:"زيت شجرة الشاي", ben:"علاج الحبوب", time:"صباحاً ومساءً", use:"يدلك على الحبوب ويشطف بماء فاتر.", link:"https://www.amazon.eg/s?k=argento+clear+cleanser"},
"فيشي نورماديرم": {p:850, ing:"ساليسيليك أسيد", ben:"تنظيف المسام", time:"صباحاً ومساءً", use:"كمية بسيطة تدلك ثم تشطف جيداً.", link:"https://www.amazon.eg/s?k=vichy+normaderm+cleanser"},
"شان جيل": {p:195, ing:"ألوفيرا", ben:"ترطيب عميق", time:"صباحاً ومساءً", use:"بعد الغسول على بشرة مندية.", link:"https://www.amazon.eg/s?k=shaan+gel+moisturizer"},
"ناتافيس فيتامين C": {p:485, ing:"فيتامين C", ben:"نضارة وتوحيد لون", time:"صباحاً فقط", use:"3 قطرات قبل واقي الشمس.", link:"https://www.amazon.eg/s?k=natavis+vitamin+c+serum"},
"لاروش بيجمنتكلار": {p:1250, ing:"كافيين", ben:"علاج الهالات", time:"مساءً فقط", use:"طبطبة خفيفة حول العين فقط.", link:"https://www.amazon.eg/s?k=la+roche+pigmentclar+eyes"},
"ستارفيل آي كونتور": {p:155, ing:"ريتينول", ben:"ترطيب العين", time:"صباحاً ومساءً", use:"تدليك رقيق حول منطقة العين.", link:"https://www.amazon.eg/s?k=starville+eye+contour+gel"},
"بوباي جل": {p:180, ing:"SPF 50", ben:"حماية من الشمس", time:"صباحاً فقط", use:"قبل الخروج بـ 20 دقيقة.", link:"https://www.amazon.eg/s?k=bobai+sunscreen+gel"},
"لاروش أنثيليوس": {p:650, ing:"Mexoryl", ben:"حماية فائقة", time:"صباحاً فقط", use:"آخر خطوة في الروتين الصباحي.", link:"https://www.amazon.eg/s?k=la+roche+posay+anthelios"},
"غسول سيرافيه": {p:450, ing:"سيراميد", ben:"حماية الحاجز", time:"صباحاً ومساءً", use:"تنظيف لطيف بدون تجفيف.", link:"https://www.amazon.eg/s?k=cerave+cleanser+for+oily+skin"}
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d',{willReadFrequently:true});
let aiAnalysis = {acne:false,pig:false,circles:false,skinType:'مختلطة'};

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6});

faceMesh.onResults(results=>{
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
if(results.multiFaceLandmarks?.length>0){
const lm=results.multiFaceLandmarks[0];
drawConnectors(ctx,lm,FACEMESH_TESSELATION,{color:'#d4af3740',lineWidth:1});
const fore=getPx(lm[10]); const cheek=getPx(lm[205]); const eye=getPx(lm[230]);
document.getElementById('lightLevel').innerText = fore.v < 100 ? "⚠️ إضاءة ضعيفة" : "✅ إضاءة جيدة";
aiAnalysis.skinType=(fore.v>205)?"دهنية":(fore.v<115?"جافة":"مختلطة");
aiAnalysis.acne=(cheek.r - cheek.g > 35);
aiAnalysis.pig=(cheek.v / fore.v < 0.85);
aiAnalysis.circles=(eye.v < fore.v * 0.72);
document.getElementById('liveDetection').style.display="inline-block";
document.getElementById('liveStatus').innerText="تم الرصد بنجاح ✅";
}
});

function getPx(p){const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height); const d=ctx.getImageData(x,y,1,1).data; return {r:d[0],g:d[1],v:(d[0]+d[1]+d[2])/3};}
function startCam(){new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480;}
function handleImage(e){const r=new FileReader(); r.onload=(ev)=>{const img=new Image(); img.onload=()=>{canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img});}; img.src=ev.target.result;}; r.readAsDataURL(e.target.files[0]);}
function openQuestions(){document.getElementById('controls').style.display='none'; document.getElementById('questionsCard').style.display='block';}

function generateFinalReport(){
document.getElementById('questionsCard').style.display='none';
document.getElementById('reportCard').style.display='block';
document.getElementById('skinTypeDisplay').innerText="روتين فيرونا للبشرة " + aiAnalysis.skinType;
const container=document.getElementById('pkgContainer'); container.innerHTML="";

[{id:'low', n:'الباقة الاقتصادية 🥉'}, {id:'high', n:'الباقة الألترا 🥇'}].forEach(lvl=>{
    let products = [];
    let wash = aiAnalysis.skinType==="دهنية" ? (lvl.id==='high'?"فيشي نورماديرم":"أرجنتو كلير") : (lvl.id==='high'?"غسول سيرافيه":"ستارفيل وايتنينج");
    products.push(wash);
    if(aiAnalysis.acne && wash !== "أرجنتو كلير") products.push("أرجنتو كلير");
    if(aiAnalysis.pig) products.push("ناتافيس فيتامين C");
    if(aiAnalysis.circles) products.push(lvl.id==='high'?"لاروش بيجمنتكلار":"ستارفيل آي كونتور");
    products.push("شان جيل");
    products.push(lvl.id==='high'?"لاروش أنثيليوس":"بوباي جل");

    let html = `<div class="pkg-card"><div style="color:var(--gold);font-weight:bold;text-align:center;margin-bottom:15px; font-size:1.1rem;">${lvl.n}</div>`;
    let total = 0;
    [...new Set(products)].forEach(name => {
        const d = productDB[name]; total += d.p;
        html += `
        <div class="product-box">
            <div class="prod-header"><b>${name}</b><span class="prod-time">${d.time}</span></div>
            <span style="font-size:0.8rem; color:#aaa; display:block; margin-bottom:5px;">🧪 ${d.ing} | ✨ ${d.ben}</span>
            <div class="usage-instruction">📝 طريقة الاستخدام: ${d.use}</div>
            <div style="text-align:left;">
                <a href="${d.link}" target="_blank" class="buy-now">اطلب المنتج من هنا 🛒</a>
            </div>
        </div>`;
    });
    html += `<div class="total-row"><span>المجموع:</span><span>${total} ج.م</span></div></div>`;
    container.innerHTML += html;
});
}
</script>
</body>
</html>
