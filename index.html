<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | ULTIMATE V44</title>
    <style>
        :root { --gold:#d4af37; --bg:#0a0a0a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; text-align: right; }
        .container { max-width: 500px; margin: auto; }
        .header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 15px 0; text-align: center; border-bottom: 3px solid var(--gold); }
        .app-logo { width: 85%; max-height: 60px; object-fit: contain; }
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold); aspect-ratio: 4/5; background: #000; margin-bottom: 15px; }
        #video, #canvas { width: 100%; height: 100%; object-fit: cover; }
        .btn { background: linear-gradient(135deg,#a67c00,#ffbf00); color: #000; border: none; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 10px; font-size: 1rem; }
        .btn-secondary { background: #222; color: #fff; border: 1px solid #444; }
        .card { background: #111; border: 1px solid #d4af3733; border-radius: 25px; padding: 20px; display: none; margin-top: 15px; }
        .loading-box { text-align: center; padding: 20px; display: none; }
        .status-msg { background: #1a1a1a; padding: 15px; border-radius: 12px; border-right: 4px solid var(--gold); margin-bottom: 15px; line-height: 1.8; white-space: pre-wrap; }
        .buy-link { display: inline-block; background: var(--gold); color: #000; text-decoration: none; padding: 8px 15px; border-radius: 8px; font-weight: bold; margin: 5px 0; font-size: 0.85rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>

    <div class="preview-box">
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="capturePhoto()">التقاط وتحليل 📸</button>
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleFileUpload(event)">
    </div>

    <div id="loading" class="loading-box">
        <div class="spinner"></div>
        <p>جاري فحص مجهري للبشرة عبر Verona AI...</p>
    </div>

    <div id="reportCard" class="card">
        <h3 style="color:var(--gold); text-align:center; margin-top:0;">تقرير التشخيص الذكي</h3>
        <div id="aiAnalysisResult" class="status-msg"></div>
        <button class="btn" onclick="location.reload()" style="background:#333; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyA1G6Dgxz-ZmwdgQWZRUmhFEwFRufpxXXI";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; });
    }

    function capturePhoto() {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0);
        const base64Image = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        sendToGemini(base64Image);
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const base64Image = e.target.result.split(',')[1];
            sendToGemini(base64Image);
        };
        reader.readAsDataURL(file);
    }

    async function sendToGemini(base64Data) {
        document.getElementById('controls').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        const prompt = "أنت طبيب جلدية خبير. حلل الصورة المرفقة. اذكر نوع البشرة، ورصد كافة المشاكل (تصبغات، بقع، تجاعيد)، ثم اقترح روتيناً من هذه المنتجات بروابطها: (ستارفيل وايتنينج: https://amzn.to/3YVfXfI)، (أرجنتو كلير: https://amzn.to/3uN2R3Q)، (شان جيل: https://amzn.to/3InR0Zk)، (ناتافيس فيتامين C: https://amzn.to/3SREm9v)، (بوباي جل: https://amzn.to/3uREn6Z).";

        // هذا هو الرابط المصحح وفقاً لأحدث تحديثات جوجل
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        try {
            const response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }]
                })
            });

            const result = await response.json();
            if (result.error) throw new Error(result.error.message);

            const aiResponse = result.candidates[0].content.parts[0].text;
            showReport(aiResponse);

        } catch (error) {
            console.error(error);
            alert("حدث خطأ: " + error.message);
            document.getElementById('controls').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }

    function showReport(text) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('reportCard').style.display = 'block';
        let formattedText = text.replace(/(https?:\/\/[^\s\)]+)/g, '<br><a href="$1" target="_blank" class="buy-link">طلب المنتج 🛒</a>');
        document.getElementById('aiAnalysisResult').innerHTML = formattedText;
    }
</script>
</body>
</html>
