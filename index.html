<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Skin Scanner Pro - الصالون</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>ماسح البشرة الذكي Pro ✨</h1>
            <p>تحليل عميق للبشرة بخطة علاجية متكاملة</p>
        </header>

        <div class="scanner-box">
            <video id="video" autoplay muted playsinline></video>
            <div id="loading-overlay">جاري تشغيل محرك الذكاء الاصطناعي...</div>
        </div>

        <div class="action-buttons">
            <button id="scanBtn">تحليل الكاميرا لايف 📸</button>
            <div class="divider">أو</div>
            <input type="file" id="fileInput" accept="image/*" hidden>
            <button id="uploadBtn" class="secondary-btn">رفع صورة من المعرض 🖼️</button>
        </div>

        <div id="results" style="display:none;">
            <div class="card info-card">
                <h3>🔍 نتائج التحليل الفني:</h3>
                <ul id="skinProblems"></ul>
            </div>

            <div id="skinRoutine"></div>

            <div class="card summary-card">
                <h3>📅 الخطة الزمنية والنتائج المتوقعة</h3>
                <p id="treatmentDuration" style="font-weight: bold; color: #d81b60;"></p>
                <div class="improvement-box">
                    <span>نسبة التحسن المتوقعة:</span>
                    <strong id="improvementRate"></strong>
                </div>
            </div>

            <button id="sendWhatsApp" class="wa-btn">إرسال الخطة لواتساب ✅</button>
        </div>
    </div>

    <script src="routine_data.js"></script>
    <script src="ai_face_scan.js"></script>
    <script src="script.js"></script>
    <script src="whatsapp_send.js"></script>
</body>
</html>
