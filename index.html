<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI - Pro Facial Precision</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --card:#161616; }
body{background:var(--bg);color:#fff;font-family:sans-serif;margin:0;padding:15px;text-align:center;}
.container{max-width:750px;margin:auto;}
.preview-box{position:relative;width:100%;border-radius:20px;overflow:hidden;background:#000;border:2px solid #333;}
video,canvas{width:100%;height:auto;}
#overlay{position:absolute;top:0;left:0;z-index:10;}
button{padding:14px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;margin-top:10px;}
.primary{background:var(--gold);color:#000;}
.dark{background:#333;color:#fff;}
.card{background:var(--card);padding:20px;border-radius:20px;margin-top:20px;border:1px solid var(--gold);text-align:right;}
.hidden{display:none;}
.routine-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:20px;}
.routine-card{background:#111;padding:15px;border-radius:15px;border:1px solid var(--gold);text-align:right;}
.routine-card button{background:#25d366;color:white;width:100%;}
ul{padding-right:20px;}
</style>
</head>
<body>

<div class="container">

<h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>

<div class="preview-box">
<video id="video" class="hidden" playsinline></video>
<canvas id="canvas"></canvas>
</div>

<button class="primary" onclick="startCamera()">📸 تشغيل الكاميرا</button>
<button class="dark" onclick="upload.click()">📁 رفع صورة</button>
<input type="file" id="upload" hidden accept="image/*">

<button class="primary" onclick="generateRoutine()">تحليل النتائج 🔬</button>

<div id="routineSection" class="routine-grid hidden"></div>

</div>

<script>

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const upload = document.getElementById("upload");
const routineSection = document.getElementById("routineSection");

let faceMesh;
let detectedIssues = {halations:false,pigment:false};
let currentImg=null;

async function init(){
faceMesh = new FaceMesh({
locateFile:(file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.6});
faceMesh.onResults(onResults);
}
init();

function onResults(results){

if(currentImg){
canvas.width = currentImg.width;
canvas.height = currentImg.height;
}else{
canvas.width = video.videoWidth;
canvas.height = video.videoHeight;
}

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.drawImage(results.image,0,0,canvas.width,canvas.height);

if(results.multiFaceLandmarks){

const landmarks = results.multiFaceLandmarks[0];

function getMean(lm){
const x=Math.floor(lm.x*canvas.width);
const y=Math.floor(lm.y*canvas.height);
const p=ctx.getImageData(x,y,1,1).data;
return (p[0]+p[1]+p[2])/3;
}

const forehead=getMean(landmarks[10]);
const cheek=getMean(landmarks[205]);
const eye=(getMean(landmarks[130])+getMean(landmarks[350]))/2;

const pigmentDiff=cheek/forehead;
const eyeDiff=eye/forehead;

// حساسية متوسطة
detectedIssues.halations = (eyeDiff < 0.88);
detectedIssues.pigment   = (pigmentDiff < 0.93);

}

}

async function startCamera(){
currentImg=null;
video.classList.remove("hidden");
const cam = new Camera(video,{
onFrame: async()=>{ await faceMesh.send({image:video}); }
});
cam.start();
}

upload.onchange = async(e)=>{
const file=e.target.files[0];
if(!file)return;
const img=new Image();
img.onload=async()=>{
currentImg=img;
video.classList.add("hidden");
await faceMesh.send({image:img});
};
img.src=URL.createObjectURL(file);
};

function generateRoutine(){

if(!detectedIssues.halations && !detectedIssues.pigment){
alert("لم يتم اكتشاف مشاكل واضحة.");
return;
}

routineSection.innerHTML="";
routineSection.classList.remove("hidden");

let activeList=[];
let goalText="";

if(detectedIssues.halations){
activeList.push("Caffeine → تحسين مظهر الهالات");
activeList.push("Vitamin C → تفتيح منطقة العين");
goalText+="علاج الهالات ";
}

if(detectedIssues.pigment){
activeList.push("Niacinamide → تقليل التصبغات");
activeList.push("Alpha Arbutin → توحيد لون البشرة");
goalText+="وتوحيد لون البشرة ";
}

// إنشاء الباقات الثلاث
createPackage("🟢 الباقة الاقتصادية",
activeList.concat([
"SPF Filters → منع عودة التصبغات"
]),
"غسول لطيف + سيروم فيتامين C + كريم عيون (عند الحاجة) + واقي شمس SPF50",
"600 – 900 جنيه",
"4 أسابيع",
"50 – 60%"
);

createPackage("🟡 باقة السوبر",
activeList.concat([
"Retinol → تجديد الخلايا",
"SPF Filters"
]),
"غسول علاجي + سيروم تفتيح متقدم + كريم عيون احترافي + ريتينول ليلي + واقي شمس SPF50+",
"1200 – 1700 جنيه",
"6 أسابيع",
"70 – 80%"
);

createPackage("🔴 باقة الألترا",
activeList.concat([
"Tranexamic Acid → علاج التصبغات العميقة",
"Peptides → دعم مرونة البشرة",
"Retinol 0.3%"
]),
"غسول احترافي + سيروم مكثف + كريم عيون طبي + ريتينول علاجي + واقي شمس طبي مخصص",
"2000 – 2800 جنيه",
"8 أسابيع",
"85 – 92%"
);

}

function createPackage(title,actives,products,price,duration,improve){

const div=document.createElement("div");
div.className="routine-card";

div.innerHTML=`
<h3 style="color:#d4af37">${title}</h3>
<p><b>المواد الفعالة:</b></p>
<ul>${actives.map(a=>`<li>${a}</li>`).join("")}</ul>
<p><b>يشمل:</b> ${products}</p>
<p><b>السعر التقريبي:</b> ${price}</p>
<p><b>مدة الاستخدام:</b> ${duration}</p>
<p><b>نسبة التحسن المتوقعة:</b> ${improve}</p>
<button onclick="choosePackage('${title}')">اختيار هذه الباقة</button>
`;

routineSection.appendChild(div);
}

function choosePackage(title){
window.open(`https://wa.me/201063994139?text=أرغب في ${title}`);
}

</script>
</body>
</html>
