<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI | PROFESSIONAL CLINIC</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
:root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; --green: #2ecc71; }
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
.container{max-width:500px;margin:auto;}

.header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
.app-logo { width: 90%; max-height: 70px; object-fit: contain; }

.preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}

/* مربعات الفحص ومؤشر الإضاءة */
.scan-area { position: absolute; border: 1.5px solid var(--cyan); z-index: 60; display: none; background: rgba(0,242,255,0.05); }
.scanner-line { position: absolute; width: 100%; height: 2px; background: var(--cyan); box-shadow: 0 0 15px var(--cyan); z-index: 70; top: 0; display: none; }
.scanning-active .scanner-line { display: block; animation: scanAnim 2s ease-in-out; }
@keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

.info-badge { background: rgba(0,0,0,0.8); padding: 5px 10px; border-radius: 10px; border: 1px solid var(--gold); font-size: 0.7rem; margin-bottom: 5px; }
.live-metrics { position: absolute; top: 10px; right: 10px; z-index: 80; }

.btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
.card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
.product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a1a; border-radius: 10px; margin-bottom: 10px; border-right: 3px solid var(--gold); }
.buy-link { color: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.85rem; border: 1px solid var(--gold); padding: 5px 10px; border-radius: 6px; }

.inst-box { background: #1a1a00; border: 1px dashed var(--gold); padding: 10px; border-radius: 10px; font-size: 0.8rem; margin-bottom: 15px; }
</style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>
    
    <div class="inst-box">
        <b>💡 تعليمات:</b> وجهك في منتصف الإطار، إضاءة قوية، ثبات لمدة 2 ثانية عند الضغط على التحليل.
    </div>

    <div class="preview-box" id="pBox">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="scanner" class="scanner-line"></div>
        
        <div id="areaForehead" class="scan-area"></div>
        <div id="areaEyes" class="scan-area"></div>
        <div id="areaCheeks" class="scan-area"></div>
        
        <div class="live-metrics">
            <div id="lightMet" class="info-badge">الإضاءة: --</div>
            <div id="hydraMet" class="info-badge">الترطيب: --</div>
        </div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startCam()">كاميرا لايف 📸</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        <button id="analyzeBtn" class="btn" style="background: var(--green);" onclick="runSmartScan()" disabled>بدء التحليل (2 ثانية) 🔍</button>
    </div>

    <div id="preReportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">نتائج الفحص الذكي</h3>
        <div id="preContent" style="line-height:1.8; font-size:0.9rem;"></div>
        <button class="btn" onclick="openQuestions()" style="margin-top:15px;">تخصيص الروتين ⬅️</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold);">تأكيد حالة البشرة</h3>
        <label>هل تعاني من حبوب نشطة؟</label>
        <select id="qAcne"><option value="no">لا</option><option value="yes">نعم</option></select>
        
        <label>هل توجد تصبغات/بقع؟</label>
        <select id="qPig"><option value="no">لا</option><option value="yes">نعم</option></select>

        <label>درجة الهالات؟</label>
        <select id="qCircles">
            <option value="no">لا يوجد</option><option value="light">هالات خفيفة</option><option value="dark">هالات عميقة</option>
        </select>

        <label>الباقة المطلوبة:</label>
        <select id="qPkg">
            <option value="eco">الاقتصادية</option>
            <option value="super">سوبر (تفتيح + علاج)</option>
            <option value="ultra">ألترا (الروتين المتكامل)</option>
        </select>
        <button class="btn" onclick="showFinalReport()">اعتماد الروتين 🛒</button>
    </div>

    <div id="reportCard" class="card">
        <div id="finalPkgDisplay"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
// الروابط المظبوطة بدقة
const productDB = {
    "أرجنتو كلير (للغلول والحبوب)": "https://amzn.to/3ZNJnMs",
    "شان جيل (مرطب هيدرا)": "https://amzn.to/46M1PZC",
    "ستارفيل وايتنينج (تفتيح)": "https://amzn.to/3MyNZD9",
    "ناتافيس فيتامين C (نضارة)": "https://amzn.to/3OuGhKM",
    "ستارفيل آي كونتور (للعين)": "https://amzn.to/3ORZvKm",
    "بوباي جل (واقي شمس)": "https://amzn.to/4rU6pgo",
    "ميلاتكس (تفتيح مكثف)": "https://amzn.to/4kSzJSu"
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let aiResults = { skinType: '', acne: false, circles: false, pig: false, wrinkle: 0, hydra: 0 };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm = results.multiFaceLandmarks[0];
        updateScanAreas(lm);
        
        const fH = getPixel(lm[10]); // الجبهة
        const cH = getPixel(lm[205]); // الخد
        const eY = getPixel(lm[230]); // العين

        // قياس الإضاءة والترطيب
        const light = Math.round((fH.v / 255) * 100);
        aiResults.hydra = Math.round(100 - (Math.abs(fH.v - cH.v)));
        document.getElementById('lightMet').innerText = `الإضاءة: ${light}%`;
        document.getElementById('hydraMet').innerText = `الترطيب: ${aiResults.hydra}%`;

        // كشف المشاكل
        aiResults.acne = (cH.r > cH.g + 25);
        aiResults.pig = (Math.abs(fH.v - cH.v) > 25);
        aiResults.circles = (eY.v < cH.v - 20);
        aiResults.wrinkle = light < 40 ? 15 : 5; // تجاعيد تقديرية حسب الظلال
        aiResults.skinType = fH.v > 180 ? "دهنية" : (fH.v < 110 ? "جافة" : "مختلطة");

        if(light > 40) document.getElementById('analyzeBtn').disabled = false;
    }
});

function updateScanAreas(lm) {
    const draw = (id, pt, w, h) => {
        const el = document.getElementById(id); el.style.display = 'block';
        el.style.width = w+'%'; el.style.height = h+'%';
        el.style.left = (lm[pt].x*100 - w/2)+'%'; el.style.top = (lm[pt].y*100 - h/2)+'%';
    };
    draw('areaForehead', 10, 40, 15);
    draw('areaEyes', 230, 30, 10);
    draw('areaCheeks', 205, 30, 20);
}

function getPixel(p){
    const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height);
    const d=ctx.getImageData(x,y,1,1).data; return {r:d[0], g:d[1], v:(d[0]+d[1]+d[2])/3};
}

function runSmartScan() {
    document.getElementById('pBox').classList.add('scanning-active');
    document.getElementById('analyzeBtn').disabled = true;
    setTimeout(() => {
        document.getElementById('pBox').classList.remove('scanning-active');
        // مزامنة نتائج السكان مع الأسئلة تلقائياً
        if(aiResults.acne) document.getElementById('qAcne').value = "yes";
        if(aiResults.pig) document.getElementById('qPig').value = "yes";
        if(aiResults.circles) document.getElementById('qCircles').value = "dark";
        showPreReport();
    }, 2000);
}

function showPreReport() {
    document.getElementById('controls').style.display = 'none';
    document.getElementById('preReportCard').style.display = 'block';
    document.getElementById('preContent').innerHTML = `
        • <b>نوع البشرة:</b> ${aiResults.skinType}<br>
        • <b>التجاعيد:</b> ${aiResults.wrinkle > 10 ? 'خطوط تعبيرية بسيطة' : 'البشرة مشدودة'}<br>
        • <b>الحبوب:</b> ${aiResults.acne ? '⚠️ رصد التهاب' : '✅ لا يوجد'}<br>
        • <b>التصبغات:</b> ${aiResults.pig ? '⚠️ رصد بقع داكنة' : '✅ موحدة'}<br>
        • <b>الهالات:</b> ${aiResults.circles ? '⚠️ إجهاد تحت العين' : '✅ منطقة صافية'}
    `;
}

function openQuestions() {
    document.getElementById('preReportCard').style.display = 'none';
    document.getElementById('questionsCard').style.display = 'block';
}

function showFinalReport() {
    document.getElementById('questionsCard').style.display = 'none';
    document.getElementById('reportCard').style.display = 'block';
    const pkg = document.getElementById('qPkg').value;
    
    let items = ["أرجنتو كلير (للغلول والحبوب)", "شان جيل (مرطب هيدرا)", "بوباي جل (واقي شمس)"];
    if(pkg === 'super') items.push("ستارفيل وايتنينج (تفتيح)");
    if(pkg === 'ultra') items.push("ستارفيل وايتنينج (تفتيح)", "ناتافيس فيتامين C (نضارة)", "ستارفيل آي كونتور (للعين)", "ميلاتكس (تفتيح مكثف)");

    let html = `<h3>الروتين النهائي - باقة ${pkg.toUpperCase()}</h3>`;
    items.forEach(name => {
        html += `<div class="product-item"><span>${name}</span><a href="${productDB[name]}" target="_blank" class="buy-link">عرض المنتج 🛒</a></div>`;
    });
    document.getElementById('finalPkgDisplay').innerHTML = html;
}

function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function handleImage(e) { const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img}); }; img.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }
</script>
</body>
</html>
