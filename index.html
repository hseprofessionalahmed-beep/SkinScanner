<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VERONA AI Skin Scanner</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo-box">
            <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3065/3065319.png'">
        </div>
        <h1>VERONA <span class="gold-text">AI SCANNER</span></h1>
        <p class="subtitle">تحليل احترافي مدعوم بالذكاء الاصطناعي</p>
    </header>

    <main>
        <div class="mode-cards">
            <div class="card" onclick="chooseMode('camera')">
                <span class="icon">📸</span>
                <span>كاميرا</span>
            </div>
            <div class="card" onclick="document.getElementById('imageInput').click()">
                <span class="icon">📁</span>
                <span>رفع صورة</span>
            </div>
            <input type="file" id="imageInput" accept="image/*" class="hidden">
        </div>

        <div class="preview-area">
            <video id="video" autoplay playsinline class="hidden"></video>
            <canvas id="canvas" class="hidden"></canvas>
            <button id="captureBtn" class="action-btn hidden">بدء الفحص الآن</button>
        </div>

        <div id="analysisResult" class="result-card hidden">
            <h3>نتائج الفحص الرقمي</h3>
            <div class="score-container">
                <div class="score-circle">
                    <span id="skinScore">--</span>
                    <small>درجة الصحة</small>
                </div>
            </div>
            <canvas id="skinChart"></canvas>
            <div id="analysisText" class="status-list"></div>
        </div>

        <div id="levelSelect" class="level-box hidden">
            <h3>اختر فئة الروتين</h3>
            <div class="level-btns">
                <button class="lvl-btn" onclick="buildRoutine('eco')">اقتصادي</button>
                <button class="lvl-btn active" onclick="buildRoutine('super')">سوبر</button>
                <button class="lvl-btn" onclick="buildRoutine('ultra')">ألترا</button>
            </div>
        </div>

        <div id="routine-output" class="hidden">
            <div id="finalRoutine" class="routine-paper"></div>
            <div class="actions-grid">
                <button onclick="sendWhatsApp()" class="wa-btn">واتساب ✅</button>
                <button onclick="savePDF()" class="pdf-btn">حفظ PDF 📄</button>
            </div>
        </div>
    </main>
</div>

<div id="loading" class="loader-overlay hidden">
    <div class="spinner"></div>
    <p>جاري المسح المجهري...</p>
</div>

<script src="script.js"></script>
<script src="routine.js"></script>
</body>
</html>
