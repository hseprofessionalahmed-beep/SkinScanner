<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | MASTER EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <style>
        :root { --gold: linear-gradient(135deg, #a67c00, #ffbf00); --gold-s: #d4af37; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; padding: 15px; }
        
        /* نافذة المعاينة */
        .preview-box { position: relative; border-radius: 25px; overflow: hidden; border: 2px solid var(--gold-s); background: #000; aspect-ratio: 4/5; box-shadow: 0 0 30px rgba(212,175,55,0.2); }
        video, canvas, #upImg { width: 100%; height: 100%; object-fit: cover; }
        #upImg { display: none; }
        
        .scan-line { position: absolute; width: 100%; height: 4px; background: var(--gold-s); top: 0; display: none; animation: scan 2s infinite linear; z-index: 10; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }

        /* الأزرار */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn { background: var(--gold); color: #000; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-outline { background: rgba(255,255,255,0.05); color: var(--gold-s); border: 1px solid var(--gold-s); }

        /* البطاقات */
        .card { background: rgba(255,255,255,0.06); border: 1px solid rgba(212,175,55,0.3); border-radius: 20px; padding: 20px; margin-top: 15px; display: none; text-align: right; backdrop-filter: blur(10px); }
        
        #liveStatus { position: absolute; bottom: 15px; width: 100%; color: #00f2ff; font-weight: bold; text-shadow: 0 2px 4px #000; z-index: 20; }
        .routine-item { background: rgba(0,0,0,0.3); padding: 12px; border-right: 4px solid var(--gold-s); border-radius: 8px; margin-bottom: 10px; }
        select { width: 100%; padding: 10px; border-radius: 8px; background: #1a1a1a; color: #fff; border: 1px solid #444; margin: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="background:var(--gold); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">VERONA AI MASTER</h2>

    <div class="preview-box">
        <video id="video" playsinline></video>
        <img id="upImg">
        <canvas id="canvas"></canvas>
        <div class="scan-line" id="sLine"></div>
        <div id="liveStatus">بانتظار المصدر...</div>
    </div>

    <div class="btn-grid" id="mainBtns">
        <button class="btn" onclick="startCam()">الكاميرا 📸</button>
        <label class="btn btn-outline">
            أضف صورة 📁 <input type="file" hidden onchange="handleFile(event)">
        </label>
    </div>

    <button id="runBtn" class="btn" style="width:100%; margin-top:10px; display:none;" onclick="startScan()">بدء التحليل السريري 🔬</button>

    <div id="confirmCard" class="card">
        <h3 style="color:var(--gold-s); text-align:center;">تأكيد التشخيص</h3>
        <label>الحبوب المكتشفة:</label>
        <select id="cAcne">
            <option value="none">لا يوجد</option>
            <option value="red">حبوب حمراء ملتهبة</option>
            <option value="white">رؤوس بيضاء/سوداء</option>
        </select>

        <label>التصبغات المكتشفة:</label>
        <select id="cPig">
            <option value="none">لا يوجد</option>
            <option value="brown">بنية (جبهة/وجنات)</option>
            <option value="dark">داكنة/عميقة</option>
        </select>

        <label>الهالات السوداء:</label>
        <select id="cDark">
            <option value="none">لا يوجد</option>
            <option value="yes">تم رصد هالات</option>
        </select>

        <div style="margin:15px 0; font-size:0.9rem;">
            <input type="checkbox" id="glow"> نضارة ✨ | <input type="checkbox" id="bright"> تفتيح 🤍
        </div>
        <button class="btn" style="width:100%" onclick="showFinal()">اعتماد الروتين الملكي 👑</button>
    </div>

    <div id="resultCard" class="card">
        <div id="score" style="font-size:3rem; text-align:center; color:var(--gold-s); font-weight:900;">100%</div>
        <div id="diagText" class="routine-item" style="border-color:#00f2ff"></div>
        <div id="routineBox"></div>
        <button class="btn" onclick="location.reload()" style="width:100%; background:#333; color:#fff;">فحص جديد 🔄</button>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const upImg = document.getElementById('upImg');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const liveStatus = document.getElementById('liveStatus');
    
    let faceMesh, detected = { acne:'none', pig:'none', dark:'none' };

    async function setup() {
        faceMesh = new FaceMesh({locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
        faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true, minDetectionConfidence: 0.5 });
        faceMesh.onResults(results => {
            canvas.width = (video.style.display !== 'none') ? video.videoWidth : upImg.naturalWidth;
            canvas.height = (video.style.display !== 'none') ? video.videoHeight : upImg.naturalHeight;
            ctx.drawImage(results.image, 0, 0, canvas.width, canvas.height);
            if (results.multiFaceLandmarks) {
                const lm = results.multiFaceLandmarks[0];
                drawConnectors(ctx, lm, FACEMESH_TESSELATION, {color: '#d4af3733'});
                analyzeLive(lm);
                document.getElementById('runBtn').style.display = 'block';
            }
        });
    }

    function analyzeLive(lm) {
        const forehead = getPx(lm[10]);
        const eye = getPx(lm[101]);
        const cheek = getPx(lm[205]);

        let status = "الجلد سليم | ";
        if ((eye.l / forehead.l) < 0.86) { detected.dark = 'yes'; status = "⚠️ هالات مكتشفة | "; }
        if ((cheek.l / forehead.l) < 0.88) { detected.pig = 'brown'; status += "⚠️ تصبغات | "; }
        if (cheek.r > cheek.g * 1.15) { detected.acne = 'red'; status += "⚠️ حبوب ملتهبة | "; }
        
        liveStatus.innerText = status;
    }

    function getPx(p) {
        const x = Math.floor(p.x * canvas.width);
        const y = Math.floor(p.y * canvas.height);
        const d = ctx.getImageData(x, y, 1, 1).data;
        return { r: d[0], g: d[1], b: d[2], l: (d[0]+d[1]+d[2])/3 };
    }

    function startCam() {
        upImg.style.display='none'; video.style.display='block';
        new Camera(video, {onFrame: async () => await faceMesh.send({image: video}), width: 640, height: 480}).start();
    }

    function handleFile(e) {
        const r = new FileReader();
        r.onload = (f) => {
            upImg.src = f.target.result; upImg.style.display='block'; video.style.display='none';
            upImg.onload = async () => await faceMesh.send({image: upImg});
        };
        r.readAsDataURL(e.target.files[0]);
    }

    function startScan() {
        document.getElementById('sLine').style.display = 'block';
        setTimeout(() => {
            document.getElementById('sLine').style.display = 'none';
            document.getElementById('mainBtns').style.display = 'none';
            document.getElementById('runBtn').style.display = 'none';
            document.getElementById('confirmCard').style.display = 'block';
            
            // نقل النتائج الذكية للأسئلة
            document.getElementById('cAcne').value = detected.acne;
            document.getElementById('cPig').value = detected.pig;
            document.getElementById('cDark').value = detected.dark;
        }, 2000);
    }

    function showFinal() {
        document.getElementById('confirmCard').style.display = 'none';
        document.getElementById('resultCard').style.display = 'block';
        
        const acne = document.getElementById('cAcne').value;
        const pig = document.getElementById('cPig').value;
        const dark = document.getElementById('cDark').value;
        
        let s = 100;
        let diag = "<b>التقرير السريري:</b><br>";
        let rout = "";

        if(acne !== 'none') { s-=15; diag += "• حبوب نشطة تحتاج تهدئة.<br>"; rout += addR("علاج الحبوب", "سيروم ساليسيليك", "Salicylic Acid"); }
        if(pig !== 'none') { s-=12; diag += "• تصبغات ميلانينية.<br>"; rout += addR("التفتيح", "سيروم ألفا أربوتين", "Alpha Arbutin"); }
        if(dark !== 'none') { s-=8; diag += "• إجهاد محيط العين.<br>"; rout += addR("الهالات", "كريم كافيين", "Caffeine"); }
        if(document.getElementById('glow').checked) rout += addR("النضارة ✨", "هيالورونيك أسيد", "Hyaluronic");
        
        document.getElementById('score').innerText = s + "%";
        document.getElementById('diagText').innerHTML = diag;
        document.getElementById('routineBox').innerHTML = rout;
    }

    function addR(t, n, a) { return `<div class="routine-item"><b>${t}:</b><br>${n}<br><small style="color:#00f2ff">المواد: ${a}</small></div>`; }

    setup();
</script>
</body>
</html>
