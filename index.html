<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERONA AI - Pro Facial Precision</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<style>
:root { --gold: #d4af37; --bg: #0a0a0a; --card: #161616; --highlight: #222; }
body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; padding:10px; text-align:center;}
.container { max-width:600px; margin:auto;}
.preview-box { position:relative; width:100%; border-radius:20px; overflow:hidden; background:#000; border:2px solid #333; min-height:300px;}
video, canvas { width:100%; height:auto;}
#overlay { position:absolute; top:0; left:0; z-index:10; }
.btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:15px 0;}
.action-btn { background:var(--gold); color:#000; padding:15px; border-radius:12px; border:none; font-weight:bold; cursor:pointer;}
.scan-btn { background:#fff; width:100%; font-size:1.1rem; border:3px solid var(--gold); margin-top:10px;}
.result-card { background:var(--card); padding:20px; border-radius:20px; margin-top:20px; border:1px solid var(--gold); text-align:right;}
.hidden { display:none; }
.status-msg { color:var(--gold); font-size:0.9rem; margin:10px 0; }
.question-box { background: var(--highlight); border-radius:15px; padding:15px; margin:15px 0; text-align:right; }
.question-box label { display:block; margin:5px 0; font-size:0.95rem; }
.routine-box { background: var(--highlight); border-radius:15px; padding:15px; margin:15px 0; border:1px solid var(--gold); text-align:right; }
.routine-box h4 { margin:5px 0; color:var(--gold);}
.routine-box table { width:100%; font-size:0.9rem; margin:5px 0; border-collapse: collapse; }
.routine-box table td, .routine-box table th { border:1px solid #444; padding:5px; }
.send-wa-btn { background:#25d366; color:white; width:100%; margin-top:10px; padding:10px; border:none; border-radius:12px; font-weight:bold; cursor:pointer; }
</style>
</head>
<body>

<div class="container">
<h2>VERONA <span style="color:var(--gold)">AI PRO</span></h2>
<div id="status" class="status-msg">جاري تحميل المحرك الذكي...</div>

<div class="preview-box">
    <video id="input_video" class="hidden" playsinline></video>
    <canvas id="overlay"></canvas>
</div>

<div class="btn-grid">
    <button class="action-btn" onclick="initCamera()">📸 الكاميرا</button>
    <button class="action-btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">📁 رفع صورة</button>
</div>
<input type="file" id="fileInput" class="hidden" accept="image/*" onchange="processFile(event)">

<div id="scanBtnDiv">
    <button id="scanBtn" class="action-btn scan-btn" onclick="performDiagnosis()">تحليل النتائج الآن 🔬</button>
</div>

<div id="questionBox" class="question-box hidden"></div>

<div id="routineContainer"></div>

<div id="recommendBox" class="question-box hidden">
<h4>توصيات مهمة قبل البدء بالروتين:</h4>
<ul style="text-align:right; padding-left:20px;">
<li>ترطيب البشرة لمدة أسبوع إلى أسبوعين قبل البدء</li>
<li>النوم المبكر وشرب مياه كافية يومياً</li>
<li>استخدام واقي الشمس يومياً</li>
<li>عدم الاعتماد على الروتين قبل تهيئة البشرة</li>
</ul>
</div>

<script>
const videoElement = document.getElementById('input_video');
const canvasElement = document.getElementById('overlay');
const canvasCtx = canvasElement.getContext('2d', {willReadFrequently:true});
let faceMesh;
let lastResults = null;
let currentImg = null;

// تهيئة FaceMesh
async function setupFaceMesh() {
    faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5 });
    faceMesh.onResults(onResults);
    document.getElementById('status').innerText = "المحرك جاهز للفحص ✅";
}
setupFaceMesh();

function onResults(results){
    lastResults = results;
    canvasElement.width = canvasElement.clientWidth;
    canvasElement.height = (currentImg) ? (currentImg.height*(canvasElement.width/currentImg.width)) : videoElement.videoHeight*(canvasElement.width/videoElement.videoWidth);
    canvasCtx.save();
    canvasCtx.clearRect(0,0,canvasElement.width,canvasElement.height);
    if(results.image) canvasCtx.drawImage(results.image,0,0,canvasElement.width,canvasElement.height);
    if(results.multiFaceLandmarks){
        for(const landmarks of results.multiFaceLandmarks){
            drawConnectors(canvasCtx, landmarks, FACEMESH_TESSELATION, {color:'#d4af3744', lineWidth:0.5});
        }
    }
    canvasCtx.restore();
}

async function initCamera(){
    currentImg = null;
    videoElement.classList.remove('hidden');
    const camera = new Camera(videoElement, {
        onFrame: async()=>{ await faceMesh.send({image:videoElement}); }
    });
    camera.start();
}

function processFile(event){
    const file = event.target.files[0];
    if(!file) return;
    const img = new Image();
    img.onload = async()=>{
        // resize كبير جداً
        const maxDim = 1024;
        if(img.width>maxDim || img.height>maxDim){
            const scale = maxDim/Math.max(img.width,img.height);
            const canvas = document.createElement('canvas');
            canvas.width = img.width*scale;
            canvas.height = img.height*scale;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img,0,0,canvas.width,canvas.height);
            currentImg = new Image();
            currentImg.onload=()=>{ faceMesh.send({image:currentImg}); }
            currentImg.src = canvas.toDataURL();
        } else {
            currentImg = img;
            faceMesh.send({image:img});
        }
        videoElement.classList.add('hidden');
    };
    img.src = URL.createObjectURL(file);
}

// دالة تحليل بسيطة، تكتشف هالات وتصبغات
function performDiagnosis(){
    if(!lastResults || !lastResults.multiFaceLandmarks) return alert("يرجى التقاط وجه واضح أولاً");
    const landmarks = lastResults.multiFaceLandmarks[0];
    // مناطق العين والوجنة
    const checkArea = (lm)=>{ 
        const x = Math.floor(lm.x*canvasElement.width);
        const y = Math.floor(lm.y*canvasElement.height);
        const pixel = canvasCtx.getImageData(x,y,1,1).data;
        return (pixel[0]+pixel[1]+pixel[2])/3;
    }
    const forehead = checkArea(landmarks[10]);
    const cheek = checkArea(landmarks[205]);
    const eye = (checkArea(landmarks[130])+checkArea(landmarks[350]))/2;
    const pigmentDiff = cheek/forehead;
    const eyeDiff = eye/forehead;

    let issues = [];
    if(eyeDiff<0.95) issues.push('الهالات');
    if(pigmentDiff<0.97) issues.push('تصبغات');

    showQuestions(issues);
}

// عرض الأسئلة فقط عند وجود مشكلة
function showQuestions(issues){
    const qBox = document.getElementById('questionBox');
    qBox.innerHTML='';
    if(issues.length===0){
        qBox.classList.add('hidden');
        showRoutine([]);
        return;
    }
    qBox.classList.remove('hidden');
    qBox.innerHTML='<h4>تم اكتشاف مشاكل في البشرة:</h4><p>'+issues.join(', ')+'</p>';
    issues.forEach(issue=>{
        if(issue==='الهالات'){
            const div = document.createElement('div');
            div.innerHTML=`<label>هل الهالات حقيقية؟</label>
            <select id="haloSelect">
                <option value="لا يوجد">لا يوجد</option>
                <option value="بني">بني</option>
                <option value="أسود">أسود</option>
                <option value="أزرق">أزرق</option>
            </select>`;
            qBox.appendChild(div);
        }
        if(issue==='تصبغات'){
            const div = document.createElement('div');
            div.innerHTML=`<label>عمق التصبغ:</label>
            <select id="pigmentDepth">
                <option value="خفيف">خفيف</option>
                <option value="متوسط">متوسط</option>
                <option value="شديد">شديد</option>
            </select>
            <label>سبب التصبغ:</label>
            <select id="pigmentReason">
                <option value="شمسي">شمسي</option>
                <option value="حب شباب">حب شباب</option>
                <option value="هرموني">هرموني</option>
                <option value="وراثي">وراثي</option>
                <option value="غير معروف">غير معروف</option>
            </select>
            <label>هل تريد تفتيح شامل؟</label>
            <select id="pigmentBright">
                <option value="نعم">نعم</option>
                <option value="لا">لا</option>
            </select>`;
            qBox.appendChild(div);
        }
    });
    const btn = document.createElement('button');
    btn.innerText='عرض الروتين المناسب';
    btn.classList.add('action-btn','scan-btn');
    btn.onclick=()=>{ collectAnswersAndShowRoutine(); };
    qBox.appendChild(btn);
}

function collectAnswersAndShowRoutine(){
    const issues=[];
    const halo=document.getElementById('haloSelect')?.value;
    if(halo && halo!=='لا يوجد') issues.push('الهالات');
    const pigmentDepth=document.getElementById('pigmentDepth')?.value;
    const pigmentReason=document.getElementById('pigmentReason')?.value;
    const pigmentBright=document.getElementById('pigmentBright')?.value;
    if(pigmentDepth) issues.push('تصبغات');

    showRoutine(issues);
}

function showRoutine(issues){
    const container=document.getElementById('routineContainer');
    container.innerHTML='';
    if(issues.length===0){
        container.innerHTML='<div class="routine-box"><h4>البشرة متوازنة ✅</h4><p>لا يوجد مشاكل، استمر بالروتين اليومي الطبيعي (غسول + ترطيب + واقي شمس)</p></div>';
        return;
    }

    // مثال روتين شامل لكل مشكلة
    const routines=[
        {level:'اقتصادي',products:[
            {name:'غسول مناسب',active:'SLS Free + مضاد أكسدة',benefit:'تنظيف البشرة',price:'50 جنيه',duration:'شهر',improve:'30%'},
            {name:'سيروم تفتيح',active:'Vitamin C + Niacinamide',benefit:'تفتيح وتوحيد اللون',price:'150 جنيه',duration:'شهر',improve:'40%'},
            {name:'واقي شمس',active:'SPF50',benefit:'حماية من الشمس',price:'100 جنيه',duration:'شهر',improve:'N/A'}
        ]},
        {level:'سوبر',products:[
            {name:'غسول متطور',active:'مكونات مضادة للأكسدة',benefit:'تنظيف عميق + حماية',price:'100 جنيه',duration:'شهر',improve:'50%'},
            {name:'سيروم متطور',active:'Alpha Arbutin + Vitamin C + E',benefit:'تفتيح متقدم + توحيد اللون',price:'250 جنيه',duration:'شهر',improve:'60%'},
            {name:'واقي شمس + SPF50',active:'مضاد للأكسدة + حماية',benefit:'حماية شاملة',price:'120 جنيه',duration:'شهر',improve:'N/A'}
        ]},
        {level:'ألترا',products:[
            {name:'غسول فاخر',active:'مضادات أكسدة + مقشرات خفيفة',benefit:'تنظيف وتفتيح وتنعيم',price:'200 جنيه',duration:'شهر',improve:'70%'},
            {name:'سيروم فاخر',active:'Gold + Vitamin C + E + HA',benefit:'تفتيح، ترطيب، مكافحة شيخوخة',price:'400 جنيه',duration:'شهر',improve:'80%'},
            {name:'واقي شمس + SPF50+',active:'مضاد أكسدة + حماية',benefit:'حماية قصوى',price:'200 جنيه',duration:'شهر',improve:'N/A'}
        ]}
    ];

    routines.forEach(r=>{
        const box=document.createElement('div');
        box.classList.add('routine-box');
        box.innerHTML=`<h4>روتين ${r.level}</h4>
        <table>
        <tr><th>المنتج</th><th>المادة الفعالة</th><th>الفائدة</th><th>السعر</th><th>مدة الاستخدام</th><th>نسبة التحسن</th></tr>
        ${r.products.map(p=>`<tr><td>${p.name}</td><td>${p.active}</td><td>${p.benefit}</td><td>${p.price}</td><td>${p.duration}</td><td>${p.improve}</td></tr>`).join('')}
        </table>
        <button class="send-wa-btn" onclick="sendRoutineWA('${r.level}')">اختيار روتين ${r.level} ✅</button>`;
        container.appendChild(box);
    });

    document.getElementById('recommendBox').classList.remove('hidden');
}

function sendRoutineWA(level){
    const text=`تم اختيار روتين ${level} من VERONA AI`;
    window.open(`https://wa.me/201063994139?text=${encodeURIComponent(text)}`);
}
</script>
</body>
</html>
