// دالة الاتصال بـ OpenAI
async function getExpertAdvice(results) {
    const prompt = `أنت خبير كوزمتك وطبيب جلدية. نتائج فحص البشرة بالكاميرا هي:
    - حبوب: ${results.acne ? 'نعم' : 'لا'}
    - تصبغات: ${results.pig ? 'نعم' : 'لا'}
    - هالات: ${results.circles ? 'نعم' : 'لا'}
    - تجاعيد: ${results.wrinkles ? 'نعم' : 'لا'}
    
    بناءً على ذلك، اكتب تشخيصاً طبياً مختصراً جداً (30 كلمة بحد أقصى) يشمل أهم مادة فعالة مناسبة لهذه الحالة باللغة العربية بأسلوب احترافي.`;

    try {
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${MY_API_KEY}`
            },
            body: JSON.stringify({
                model: "gpt-4-turbo-preview", // أو gpt-3.5-turbo لتقليل الاستهلاك
                messages: [{ role: "user", content: prompt }],
                temperature: 0.7
            })
        });
        const data = await response.json();
        return data.choices[0].message.content;
    } catch (e) {
        return "تعذر استشارة الطبيب الذكي حالياً، يرجى اتباع الروتين المقترح.";
    }
}
