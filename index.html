<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>AI Skin Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <img src="logo.png" alt="Logo" style="width:100px; margin-bottom:10px;">
    <h1>AI Skin Scanner</h1>

    <input type="text" id="username" placeholder="👤 اسم المستخدم">

    <div class="upload-box" style="position: relative;">
      <video id="video" autoplay playsinline width="320" height="240" style="border-radius:12px; background:#000; z-index:1;"></video>
      <canvas id="overlay" width="320" height="240" style="position:absolute; top:0; left:0; z-index:2;"></canvas>
    </div>

    <button id="captureBtn" style="margin-top:10px;">📸 التقط الصورة</button>

    <div id="instructions" class="hidden"></div>

    <div id="evidence-panel" class="hidden">
      <h3>🔍 مؤشرات التحليل</h3>
      <ul id="indicatorsList"></ul>
    </div>

    <div id="questions" class="hidden"></div>
    <div id="result" class="hidden"></div>
    <button id="whatsappBtn" class="hidden">📲 إرسال الروتين واتساب</button>
  </div>

  <!-- استدعاء ملفاتك بالترتيب الصحيح -->
  <script src="ai_face_scan.js"></script>
  <script src="routine_data.js"></script>
  <script src="whatsapp_send.js"></script>
  <script src="script.js"></script>
</body>
</html>
