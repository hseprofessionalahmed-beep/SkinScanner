<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERONA AI | CLINIC V95</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <style>
        :root { --gold:#d4af37; --bg:#0a0a0a; --cyan: #00f2ff; --red: #ff4d4d; }
        body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:#fff;margin:0;padding:10px;text-align:right;}
        .container{max-width:500px;margin:auto;}
        .header-white { width: calc(100% + 20px); margin: -10px -10px 15px -10px; background: #fff; padding: 10px 0; text-align: center; border-bottom: 3px solid var(--gold); }
        .app-logo { width: 90%; max-height: 70px; object-fit: contain; }
        
        .preview-box{position:relative;border-radius:25px;overflow:hidden;border:2px solid var(--gold);aspect-ratio:4/5;margin-bottom:15px;background:#000;}
        video, canvas{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;}
        
        /* علامات المشاكل على الوجه */
        .face-label { position: absolute; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: bold; z-index: 90; display: none; white-space: nowrap;}
        .lbl-acne { border: 1px solid var(--red); color: var(--red); background: rgba(0,0,0,0.7); }
        .lbl-pig { border: 1px solid var(--gold); color: var(--gold); background: rgba(0,0,0,0.7); }

        .scanner-line { position: absolute; width: 100%; height: 3px; background: var(--cyan); z-index: 70; top: 0; display: none; }
        .scanning-active .scanner-line { display: block; animation: scanAnim 2s ease-in-out forwards; }
        @keyframes scanAnim { 0% { top: 0; } 100% { top: 100%; } }

        .btn{background:linear-gradient(135deg,#a67c00,#ffbf00);color:#000;border:none;padding:15px;border-radius:12px;font-weight:bold;cursor:pointer;width:100%; margin-bottom:10px;}
        .card{background:#111; border:1px solid #d4af3733; border-radius:25px; padding:20px; display:none; margin-top:15px;}
        
        .product-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #1a1a1a; border-radius: 12px; margin-bottom: 10px; border-right: 4px solid var(--gold); }
        .buy-link { color: #000; background: var(--gold); text-decoration: none; font-weight: bold; font-size: 0.75rem; padding: 7px 14px; border-radius: 8px; }
        
        select { width:100%; padding:12px; margin:8px 0; background:#222; color:#fff; border:1px solid #444; border-radius:10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-white"><img src="logo.png" alt="Verona AI" class="app-logo"></div>

    <div class="preview-box" id="pBox">
        <video id="video" playsinline hidden></video>
        <canvas id="canvas"></canvas>
        <div id="scanner" class="scanner-line"></div>
        
        <div id="lblAcne" class="face-label lbl-acne">⚠️ رصد حبوب</div>
        <div id="lblPig" class="face-label lbl-pig">⚠️ رصد تصبغ</div>
    </div>

    <div id="controls">
        <div style="display:flex; gap:10px;">
            <button class="btn" onclick="startCam()">كاميرا 📸</button>
            <button class="btn" style="background:#333; color:#fff;" onclick="document.getElementById('fileInput').click()">رفع صورة 🖼️</button>
        </div>
        <input type="file" id="fileInput" hidden accept="image/*" onchange="handleImage(event)">
        <button id="analyzeBtn" class="btn" style="background: #2ecc71;" onclick="runSmartScan()" disabled>بدء التحليل 🔍</button>
    </div>

    <div id="questionsCard" class="card">
        <h3 style="color:var(--gold);">تأكيد حالة البشرة</h3>
        <label>هل تلاحظ حبوب تحت الجلد أو التهاب؟</label>
        <select id="qAcne"><option value="no">لا</option><option value="yes">نعم</option></select>
        
        <label>هل تعاني من بقع داكنة أو آثار قديمة؟</label>
        <select id="qPig"><option value="no">لا</option><option value="yes">نعم</option></select>

        <label>نوع البشرة المفضل للواقي:</label>
        <select id="qSun">
            <option value="oily">دهنية (جل)</option>
            <option value="dry">جافة/عادية (كريم)</option>
        </select>
        
        <button class="btn" onclick="showFinalRoutine()">استخراج الروتين الكامل 🛒</button>
    </div>

    <div id="reportCard" class="card">
        <h3 style="color:var(--gold); text-align:center;">الروتين الطبي النهائي</h3>
        <div id="finalPkgDisplay"></div>
        <button class="btn" onclick="location.reload()" style="background:#444; color:#fff;">إعادة الفحص 🔄</button>
    </div>
</div>

<script>
// الروابط المظبوطة بدقة
const productDB = {
    "Argento Clear": "https://amzn.to/3uN2R3Q",
    "Shaan Gel": "https://amzn.to/3InR0Zk",
    "Star Ville Whitening": "https://amzn.to/3YVfXfI",
    "Natavis Vitamin C": "https://amzn.to/3SREm9v",
    "Bobai Gel": "https://amzn.to/3uREn6Z",
    "Eva Natural Glow": "https://amzn.to/3ZNJnMs",
    "Star Ville Eye": "https://amzn.to/46M1PZC",
    "La Roche Eye": "https://amzn.to/3MyNZD9",
    "Eva Acne Sunscreen": "https://amzn.to/3OuGhKM",
    "Eva Collagen": "https://amzn.to/3ORZvKm",
    "Kolagra Sun": "https://amzn.to/4rU6pgo",
    "Melatine Cream": "https://amzn.to/4kSzJSu"
};

const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let aiResults = { acne: false, pig: false, circles: false };

const faceMesh = new FaceMesh({locateFile:(f)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.75});

faceMesh.onResults(results=>{
    ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(results.image,0,0,canvas.width,canvas.height);
    if(results.multiFaceLandmarks?.length>0){
        const lm = results.multiFaceLandmarks[0];
        const fH = getPx(lm[10]); const cH = getPx(lm[205]); const eY = getPx(lm[230]);
        
        // اكتشاف حقيقي
        aiResults.acne = (cH.r > cH.g + 20);
        aiResults.pig = (Math.abs(fH.v - cH.v) > 22);
        aiResults.circles = (eY.v < cH.v - 15);

        // وضع العلامات على الصورة
        updateLabel('lblAcne', lm[205], aiResults.acne);
        updateLabel('lblPig', lm[425], aiResults.pig);

        if(fH.v > 50) document.getElementById('analyzeBtn').disabled = false;
    }
});

function updateLabel(id, pt, show) {
    const el = document.getElementById(id);
    if(show) {
        el.style.display = 'block';
        el.style.left = (pt.x * 100) + '%';
        el.style.top = (pt.y * 100) + '%';
    } else { el.style.display = 'none'; }
}

function getPx(p){
    const x=Math.floor(p.x*canvas.width); const y=Math.floor(p.y*canvas.height);
    const d=ctx.getImageData(x,y,1,1).data; return {r:d[0], v:(d[0]+d[1]+d[2])/3};
}

function runSmartScan() {
    document.getElementById('pBox').classList.add('scanning-active');
    setTimeout(() => {
        document.getElementById('pBox').classList.remove('scanning-active');
        document.getElementById('controls').style.display = 'none';
        document.getElementById('questionsCard').style.display = 'block';
        
        // مزامنة الأسئلة مع الكشف تلقائياً
        document.getElementById('qAcne').value = aiResults.acne ? "yes" : "no";
        document.getElementById('qPig').value = aiResults.pig ? "yes" : "no";
    }, 2000);
}

function showFinalRoutine() {
    document.getElementById('questionsCard').style.display = 'none';
    document.getElementById('reportCard').style.display = 'block';
    
    const userAcne = document.getElementById('qAcne').value;
    const userPig = document.getElementById('qPig').value;
    const userSun = document.getElementById('qSun').value;

    let items = [];
    
    // 1. الغسول المناسب
    if(userAcne === 'yes') items.push({n:"غسول أرجنتو كلير (للحبوب)", l:productDB["Argento Clear"]});
    else items.push({n:"غسول ستارفيل وايتنينج (تفتيح)", l:productDB["Star Ville Whitening"]});

    // 2. المرطب (أساسي)
    items.push({n:"مرطب شان جيل (هيدرا مائي)", l:productDB["Shaan Gel"]});

    // 3. التفتيح (إذا وجد)
    if(userPig === 'yes') {
        items.push({n:"سيروم ناتافيس (نضارة)", l:productDB["Natavis Vitamin C"]});
        items.push({n:"كريم ميلاتكس (علاج بقع)", l:productDB["Melatine Cream"]});
    }

    // 4. واقي الشمس
    if(userSun === 'oily') items.push({n:"واقي شمس بوباي (جل خفيف)", l:productDB["Bobai Gel"]});
    else items.push({n:"واقي شمس إيفا كولاجين", l:productDB["Eva Collagen"]});

    // 5. منطقة العين
    items.push({n:"كريم ستارفيل آي كونتور", l:productDB["Star Ville Eye"]});

    let html = "";
    items.forEach(item => {
        html += `<div class="product-item"><span>${item.n}</span><a href="${item.l}" target="_blank" class="buy-link">شراء الآن 🛒</a></div>`;
    });
    document.getElementById('finalPkgDisplay').innerHTML = html;
}

function startCam(){ new Camera(video,{onFrame:async()=>await faceMesh.send({image:video}),width:640,height:480}).start(); canvas.width=640; canvas.height=480; }
function handleImage(e) { const r=new FileReader(); r.onload=(ev)=>{ const img=new Image(); img.onload=()=>{ canvas.width=img.width; canvas.height=img.height; faceMesh.send({image:img}); }; img.src=ev.target.result; }; r.readAsDataURL(e.target.files[0]); }
</script>
</body>
</html>
